**Purpose:** Capture the interviewee's reaction to the price. For Guess the Price, reactions are among the most visceral of any angle — the surprise is immediate and mathematical. They KNOW what they guessed, they heard the real price, and the gap is undeniable.

The best reactions:
- **Disbelief** — "No way." / "Are you serious?" / "That can't be right."
- **Recalculation** — "Wait... that's less than my [current product]?" / "I paid more for my [inferior thing]"
- **Instant purchase intent** — "I'll take one right now." / "Where do I buy this?"
- **Sharing impulse** — "My [wife/mom/friend] needs to know about this." / "Everyone overpays for this"

Write 4–6 target reaction lines.

Format:
\`\`\`
REACTIONS - Reactions we are aiming to receive
  • Example Line:
    ◦ "[Disbelief — 'No way' / 'That can't be right']"
    ◦ "[Recalculation — 'That's less than what I paid for...']"
    ◦ "[Purchase intent — 'I'll take one']"
    ◦ "[Sharing impulse — 'My [person] needs to know']"
\`\`\`

---

#### 7f. VALUE PROPS

**Purpose:** After the reaction, the host reinforces WHY the price is what it is — and why it's still a great deal. This prevents the "too good to be true" objection. Each value prop should make the interviewee feel smarter about the deal, not more skeptical.

Frame each value prop as a reason the price is JUSTIFIED at this level — "and for that price, you get..." or "that includes..."

Write 3–4 value props.

Format:
\`\`\`
VALUE PROPS - How our hosts describe the features/benefits of the product
  • Host Line:
    ◦ "[Value prop #1 — what's included at that price that makes it feel like a steal]"
    ◦ "[Value prop #2 — durability/longevity that makes the price-per-use even lower]"
    ◦ "[Value prop #3 — comparison to what they'd pay elsewhere for the same thing]"
\`\`\`

---

#### 7g. SECOND REACTIONS (Optional)

**Purpose:** After hearing the value props layered on top of the already-surprising price, the interviewee often has a second reaction — this one is more conversion-focused. "No way" becomes "I need this."

Format:
\`\`\`
SECOND REACTIONS - Reactions after hearing the value props
  • Example Line:
    ◦ "[Conversion — 'Okay, I'm buying this']"
    ◦ "[Advocacy — 'Everyone needs to hear about this']"
    ◦ "[Regret — 'I can't believe I've been paying $300 for [category]']"
\`\`\`

---

#### 7h. RECOMMENDATION (Optional)

**Purpose:** Ask who else should know about this price. Works especially well for Sticker Shock Flip where the interviewee just realized an entire category is overpriced.

Format:
\`\`\`
RECOMMENDATION - Who would the interviewee recommend this to
  • Host Line:
    ◦ "Who else needs to know about this?"
  • Example Line:
    ◦ "[Specific — 'My husband, he just paid $400 for new lenses']"
    ◦ "[Broad — 'Anyone who wears glasses']"
\`\`\`

---

#### 7i. CTA

**Purpose:** Close with the CTA. For Guess the Price, the CTA is strongest when it REPEATS the price — the viewer just watched someone be shocked by the number, and hearing it again in the CTA reinforces the deal.

Format:
\`\`\`
CTA - How our hosts will close the interview
  • Host Line:
    ◦ "[CTA that repeats the price — 'Starting at $79 at [brand].com']"
\`\`\`

---

Format:
\`\`\`

## Quality Checks

Before finalizing the output, verify:

1. **The VALUE BUILD comes before the guess** — the interviewee must hear/see/feel enough to form a high estimate before guessing. If the value build is weak, the guess will be low and the reveal won't land
2. **The interviewee commits to a SPECIFIC DOLLAR AMOUNT** — not "a lot," not "expensive," a number. If the Host Lines don't push for a number, add a "give me your best guess" prompt
3. **The price reveal has a PAUSE** — check that no Host Line immediately follows the price. There must be a beat of silence for the reaction to happen. If the host talks over the reaction, the moment is lost
4. **The revealed price is real and available** — no bait-and-switch. If the price requires a subscription, a minimum order, or a specific variant, the Host Line must include that context. "Starting at $79" not just "$79" if there are tiers
5. **Every Host Line sounds conversational** — read it aloud. The value build should sound like a friend excitedly describing something cool, not a QVC host reading specs
6. **The price gap is genuinely surprising** — if the real price is only 10–15% lower than what most people would guess, this angle won't work. The gap needs to be dramatic enough to generate a real reaction. If it isn't, consider a different angle
7. **Multiple interviewees are assumed** — Guess the Price is STRONGEST as a montage of escalating guesses followed by one clean reveal. Note that the game should be run with at least 5–8 people
8. **Props include the product in its most premium-looking form** — packaging, presentation, and variant should all maximize the "this looks expensive" impression
9. **The CTA repeats the price** — the viewer just watched someone be shocked by the number. The CTA should reinforce it
10. **Language to avoid from the onboarding form does NOT appear in any Host Line or Example Line**
11. **Pricing qualifiers are included in the Don't section** — if the price has conditions (subscription, limited time, specific variant), they must be noted

  - "And how often do you update your prescription?"

  - "Yeah, every year or two."
  - "The frames were fine, but they make you buy everything together."
  - "I love my frames. I don't want new ones."

  - "$300."
  - "Like $400 with the coatings."
  - "$500 — and that was WITH insurance."
  - "Too much. I don't even want to think about it."

  - "Full service, brand-new prescription lenses, installed in your existing frames... starting at $79."
- Host Action:
  - *Pause. Let the number land. Do not say anything for 2–3 seconds.*

**REACTIONS - Reactions we are aiming to receive**
- Example Line:

  - "That's way less than I expected."
  - "Are you serious? I just paid $400."
  - "I'd do that in a heartbeat."
  - "I have old frames sitting at home I'd bring back."

- Price is "starting at $79" — do not drop the "starting at." Different lens types and coatings have different tiers
- The service includes shipping both ways — interviewee ships frames in, LensDirect ships them back with new lenses

**Lens Direct — "What Are You Paying for Lenses?" (Sticker Shock Flip)**
Type: Sticker Shock Flip. Asks what the interviewee currently pays ($300–$500), reveals LensDirect starts at $79. The flip works because the interviewee's OWN number is the anchor — the brand doesn't have to claim the category is overpriced, the interviewee proves it with their own answer. Strong recommendation moment ("everyone who wears glasses").

**Taima Titanium — "How Much Does Titanium Cost?" (Guess High, Reveal Low)**
Type: Guess High, Reveal Low. The word "titanium" signals premium. People overestimate because the material sounds expensive and the product feels high-quality when they hold it. The reveal that it costs less than their current non-stick pan creates a "no excuse not to switch" moment. Value build: material (titanium), durability (lifetime), health (no PFAS/coatings). Each feature pushes the estimate higher.

**NoblTravel — "GPS, Scale, and a Phone Charger" (Escalating Feature Stack)**
Type: Escalating Feature Stack. Features are revealed one at a time: zipperless TSA locks → built-in cupholder → charging port → laptop pocket → phone holder handle → 360° wheels. After each feature, the interviewee's estimate goes up. The final price lands dramatically below the escalated estimate. Each feature is its own mini-hook that sustains watch time — the viewer is playing the guessing game too.

## Decision: Problem Depth

Before writing anything, determine how deep the problem needs to go. This drives the emotional weight of the AGITATION section and how much setup the product introduction needs.

**SURFACE-LEVEL PROBLEM** — The problem is immediately relatable and doesn't need much explanation. Most people in the target demo experience it regularly.
- Best for: Convenience products, grocery/meal delivery, productivity apps, everyday annoyances
- The AGITATION is brief (1–2 follow-ups) — the viewer already knows this pain
- The product introduction can be quick because the solution is easy to grasp
- Examples: Hungryroot (eating healthy is hard), LOCK IN (phone addiction), Aura Frames (photos buried in phone)

**DEEP PROBLEM** — The problem has layers. The interviewee may not even realize how bad it is until the host digs in. The agitation builds emotional weight.
- Best for: Health & wellness, insurance, financial services, legal/advocacy, B2B, education
- The AGITATION is longer (2–4 follow-ups) — each question peels back another layer
- The product introduction needs more explanation because the solution isn't obvious
- Examples: Turnout (disability benefits complexity), Hydroviv (water contamination they don't know about), Willow (GLP-1 eligibility misconception), Echelonn (marketing platform limitations)

**HIDDEN PROBLEM** — The interviewee doesn't know they have the problem. The host reveals it, creating a "wait, really?" moment before introducing the solution.
- Best for: Products that solve problems people have normalized or don't know exist
- The HOOK is designed to surface the hidden problem through a question or reveal
- The strongest moment is the realization — the interviewee discovers the problem IS a problem
- Examples: Hydroviv (your filter isn't designed for your water), Dr. Marty's (dog poop reveals gut health), Perelel (prenatal vitamins aren't one-size-fits-all)

This decision affects the HOOK framing, number of FOLLOW-UP questions, length of AGITATION, and how much education the PRODUCT INTRODUCTION needs.

#### 7a. HOOK

**Purpose:** Stop the person and surface the problem. The hook is a direct question about the problem the product solves — NOT about the product itself.

**CRITICAL RULES FOR HOOKS:**

1. **Be direct, not clever.** Ask about the problem simply and clearly. The interviewee should immediately understand what you're asking and feel qualified to answer.

2. **The scenario must be realistic.** The host is cold-approaching a stranger on the street. The question must be something any person in the target demo could answer on the spot. Do NOT assume they're in a specific situation.

3. **Never stage a fake coincidence.** No pretending the host is experiencing the problem. No assuming the interviewee is mid-activity.

4. **The problem question must be broad enough to land.** If the question is too narrow ("Do you struggle with disability benefits?"), most people will say no. If it's broad enough ("Have you or someone close to you ever dealt with government benefits?"), more people can engage.

**What GOOD hooks look like (from real briefs):**
- "What's the hardest part about eating healthy?" — broad, relatable, anyone can answer
- "Be honest — how many hours of screen time did you have yesterday?" — direct, slightly provocative
- "How many photos are on your phone right now?" — simple question that opens a bigger conversation
- "Have you or someone close to you ever applied for social security disability benefits?" — broad qualifier, inclusive
- "Would you rather have a filter customized for your water or a one-size-fits-all?" — instant comparison that surfaces a problem

**What BAD hooks look like:**
- ❌ "Do you struggle with staying focused? Because I have something that can help" — leads with the product, not the problem
- ❌ "You look like someone who doesn't eat well" — presumptuous, offensive
- ❌ *(Host pretends to be frustrated with their phone)* "Ugh, I can't stop scrolling" — staged fake coincidence
- ❌ "We're conducting research on a revolutionary new health product" — gimmicky, sounds like a pitch from the first second

**The formula:** Ask the interviewee about the PROBLEM — not the product, not the category, the problem itself. Make it broad enough that most people in the target demo can engage.

For Problem-to-Solution, the follow-up is not just gathering information — it's **building emotional weight**. Each question should make the problem feel heavier, more frustrating, more unresolved.

    ◦ "[Specific detail — a personal example or story]"
    ◦ "[Resignation response — they've accepted this is just how it is]"
    ◦ "[Scale response — how big the problem really is]"
\`\`\`

#### 7d. AGITATION

**Purpose:** This is the section that separates Problem-to-Solution from every other angle. After the interviewee has described the problem, the host **adds weight** — not by making them feel worse, but by revealing layers of the problem they may not have considered. This creates the emotional peak right before the product enters.

**CRITICAL: The agitation must be EMPATHETIC, not manipulative.** The host is saying "it's even worse than you think" from a place of genuine concern, not "let me scare you into buying something." The viewer should feel UNDERSTOOD, not attacked.

Types of agitation:
- **"Did you know?" agitation** — revealing a fact they didn't know that makes the problem bigger (e.g., "Did you know your Brita isn't actually designed for your city's water?")
- **"Most people don't realize" agitation** — normalizing their experience while showing them it doesn't have to be this way (e.g., "Most people don't know that you can qualify for GLP-1 even if you're not obese")
- **"What's that costing you?" agitation** — connecting the problem to a bigger impact (e.g., "How much time would you say you lose to that every week?")
- **"Emotional weight" agitation** — letting the interviewee sit in the frustration long enough to feel it (e.g., "Do you feel confident you're doing everything right?")

Write 1–3 agitation prompts and 3–4 target responses.

Format:
\`\`\`
AGITATION - Deepening the problem before presenting the solution
  • Host Line:
    ◦ "[Reveal a hidden layer of the problem]"
    ◦ "[Connect the problem to a bigger impact]"
  • Example Line:
    ◦ "[Realization — 'I never thought about it that way']"
    ◦ "[Frustration deepened — 'That actually makes it worse']"
    ◦ "[Vulnerability — 'Yeah... I don't know what to do about it']"
    ◦ "[Openness — 'I wish there was something that could help']"
\`\`\`

---

#### 7e. PRODUCT INTRODUCTION

**Purpose:** NOW the host introduces the product as the solution. This comes AFTER the problem has been fully surfaced and emotionally weighted — the interviewee (and viewer) are primed to hear a solution.

The product introduction should feel like a **natural resolution** to the conversation, not a pivot to a pitch. The host's tone should shift from empathetic listener to "actually, there IS something that addresses this."

Structure the product introduction as a 2–3 step explanation:
1. **Bridge from the problem** — acknowledge what the interviewee just said and signal that a solution exists
2. **Introduce the product/service** — name it, explain what it does in one clear sentence
3. **Connect it to THEIR specific problem** — tie the product's benefit directly to the frustration they just described

Format:
\`\`\`
PRODUCT INTRODUCTION - How our hosts will introduce the product
  • Host Line:
    ◦ "[Bridge — 'That's exactly why...' or 'What if I told you...']"
    ◦ "[What the product is — one clear sentence]"
    ◦ "[How it solves THEIR specific problem — connect back to what they said]"
\`\`\`

---

#### 7f. REACTIONS

**Purpose:** Define the target reactions after the interviewee hears about the product. These are the "relief moment" sound bites — the shift from frustration to hope/surprise/interest.

For Problem-to-Solution, the best reactions are:
- **Relief** — "That would take so much pressure off" / "That would've saved me so much time"
- **Surprise** — "Wait, that exists?" / "Why don't more people know about this?"
- **Validation** — "That's exactly what I need" / "I've been saying I need something like that"
- **Curiosity** — "How does that work?" / "What does that cost?"

Write 4–6 target reaction lines.

REACTIONS - Reactions we are aiming to receive
  • Example Line:
    ◦ "[Relief reaction]"
    ◦ "[Surprise reaction]"
    ◦ "[Validation reaction]"
    ◦ "[Curiosity reaction]"
\`\`\`

---

#### 7g. VALUE PROPS

**Purpose:** Reinforce the solution with 3–4 specific benefits. Each value prop should address a SPECIFIC layer of the problem that was surfaced earlier. If the interviewee complained about cost, hit the pricing value prop. If they complained about complexity, hit the simplicity value prop.

Each value prop should feel like it's answering an unspoken objection — the interviewee shouldn't have to ask "but what about...?" because the host anticipates it.

Format:
\`\`\`
VALUE PROPS - How our hosts describe the features/benefits of the product
  • Host Line:
    ◦ "[Value prop #1 — addresses the primary pain point directly]"
    ◦ "[Value prop #2 — addresses a secondary concern or objection]"
    ◦ "[Value prop #3 — unexpected benefit that adds to the relief]"
\`\`\`

---

#### 7h. RECOMMENDATION

**Purpose:** This is unique to Problem-to-Solution. After the interviewee has heard the solution and reacted positively, the host asks: **"Who would you recommend this to?"** or **"Who in your life could use this?"**

This serves two purposes:
1. It creates a natural word-of-mouth moment — the interviewee becomes an advocate on camera
2. It expands the target audience — the viewer might not identify with the interviewee, but they might identify with the person the interviewee recommends it to ("my mom," "anyone who struggles with...," "every small business owner")

Write 1 host prompt and 3–4 target recommendation responses.

Format:

  • Host Line:

    ◦ "[Emphatic — 'Everyone. Everyone needs to know about this.']"

## Quality Checks

Before finalizing the output, verify:

1. **Every hook is direct and realistic** — the hook asks about the PROBLEM, not the product. Would this question actually work on a sidewalk? Is it broad enough to land with most people in the target demo?
2. **The problem comes BEFORE the product — always.** The interviewee should describe their frustration for at least 2–3 exchanges before the product is ever mentioned. If the product appears too early, the angle feels like a pitch
3. **The AGITATION section adds genuine weight** — it should make the viewer think "yeah, that IS a big deal." If it feels manipulative or fear-based, rewrite with empathy
4. **Every Host Line sounds conversational** — read it aloud. If it sounds like ad copy, rewrite it
5. **The product introduction feels like a natural resolution** — the transition from problem to product should feel like "oh, that makes sense" not "and now here's our sponsor." Test the bridge sentence — does it flow from the last thing the interviewee said?
6. **REACTIONS include surprise and relief, not just positivity** — "that's cool" is weak. "Wait, that exists?" is strong. The reactions should reflect the emotional shift from frustration to hope
7. **The RECOMMENDATION section is present** — this is what makes Problem-to-Solution unique. The interviewee must be asked who they'd recommend it to
8. **Pain points from the onboarding form appear in INITIAL RESPONSES** — the viewer needs to see their own frustration in the interviewee's words
9. **The CTA matches Input 4 exactly** — if a CTA was provided, use it verbatim
10. **Language to avoid from the onboarding form does NOT appear in any Host Line or Example Line**
11. **Compliance restrictions are reflected in the Don't section** — especially for health, insurance, legal, financial, and supplement brands
12. **The problem depth matches the product** — a convenience app shouldn't have 4 layers of emotional agitation. A disability benefits service shouldn't have a surface-level 1-question setup

  - "Did you have anyone actually walking you through the process?"

  - "No... not really. You just do your best."
  - "I wish I had someone."

  - "Why don't more people know about that?"
  - "I didn't even know that was a thing."

## Decision: Named Competitor vs. Category Comparison

Before writing anything, make this determination based on the inputs:

**Use a NAMED competitor comparison when:**
- The brand explicitly names a competitor they want to position against
- The brand provides or approves having the competitor's product on camera
- The competitor is a well-known brand that the target audience immediately recognizes
- The brand's legal/compliance team has approved comparative claims
- The comparison is taste, feel, or experience-based (not performance claims that require substantiation)

**Use a CATEGORY-LEVEL comparison when:**
- The onboarding form or call transcript says "don't name competitors" or "don't bash competitors"
- The brand is in a regulated industry (health, supplements, finance, medical)
- The comparison is against a *type* of product rather than a specific brand (e.g., "non-stick pans" vs. "titanium," "mass-market perfumes" vs. "niche fragrance")
- The brand wants to feel premium/above-it-all rather than combative
- Legal risk exists around comparative advertising claims

This decision affects the HOOK, PROPS, PRODUCT INTRODUCTION, and Do/Don't sections.

This is the core of the brief. It lives under a bold, underlined heading: **Angle Framework:**

Each conversation flow step is its own block. The block label format is:

\`SECTION NAME - Description of what this section does\`

Inside each block, use these internal labels:
- **Host Line:** — What the host says (dialogue in quotes on sub-bullets)
- **Example Line:** — Target interviewee responses (dialogue in quotes on sub-bullets)
- **Host Action:** — Physical staging directions (in italicized or colored text on sub-bullets)

Every line should sound like something a real person would say on the street — conversational, not corporate. No jargon the interviewee wouldn't understand. No lines that sound like ad copy.

The conversation flow for Us vs. Them follows this exact order (8 blocks):

---

#### 7a. HOOK

**Purpose:** Stop the person, establish the comparison premise, create immediate visual interest.

**CRITICAL RULES FOR HOOKS:**

1. **Be direct, not clever.** The hook is a simple, straightforward question or statement. Do NOT write hooks that try to be witty, set up elaborate scenarios, or use gimmicky framing. A good hook sounds like a normal person asking a normal question on the street.

2. **The scenario must be realistic.** Ask yourself: "Would this actually happen in public?" The host is cold-approaching a stranger on the street. The ONLY thing the host can realistically know about the interviewee is what's visible — they're walking by, they might be carrying a grocery bag, they might be near a gym, they're in a public place. The host CANNOT assume the interviewee is doing or using anything specific that wouldn't be visible or common in public.

3. **Never stage a fake coincidence.** Do NOT write hooks where the host pretends to be casually using the competitor's product and "happens" to stop someone. Do NOT write hooks where the host assumes the interviewee is mid-activity with a specific product. These feel staged and destroy credibility.

**What GOOD hooks look like (from real briefs):**
- "Quick question. What kind of pan do you usually cook with?" — simple, direct, anyone can answer
- "Quick game. One of these is a daily drink. One of these is an occasional drink." — direct premise, no fake setup
- "Hey, real quick — do you use a moisturizer?" — simple qualifier

**What BAD hooks look like (never write these):**
- ❌ "Hey, real quick — you drink Hawaiian Punch?" — why would the host assume this? Too specific
- ❌ *(Host is mid-sip of competitor product, stops someone)* "Hey, have you tried this?" — staged fake coincidence
- ❌ "I'm going to blow your mind with what's really in your skincare" — too clever, sounds like a pitch
- ❌ "We're doing a secret experiment today…" — gimmicky, not direct

**The formula:** The host asks the interviewee a broad question about the product CATEGORY (not a specific brand), qualifies that they use or are familiar with it, then transitions into the comparison. That's it.

Write 1–2 hook options.

Format:
\`\`\`
HOOK - How we are going to begin the interaction
  • Host Line:
    ◦ "[Simple, direct question about the product category]"
\`\`\`

---

#### 7b. FOLLOW-UP QUESTION

**Purpose:** Get the interviewee talking about their current experience with the product category. This surfaces the pain points that the brand's product solves.

The follow-up should make the interviewee **reveal their relationship with the "Them" product** before the comparison begins. Keep it short — one or two questions max.

Format:
\`\`\`
FOLLOW-UP QUESTION - To prompt a response from the interviewee
  • Host Line:
    ◦ "How long have you had it?"
    ◦ "[Second question about their current experience]"
\`\`\`

---

#### 7c. INITIAL RESPONSES

**Purpose:** Define what "good" interviewee responses sound like. These guide the host on what to listen for and which threads to pull.

Pull from:
- **Customer pain points** in the onboarding form
- **Competitor weaknesses** mentioned in the call transcript
- **Common complaints** about the product category

Write 4–6 example responses.

Format:
\`\`\`
INITIAL RESPONSES - Target response from interviewee
  • Example Line:
    ◦ "[Response — current product type they use]"
    ◦ "[Response — how long / how often they replace]"
    ◦ "[Response — frustration or known issue]"
    ◦ "[Response — curiosity or concern about the category]"
\`\`\`

---

#### 7d. DEMONSTRATION

**Purpose:** This is the physical comparison moment — the centerpiece of the Us vs. Them angle. It sits BETWEEN Initial Responses and Product Introduction because the interviewee needs to SEE or EXPERIENCE the comparison before they hear the brand pitch.

Give this section a descriptive subtitle that captures the mechanic (e.g., "Recognition moment," "Side-by-side taste test," "Ingredient comparison").

**For physical/durability demos:** The host shows the competing product's weakness visually — a scratched pan, a worn label, flaking coating. The visual does the talking. Do NOT explain yet. Let the visual land first.
**For taste/try tests:** The host has the interviewee try both products back-to-back and react.
**For ingredient/label comparisons:** The host shows both products' labels side by side.

This section uses BOTH Host Action (physical staging) AND Example Line (target reactions to the demo).

Format:
\`\`\`
DEMONSTRATION – [Descriptive subtitle]
  • Host Action:
    ◦ [Physical action — do not explain yet. Let the visual land first.]
    ◦ [Show/present the competing product's weakness]
    ◦ [Angle the product toward camera]
  • Example Line:
    ◦ "[Recognition reaction — 'Yeah, mine looks like that']"
    ◦ "[Pain point reaction — 'That always happens to mine']"
    ◦ "[Concern reaction — 'Isn't that bad for you?']"
    ◦ "[Replacement reaction — 'That's why I keep replacing them']"
\`\`\`

**Key rule for DEMONSTRATION:** The Host Action comes FIRST with no verbal explanation. Let the interviewee react to what they see/taste/feel before the host says anything. The interviewee's uncoached reaction is the most valuable moment in the entire ad.

---

#### 7e. PRODUCT INTRODUCTION

**Purpose:** NOW the host explains why the brand's product is different. This comes AFTER the demonstration — the interviewee has already seen/felt/tasted the problem with the "Them" product.

Structure the product introduction as a 2–3 step explanation:
1. **Acknowledge the category** — what the competing product is designed to do (neutral, factual)
2. **Explain the problem** — why the competing approach fails over time (factual, not fear-based)
3. **Introduce the brand's solution** — how this product works differently and what that means

Each step should be its own Host Line, written as a complete spoken sentence.

Format:
\`\`\`
PRODUCT INTRODUCTION - How our hosts will introduce the product
  • Host Line:
    ◦ "[Step 1: What the category product is designed to do — neutral framing]"
    ◦ "[Step 2: Why the conventional approach has limitations — factual, grounded]"
    ◦ "[Step 3: How this brand's product works differently. Meet the [Brand Name].]"
\`\`\`

---

#### 7f. REACTIONS

**Purpose:** Define the reactions we're aiming to capture after the product introduction. These are the "money shots."

For Us vs. Them, the best reactions are:
- Understanding ("That actually makes sense")
- Physical surprise ("It feels really solid" / "Oh that's way smoother")
- Realization ("I didn't know [product category] could work like that")
- Purchase intent ("This feels like a better long-term option")

Write 4–6 target reaction lines.

Format:
\`\`\`
REACTIONS - Reactions we are aiming to receive
  • Example Line:
    ◦ "[Understanding reaction]"
    ◦ "[Physical/sensory reaction]"
    ◦ "[Realization reaction]"
    ◦ "[Purchase intent reaction]"
\`\`\`

---

#### 7g. VALUE PROPS

**Purpose:** Give the host 3–4 talking points to reinforce after the interviewee has already reacted positively. Each value prop should be a complete sentence the host can say naturally.

Each value prop should be framed as a **contrast** to the competitor — this is what makes it an "Us vs. Them" value prop rather than a generic feature list.

Format:
\`\`\`
VALUE PROPS - How our hosts describe the features/benefits of the product
  • Host Line:
    ◦ "[Value prop #1 — key material/ingredient/formulation differentiator]"
    ◦ "[Value prop #2 — durability/longevity/daily use advantage vs. competitor]"
    ◦ "[Value prop #3 — lifestyle/convenience benefit]"
\`\`\`

---

#### 7h. CTA

**Purpose:** Close the interview with a clear call to action. Use the CTA from Input 4 verbatim. If Input 4 is empty, use the offer from the onboarding form. Spell out the URL phonetically if it's not intuitive.

Format:
\`\`\`
CTA - How our hosts will close the interview
  • Host Line:
    ◦ "[CTA with website (spelled out), discount code, or offer]"
\`\`\`

---

### SECTION 8: KEY MENTIONS

List critical terms, compliance notes, or boundary reminders that the production team and hosts must keep in mind. These are typically things that came up in the call transcript or onboarding form that don't fit neatly into the Do/Don't section but must be remembered.

Format:
\`\`\`
### Key Mentions:
- [Compliance note or boundary reminder]
- [Critical term or phrase]
\`\`\`

---

## Quality Checks

Before finalizing the output, verify:

1. **Every hook is direct and realistic** — read the hook and ask: "Would this actually happen on a sidewalk?" If it requires a staged setup, a fake coincidence, or an assumption about what the stranger is doing, rewrite it as a simple direct question about the product category
2. **The comparison is clear within the first 3 seconds of the HOOK** — the viewer must immediately understand that two things are being compared
3. **The interviewee's preference comes BEFORE the brand pitch** — never lead with "our product is better"
4. **Every Host Line sounds conversational** — read it aloud. If it sounds like ad copy, rewrite it
5. **The Do/Don't section addresses competitor naming** — explicitly state whether competitors can or cannot be named
6. **Props are specific enough for a production team to source** — "a non-stick pan" is not specific enough; "a worn coated non-stick pan (thin, inexpensive)" is
7. **Pain points from the onboarding form appear in INITIAL RESPONSES** — the interviewee reactions should mirror real customer language
8. **Value Props are framed as contrasts, not standalone features** — every value prop should implicitly or explicitly reference what the competitor lacks
9. **The CTA matches Input 4 exactly** — if a CTA was provided, use it verbatim. Do not rephrase
10. **Language to avoid from the onboarding form does NOT appear in any Host Line or Example Line**
11. **Compliance restrictions from the brand's industry are reflected in the Don't section** — especially for health, supplements, food, and finance brands

---

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const saved = JSON.parse(raw);
    // Merge — ensure default DB items exist
    return {
      brands: saved.brands && saved.brands.length ? saved.brands : DEFAULT_STATE.brands,
      // Always use DEFAULT_STATE as master angle list; preserve saved videoUrls for matching IDs
      angles: DEFAULT_STATE.angles.map(da => {
        const sv = (saved.angles || []).find(sa => sa.id === da.id);
        return sv ? Object.assign({}, da, { videoUrl: sv.videoUrl || da.videoUrl }) : da;
      }),
      shots: saved.shots && saved.shots.length ? saved.shots : DEFAULT_STATE.shots,
      // Always use DEFAULT_STATE as master hook list; preserve saved videoUrls for matching IDs
      hooks: DEFAULT_STATE.hooks.map(dh => {
        const sv = (saved.hooks || []).find(sh => sh.id === dh.id);
        return sv ? Object.assign({}, dh, { videoUrl: sv.videoUrl || dh.videoUrl }) : dh;
      }),
      projects: saved.projects || [],
      briefs: saved.briefs || [],
    };
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}

    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i + 1] === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
        row.push(field.trim()); field = '';
        if (row.some(f => f)) rows.push(row);
        row = [];
        if (ch === '\r') i++;
      } else { field += ch; }
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(f => f)) rows.push(row); }
  return rows;
}

function _extractDomain(url) {
  if (!url) return '';
  try {
    let clean = url.trim();
    if (!/^https?:\/\//i.test(clean)) clean = 'https://' + clean;
    return new URL(clean).hostname.replace(/^www\./, '');
  } catch(e) { return url.replace(/^https?:\/\/(www\.)?/i, '').split('/')[0]; }
}

async function syncBrandsFromSheet() {
  const indicator = document.getElementById('brand-sync-indicator');
  try {
    if (indicator) { indicator.textContent = 'Syncing...'; indicator.className = 'brand-sync-ind syncing'; }

    // Use Google Visualization API (supports CORS for link-shared sheets)
    const vizUrl = `https://docs.google.com/spreadsheets/d/${BRAND_SHEET_ID}/gviz/tq?tqx=out:csv&gid=${BRAND_SHEET_GID}`;
    const resp = await fetch(vizUrl);
    if (!resp.ok) throw new Error('Sheet fetch failed: ' + resp.status);
    const text = await resp.text();
    const rows = _parseCSV(text);
    if (rows.length < 2) { if (indicator) { indicator.textContent = 'No data'; indicator.className = 'brand-sync-ind'; } return; }

    // Column mapping (row 0 is headers):
    // A(0): brand name, B(1): website URL, E(4): products
    const headers = rows[0];
    const dataRows = rows.slice(1);
    let added = 0;
    let updated = 0;

    for (const row of dataRows) {
      const name = (row[0] || '').trim();
      if (!name) continue;
      const websiteUrl = (row[1] || '').trim();
      const domain = _extractDomain(websiteUrl);
      const productsRaw = (row[4] || '').trim();
      // Split products by comma, newline, or semicolon
      const products = productsRaw ? productsRaw.split(/[,;\n]+/).map(p => p.trim()).filter(Boolean) : [];

      // Check if brand already exists (match by name, case-insensitive)
      const existing = S.brands.find(b => b.name.toLowerCase() === name.toLowerCase());
      if (existing) {
        // Update domain and products if they were empty
        let changed = false;
        if (!existing.domain && domain) { existing.domain = domain; changed = true; }
        if ((!existing.products || existing.products.length === 0) && products.length > 0) { existing.products = products; changed = true; }
        if (changed) updated++;
      } else {
        // Add new brand
        S.brands.push({
          id: uid(),
          name: name,
          domain: domain,
          products: products,
        });
        added++;
      }
    }

    if (added > 0 || updated > 0) {
      saveState();
      // Refresh current view if on home or projects
      if (currentView === 'home' || currentView === 'projects') nav(currentView);
    }

    const syncTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (indicator) {
      indicator.textContent = added > 0 ? `+${added} new · ${syncTime}` : `Synced · ${syncTime}`;
      indicator.className = 'brand-sync-ind synced';
    }
    console.log(`[BrandSync] ${dataRows.length} rows, ${added} added, ${updated} updated`);
  } catch(e) {
    console.warn('[BrandSync] Failed:', e.message);
    if (indicator) { indicator.textContent = 'Sync failed'; indicator.className = 'brand-sync-ind error'; }
  }
}

function startBrandSync() {
  // Initial sync on load
  syncBrandsFromSheet();
  // Periodic sync
  clearInterval(_brandSyncTimer);
  _brandSyncTimer = setInterval(syncBrandsFromSheet, BRAND_SYNC_INTERVAL);
}

function _debouncedAutoSave(projectId, section) {
  clearTimeout(_autoSaveTimer);

  const ind = document.getElementById('autosave-' + section);
  if (ind) { ind.className = 'autosave-indicator'; ind.innerHTML = '<span class="save-dot"></span> Saving...'; }

  }, 1000);
}

function _doAutoSave(projectId, section) {
  let brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) {
    brief = { id: uid(), projectId, selectedAngles: [], guidelines: '', cta: '', callTranscript: '', onboardingForm: '', shotAssignments: [], hookAssignments: [], generatedScripts: [], status: 'draft', presentationToken: '', comments: [], approvals: {}, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    S.briefs.push(brief);
  }
  if (section === 'bb') {
    brief.guidelines     = document.getElementById(`bb-guidelines-${projectId}`)?.value || '';
    brief.cta            = document.getElementById(`bb-cta-${projectId}`)?.value || '';
    brief.callTranscript = document.getElementById(`bb-call-transcript-${projectId}`)?.value || '';
    brief.onboardingForm = document.getElementById(`bb-onboarding-form-${projectId}`)?.value || '';

  brief.updatedAt = new Date().toISOString();

function getActiveProjectId() {

  if (_activeProjectId && myProjects.find(p => p.id === _activeProjectId)) return _activeProjectId;

      </div>

      <div class="stepper-track"><div class="stepper-fill" style="width:${(() => {
        const activeIdx = WORKFLOW_STEPS.findIndex(s => s.view === currentView);

        return '100%';

            <input class="form-input" id="bb-cta-${projectId}" placeholder="e.g. Use code STREETTALK for 20% off →" value="${brief.cta || ''}" oninput="_debouncedAutoSave('${projectId}','bb')">

function toggleAngle(projectId, angleId, cardEl) {
  let brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) {
    brief = { id: uid(), projectId, selectedAngles: [], guidelines: '', cta: '', callTranscript: '', onboardingForm: '', shotAssignments: [], hookAssignments: [], generatedScripts: [], status: 'draft', presentationToken: '', comments: [], approvals: {}, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    S.briefs.push(brief);
  }

  const idx = brief.selectedAngles.findIndex(sa => sa.angleId === angleId);
  if (idx >= 0) {
    brief.selectedAngles.splice(idx, 1);
    cardEl.classList.remove('selected');
  } else {
    brief.selectedAngles.push({ angleId, notes: '' });
    cardEl.classList.add('selected');
  }
  saveState();
  renderContextBar();
  // Flash saved indicator
  const ind = document.getElementById('autosave-bb');
  if (ind) { ind.className = 'autosave-indicator saved'; ind.innerHTML = '<span class="save-dot"></span> Saved'; }
  updateBBSummary(projectId);
}

function updateBBSummary(projectId) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  const count = brief ? brief.selectedAngles.length : 0;
  const el = document.getElementById(`bb-selected-summary-${projectId}`);
  if (!el) return;
  if (count === 0) { el.innerHTML = `<div style="color:var(--text3);font-size:12px;">No angles selected yet.</div>`; return; }
  const names = (brief.selectedAngles || []).map(sa => {
    const a = S.angles.find(x => x.id === sa.angleId);
    return a ? a.name : sa.angleId;
  });
  el.innerHTML = `<div style="font-size:12px;color:var(--green);">✓ ${count} angle${count !== 1?'s':''} selected: ${names.join(', ')}</div>`;
}

function saveBriefBuilding(projectId) {
  let brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) {
    brief = { id: uid(), projectId, selectedAngles: [], guidelines: '', cta: '', callTranscript: '', onboardingForm: '', shotAssignments: [], hookAssignments: [], generatedScripts: [], status: 'draft', presentationToken: '', comments: [], approvals: {}, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    S.briefs.push(brief);
  }
  brief.guidelines     = document.getElementById(`bb-guidelines-${projectId}`)?.value || '';
  brief.cta            = document.getElementById(`bb-cta-${projectId}`)?.value || '';
  brief.callTranscript = document.getElementById(`bb-call-transcript-${projectId}`)?.value || '';
  brief.onboardingForm = document.getElementById(`bb-onboarding-form-${projectId}`)?.value || '';
  brief.updatedAt = new Date().toISOString();
  saveState();
  renderContextBar();
  showToast('Angle selection saved!');
  setTimeout(() => nav('hook-selection'), 600);
}

function previewVideo(url, title) {
  const embed = getEmbedUrl(url);
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = `
    <div class="modal modal-wide">
      <div class="modal-title" style="margin-bottom:16px;">▶ ${title}</div>
      ${embed ? `<div class="video-embed"><iframe src="${embed}" allowfullscreen></iframe></div>` : `<div class="notice">Could not embed this URL. <a href="${url}" target="_blank" style="color:var(--accent);">Open in new tab →</a></div>`}
      <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
    </div>
  `;
  document.body.appendChild(m);
}

function getEmbedUrl(url) {
  if (!url) return null;
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  if (yt) return `https://www.youtube.com/embed/${yt[1]}?autoplay=1`;
  const vm = url.match(/vimeo\.com\/(\d+)/);
  if (vm) return `https://player.vimeo.com/video/${vm[1]}?autoplay=1`;
  return null;
}

function openHookPicker(projectId, angleId) {
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.id = 'hook-picker-overlay';
  document.body.appendChild(m);
  renderHookPicker(projectId, angleId);
}

let _hookPickerFilter = { search: '', format: '' };

function _getFilteredHooks() {
  return S.hooks.filter(h => {
    if (_hookPickerFilter.format && h.format !== _hookPickerFilter.format) return false;
    if (_hookPickerFilter.search) {
      const q = _hookPickerFilter.search.toLowerCase();
      if (!h.name.toLowerCase().includes(q) && !(h.tags||'').toLowerCase().includes(q) && !(h.description||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function _renderHookList(projectId, angleId) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  const assignment = (brief?.hookAssignments || []).find(x => x.angleId === angleId) || { hooks: [] };
  const assignedIds = assignment.hooks.map(h => h.hookId);
  const filteredHooks = _getFilteredHooks();
  const listEl = document.getElementById('hook-picker-list');
  if (!listEl) return;
  if (filteredHooks.length === 0) { listEl.innerHTML = `<div style="color:var(--text3);font-size:13px;text-align:center;padding:24px 0;">No hooks match your search.</div>`; return; }
  listEl.innerHTML = filteredHooks.map(hook => {
    const assigned = assignedIds.includes(hook.id);
    const fmtColor = hook.format === 'Organic' ? 'var(--green)' : 'var(--accent)';
    const fmtBg    = hook.format === 'Organic' ? 'var(--green-light)' : 'var(--accent-light)';
    const vimeoMatch = hook.videoUrl && hook.videoUrl.match(/vimeo\.com\/(\d+)/);
    const embedSrc = vimeoMatch ? `https://player.vimeo.com/video/${vimeoMatch[1]}` : null;
    return `
      <div style="border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:stretch;${assigned ? 'background:rgba(34,197,94,0.06);border-left:3px solid #22c55e;' : ''}">
          <!-- Left: hook info (clickable to add) -->
          <div style="flex:1;padding:14px 16px;cursor:${assigned ? 'default' : 'pointer'};min-width:0;" onclick="${assigned ? '' : `addHookToAngle('${projectId}','${angleId}','${hook.id}');_renderHookList('${projectId}','${angleId}');`}">
            <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:2px;">${hook.name}</div>
            ${hook.tags ? `<div style="font-size:11px;color:var(--text3);margin-top:2px;">${hook.tags}</div>` : ''}
            ${hook.description ? `<div style="font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5;">${hook.description}</div>` : ''}
          </div>
          <!-- Right: badge + preview (separate section) -->
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-left:1px solid var(--border);min-width:90px;" onclick="event.stopPropagation()">
            <span style="display:inline-block;padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;background:${fmtBg};color:${fmtColor};white-space:nowrap;">${hook.format}</span>
            ${assigned ? `<span style="font-size:11px;color:var(--green);font-weight:600;">✓ Added</span>` : ''}
            ${embedSrc ? `
              <button onclick="toggleHookPickerPreview('${hook.id}')" id="hook-preview-btn-${hook.id}"
                style="width:44px;height:44px;border-radius:10px;border:1px solid var(--border);background:var(--surface3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;"
                onmouseenter="this.style.background='var(--accent)';this.style.borderColor='var(--accent)';this.style.color='#fff';"
                onmouseleave="this.style.background='var(--surface3)';this.style.borderColor='var(--border)';this.style.color='var(--text2)';">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg>
              </button>` : ''}
          </div>
        </div>
        ${embedSrc ? `
          <div id="hook-preview-panel-${hook.id}" style="display:none;padding:0 12px 12px;">
            <div style="aspect-ratio:9/16;max-width:240px;margin:0 auto;border-radius:8px;overflow:hidden;background:#000;">
              <iframe src="${embedSrc}" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>
            </div>
          </div>` : ''}
      </div>
    `;
  }).join('');
}

function renderHookPicker(projectId, angleId) {
  const m = document.getElementById('hook-picker-overlay');
  if (!m) return;
  _hookPickerFilter = { search: '', format: '' };
  m.innerHTML = `
    <div class="modal" style="max-width:540px;">
      <div class="modal-title">Add Hooks</div>
      <div class="modal-sub">Select hooks from the playbook, then click Done.</div>
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <input class="form-input" id="hook-picker-search" placeholder="Search hooks..." style="flex:1;">
        <select class="form-select" id="hook-picker-format" style="width:auto;min-width:120px;">
          <option value="">All Formats</option>
          <option value="Paid Ads">Paid Ads</option>
          <option value="Organic">Organic</option>
        </select>
      </div>
      <div id="hook-picker-list"></div>
      <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Done</button></div>
    </div>
  `;
  // Wire up search & filter events — only update the list, not the whole modal
  document.getElementById('hook-picker-search').addEventListener('input', function() {
    _hookPickerFilter.search = this.value;
    _renderHookList(projectId, angleId);
  });
  document.getElementById('hook-picker-format').addEventListener('change', function() {
    _hookPickerFilter.format = this.value;
    _renderHookList(projectId, angleId);
  });
  // Initial render of the list
  _renderHookList(projectId, angleId);
}

function toggleHookPickerPreview(hookId) {
  const panel = document.getElementById(`hook-preview-panel-${hookId}`);
  const btn   = document.getElementById(`hook-preview-btn-${hookId}`);
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  // Toggle button appearance when open
  if (btn) {
    if (isOpen) { btn.style.background = 'var(--surface3)'; btn.style.borderColor = 'var(--border)'; btn.style.color = 'var(--text2)'; }
    else { btn.style.background = 'var(--accent)'; btn.style.borderColor = 'var(--accent)'; btn.style.color = '#fff'; }
  }
}

function addHookToAngle(projectId, angleId, hookId) {
  let brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  if (!brief.hookAssignments) brief.hookAssignments = [];
  let assignment = brief.hookAssignments.find(x => x.angleId === angleId);
  if (!assignment) {
    assignment = { angleId, hooks: [] };
    brief.hookAssignments.push(assignment);
  }
  if (assignment.hooks.some(h => h.hookId === hookId)) return;
  const hook = S.hooks.find(h => h.id === hookId);
  assignment.hooks.push({ hookId, notes: '', format: hook ? hook.format : '' });
  saveState();
  renderContextBar();
  onHSProjectChange(projectId);
  const ind = document.getElementById('autosave-hs');
  if (ind) { ind.className = 'autosave-indicator saved'; ind.innerHTML = '<span class="save-dot"></span> Saved'; }
}

function removeHookFromAngle(projectId, angleId, idx) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  const assignment = brief.hookAssignments?.find(x => x.angleId === angleId);
  if (!assignment) return;
  assignment.hooks.splice(idx, 1);
  saveState();
  renderContextBar();
  onHSProjectChange(projectId);
  const ind = document.getElementById('autosave-hs');
  if (ind) { ind.className = 'autosave-indicator saved'; ind.innerHTML = '<span class="save-dot"></span> Saved'; }
}

function updateHookNotes(projectId, angleId, idx, val) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  const assignment = brief.hookAssignments?.find(x => x.angleId === angleId);
  if (!assignment || !assignment.hooks[idx]) return;
  assignment.hooks[idx].notes = val;
  _debouncedAutoSave(projectId, 'hs');
}

function saveHookSelection(projectId) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (brief) { brief.updatedAt = new Date().toISOString(); saveState(); }
  renderContextBar();
  showToast('Hook selection saved!');
  setTimeout(() => nav('brief-generation'), 600);
}

function onBGProjectChange(projectId) {
  const container = document.getElementById('bg-project-content');
  if (!projectId) { container.innerHTML = ''; return; }

  const brief = S.briefs.find(b => b.projectId === projectId);
  const project = S.projects.find(p => p.id === projectId);
  const brand = project ? S.brands.find(b => b.id === project.brandId) : null;

  if (!brief || !brief.selectedAngles.length) {
    container.innerHTML = `<div class="notice">⚠️ Complete Angle Selection first. <a href="#" onclick="nav('brief-building')" style="color:var(--accent);">Go there →</a></div>`;

      <div style="background:#7f1d1d;border:1px solid #dc2626;border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:flex-start;gap:12px;">

        <div>
          <div style="font-weight:700;font-size:13px;color:#fca5a5;margin-bottom:4px;">Missing required information</div>
          <div style="font-size:12px;color:#fca5a5;opacity:0.85;">
            ${missingTranscript ? '• Onboarding Call Transcript is required<br>' : ''}
            ${missingForm ? '• Onboarding Form is required<br>' : ''}
          </div>
          <a href="#" onclick="nav('brief-building')" style="font-size:12px;color:#f87171;font-weight:600;text-decoration:none;margin-top:6px;display:inline-block;">Go to Angle Selection to add them →</a>
        </div>
      </div>` : ''}
    <div style="margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-primary" data-gen-btn="${projectId}" ${isGenerating || missingTranscript || missingForm ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''} onclick="${isGenerating || missingTranscript || missingForm ? '' : `generateBrief('${projectId}')`}">✨ ${hasScripts ? 'Re-generate Angles' : 'Generate Angles'}</button>
      ${hasScripts && !isGenerating ? `
        <button class="btn btn-green" onclick="publishBrief('${projectId}')">🚀 ${brief.status === 'published' ? 'Republish Brief' : 'Publish & Share'}</button>
        ${brief.status === 'published' ? `<button class="btn btn-secondary" onclick="openPresentation('${brief.presentationToken}')">👁 View Presentation</button>` : ''}
      ` : ''}
    </div>
    <div id="bg-about-${projectId}">${brief.aboutSection && !isGenerating ? renderAboutSection(brief, true) : ''}</div>
    <div id="bg-scripts-${projectId}">
      ${isGenerating ? '' : (hasScripts ? renderScripts(brief) : `<div style="color:var(--text3);font-size:13px;">Click "Generate Angles" to create UGC scripts for each selected angle.</div>`)}
    </div>
  `;

  // If generation is in progress, re-attach the loading spinner
  if (isGenerating) {
    _showGenLoader(projectId);
  }
  // Auto-size any script textareas to fit their content
  setTimeout(() => {
    document.querySelectorAll('.script-editor').forEach(ta => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
  }, 0);
}

function _esc(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── ABOUT THE BRAND SECTION ──────────────────────────────────────────────
function renderAboutSection(brief, editable) {

  const bid = brief.id;

  const ea = editable ? ' contenteditable="false" onclick="fwStartEdit(this)" onblur="aboutFinishEdit(this)" onkeydown="fwEditKeydown(event,this)"' : '';

    <div style="${cardStyle}">
      <span style="font-size:20px;">👂</span>
      <div style="flex:1;min-width:0;display:flex;align-items:center;gap:10px;">

        ${editable ? `<input type="file" accept="audio/*" id="about-audio-${bid}" onchange="aboutAudioUpload(this,'${bid}')" style="display:none;">

          ${about.audioUrl && !about.audioUrl2 ? `<input type="file" accept="audio/*" id="about-audio2-${bid}" onchange="aboutAudio2Upload(this,'${bid}')" style="display:none;"><span onclick="document.getElementById('about-audio2-${bid}').click()" style="font-size:13px;color:#fff;cursor:pointer;font-weight:600;flex-shrink:0;opacity:0.7;transition:opacity 0.15s;" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.7'">add audio +</span>` : ''}` : (about.audioUrl ? _customAudioHtml(_esc(about.audioUrl), 'view-' + bid) : '<span style="font-size:14px;color:var(--text3);">No audio</span>')}

    ${about.audioUrl2 ? `<div style="${cardStyle}">

        ${editable ? `<input type="file" accept="audio/*" id="about-audio2-${bid}" onchange="aboutAudio2Upload(this,'${bid}')" style="display:none;">

    <div style="${cardStyle}">

        ${editable
          ? `<input id="about-product-url-${bid}" value="${_esc(about.productUrl || '')}" onchange="aboutFieldSave('${bid}','productUrl',this.value)" placeholder="https://..." style="background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--accent);font-size:15px;font-weight:600;padding:2px 4px;outline:none;width:60%;font-family:inherit;text-decoration:underline;text-underline-offset:3px;" />`
          : (about.productUrl ? `<a href="${_esc(about.productUrl)}" target="_blank" style="color:var(--accent);font-size:15px;font-weight:600;text-decoration:underline;text-underline-offset:3px;">${_esc(project?.productName || about.productUrl)}</a>` : '<span style="color:var(--text3);font-size:15px;">No product link</span>')}

function renderGuidelinesSection(guidelinesText, ctx) {
  const interactive = ctx && ctx.briefId && ctx.angleId;
  const ea = interactive ? ' onclick="fwStartEdit(this)" onblur="glFinishEdit(this)" onkeydown="fwEditKeydown(event,this)"' : '';
  const ei = interactive ? '<span class="fw-edit-icon" contenteditable="false"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></span>' : '';

  function mdBold(text) {
    return _esc(text).replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text);font-weight:700;">$1</strong>');
  }

  const lines = guidelinesText.split('\n');
  const dos = [];
  const donts = [];
  const hostLines = [];
  const interviewLines = [];
  let currentSection = '';

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed === '---') continue;
    if (/^## Guidelines:/i.test(trimmed)) continue;
    if (/^### /i.test(trimmed)) {
      const title = trimmed.replace(/^### /, '');
      if (/do.*don/i.test(title)) { currentSection = 'dos'; }
      else if (/host/i.test(title)) { currentSection = 'host'; }
      else if (/interview/i.test(title)) { currentSection = 'interview'; }
      continue;
    }
    const stripped = trimmed.replace(/^[-*•]\s+/, '');
    if (currentSection === 'dos') {
      if (/^\*{0,2}Do(?:n'?t)?:\*{0,2}/i.test(stripped)) {
        const isDont = /^\*{0,2}Don'?t:\*{0,2}/i.test(stripped);
        const content = stripped.replace(/^\*{0,2}(?:Do|Don'?t):\*{0,2}\s*/i, '');
        if (isDont) { donts.push(content); } else { dos.push(content); }
      } else { dos.push(stripped); }
    } else if (currentSection === 'host') { hostLines.push(stripped); }
    else if (currentSection === 'interview') { interviewLines.push(stripped); }
  }

  function glItem(text, type) {
    const delBtn = interactive ? `<button class="line-del" onclick="glDeleteItem(this,'${ctx.briefId}','${ctx.angleId}')" title="Remove line">✕</button>` : '';
    return `<div class="gl-item" data-gl="item" data-gl-type="${type}" style="display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:3px 4px;border-radius:4px;position:relative;transition:background 0.15s;">
      <span style="color:var(--text2);font-size:6px;flex-shrink:0;">●</span>
      <span class="gl-item-text" style="font-size:13px;color:var(--text);line-height:1.6;flex:1;border-radius:4px;padding:1px 22px 1px 2px;cursor:text;transition:background 0.15s,box-shadow 0.15s;position:relative;"${ea}>${mdBold(text)}${ei}</span>
      ${delBtn}
    </div>`;
  }

  function glAddBtn(type) {
    if (!interactive) return '';
    return `<button class="fw-add-line-btn" style="opacity:0.6;margin-top:4px;" onclick="glAddItem(this,'${type}','${ctx.briefId}','${ctx.angleId}')">+ Add Item</button>`;
  }

  let html = '';

  // ── Interview Demographics card ──
  html += `<div data-gl="interview" style="background:var(--surface3);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:14px;">
    <div style="font-size:15px;font-weight:700;color:var(--text);text-decoration:underline;text-underline-offset:4px;margin-bottom:12px;">Interview Demographic:</div>`;
  if (interviewLines.length) {
    interviewLines.forEach(l => { html += glItem(l, 'interview'); });
  } else {
    html += glItem('No interview demographic specified', 'interview');
  }
  html += glAddBtn('interview') + '</div>';

  // ── Do / Don't card ──
  html += `<div style="background:var(--surface3);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:14px;">
    <div style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:18px;">✅ Do / ❌ Don&rsquo;t</div>`;

  html += `<div data-gl="dos" style="margin-bottom:16px;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:14px;font-weight:700;color:#22c55e;">✅ Do:</div>`;
  dos.forEach(d => { html += glItem(d, 'do'); });
  html += glAddBtn('do') + '</div>';

  html += `<div data-gl="donts">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:14px;font-weight:700;color:#ef4444;">❌ Don&rsquo;t:</div>`;
  donts.forEach(d => { html += glItem(d, 'dont'); });
  html += glAddBtn('dont') + '</div>';
  html += '</div>';

  return html || '<div style="color:var(--text3);font-size:13px;padding:20px 0;">No guidelines content found.</div>';
}

function renderFrameworkSections(scriptText, ctx) {
  const interactive = ctx && ctx.briefId && ctx.angleId;
  const ea = interactive ? ' onclick="fwStartEdit(this)" onblur="fwFinishEdit(this)" onkeydown="fwEditKeydown(event,this)"' : '';
  const ei = interactive ? '<span class="fw-edit-icon" contenteditable="false"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></span>' : '';
  const ld = interactive ? `<button class="line-del" onclick="fwDeleteLine(this,'${ctx?ctx.briefId:''}','${ctx?ctx.angleId:''}')" title="Remove line">✕</button>` : '';
  const closeSecI = interactive ? `<button class="fw-add-line-btn" onclick="addFrameworkLine(this,'${ctx?ctx.briefId:''}','${ctx?ctx.angleId:''}')">+ Add Line</button>` : '';
  const dragAttrs = interactive ? ' draggable="true" ondragstart="fwDragStart(event)" ondragover="fwDragOver(event)" ondragend="fwDragEnd(event)" ondrop="fwDrop(event)"' : '';
  const secChrome = interactive ? '<div class="fw-drag-handle" title="Drag to reorder">⠿</div><button class="fw-delete-btn" onclick="deleteFrameworkSection(this)" title="Remove section">✕</button>' : '';

  // Try JSON first (legacy structured format)
  try {
    const sections = JSON.parse(scriptText);
    if (Array.isArray(sections)) {
      return `<div class="framework-sections">
        <div class="framework-heading" data-fw="heading">Angle Framework:</div>
        ${sections.map(sec => {
          const linesByType = {};
          (sec.lines || []).forEach(l => { if (!linesByType[l.type]) linesByType[l.type] = []; linesByType[l.type].push(l.text); });
          return `<div class="framework-section" data-fw="section"${dragAttrs}>${secChrome}
            <div class="framework-section-header"><span class="framework-section-name"${ea}>${_esc(sec.name)}</span><span class="framework-section-desc"${ea}> – ${_esc(sec.desc || '')}</span></div>
            ${Object.entries(linesByType).map(([type, texts]) => `<div class="framework-lines-group"><div class="framework-line-type" data-fw="line-type">${_esc(type)}:</div>${texts.map(t => `<div class="fw-line-row"><div class="framework-line-text" data-fw="line-text"${ea}>${_esc(t)}${ei}</div>${ld}</div>`).join('')}</div>`).join('')}
            ${closeSecI}
          </div>`;
        }).join('')}
        ${interactive ? `<button class="fw-add-section-btn" onclick="addFrameworkSection('${ctx.briefId}','${ctx.angleId}')">+ Add Section</button>` : ''}
      </div>`;
    }
  } catch(e) { /* not JSON, parse as markdown */ }

  // ─── MARKDOWN RENDERER (Notion-style, interactive) ──────────────────────
  const lines = scriptText.split('\n');
  let html = '<div class="framework-sections">';
  let inSection = false;
  let inCallout = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();
    if (!trimmed) { continue; }

    // ── # Top-level heading
    if (/^#\s+/.test(trimmed) && !/^##/.test(trimmed)) {
      if (inSection) { html += closeSecI + '</div>'; inSection = false; }
      const fullText = trimmed.replace(/^#\s+/, '');
      const quoteMatch = fullText.match(/[""\u201C]([^""\u201D]+)[""\u201D]/);
      const displayName = quoteMatch ? quoteMatch[1] : fullText;
      html += `<div data-fw="h1" style="font-size:20px;font-weight:800;color:#fff;margin:0 0 12px;line-height:1.3;text-transform:uppercase;letter-spacing:0.5px;"${ea}>${_esc(displayName)}${ei}</div>`;
      continue;
    }

    // ── ## Main heading
    if (/^##\s+/.test(trimmed) && !/^###/.test(trimmed)) {
      if (inSection) { html += closeSecI + '</div>'; inSection = false; }
      const text = trimmed.replace(/^##\s+/, '');
      html += `<div data-fw="h2" style="font-size:18px;font-weight:800;color:var(--text);margin:20px 0 8px;line-height:1.3;"${ea}>${_esc(text)}${ei}</div>`;
      continue;
    }

    // ── ### Sub-headings
    if (/^###\s+/.test(trimmed)) {
      if (inSection) { html += closeSecI + '</div>'; inSection = false; }
      const text = trimmed.replace(/^###\s+/, '').replace(/\*\*/g, '');
      if (/angle framework/i.test(text)) {
        html += `<div class="framework-heading" data-fw="h3">${_esc(text)}</div>`;
      } else {
        html += `<div data-fw="h3" style="font-size:15px;font-weight:700;color:var(--text);margin:16px 0 6px;"${ea}>${_esc(text)}${ei}</div>`;
      }
      continue;
    }

    // ── **BOLD SECTION NAME – description**
    const sectionMatch = trimmed.match(/^\*\*([A-Z][A-Z &/\-']+(?:\s*–\s*[^*]+)?)\s*[-–—]\s*([^*]+)\*\*$/);
    if (sectionMatch) {
      if (inSection) html += closeSecI + '</div>';
      html += `<div class="framework-section" data-fw="section"${dragAttrs}>${secChrome}<div class="framework-section-header"><span class="framework-section-name"${ea}>${_esc(sectionMatch[1].trim())}</span><span class="framework-section-desc"${ea}> – ${_esc(sectionMatch[2].trim())}</span></div>`;
      inSection = true;
      continue;
    }

    // ── > Callout / blockquote
    if (/^>\s*/.test(trimmed)) {
      const calloutText = trimmed.replace(/^>\s*/, '').replace(/\*\*/g, '');
      html += `<div data-fw="callout" style="background:rgba(239,68,68,0.1);border-left:3px solid #ef4444;border-radius:6px;padding:12px 14px;margin:8px 0;font-size:13px;color:var(--text2);line-height:1.6;"${ea}>${_esc(calloutText)}${ei}</div>`;
      continue;
    }

    // ── - **Host Line:** / **Example Line:** / **Host Action:**
    const lineTypeMatch = trimmed.match(/^[-•]\s*\*?\*?(Host Line|Example Line|Host Action)\*?\*?:\s*$/);
    if (lineTypeMatch) {
      html += `<div class="framework-lines-group"><div class="framework-line-type" data-fw="line-type">${_esc(lineTypeMatch[1])}:</div>`;
      while (i + 1 < lines.length) {
        const next = lines[i + 1].trim();
        if (!next || /^[-•]\s*\*?\*?(Host Line|Example Line|Host Action)\*?\*?:/.test(next) || /^\*\*[A-Z]/.test(next) || /^###/.test(next) || /^##/.test(next)) break;
        if (/^[-◦•]\s+/.test(next) || /^\s+[-◦•]\s+/.test(lines[i + 1])) {
          const itemText = next.replace(/^[-◦•]\s+/, '').replace(/^\*{1,3}/, '').replace(/\*{1,3}$/, '').trim();
          if (!itemText) { i++; continue; }
          html += `<div class="fw-line-row"><div class="framework-line-text" data-fw="line-text"${ea}>${_esc(itemText)}${ei}</div>${ld}</div>`;
        }
        i++;
      }
      html += '</div>';
      continue;
    }

    // ── - Host Line: "inline text"
    const inlineLineMatch = trimmed.match(/^[-•]\s*\*?\*?(Host Line|Example Line|Host Action)\*?\*?:\s*(.+)$/);
    if (inlineLineMatch) {
      const inlineText = inlineLineMatch[2].replace(/^\*{1,3}/, '').replace(/\*{1,3}$/, '').trim();
      if (!inlineText) continue;
      html += `<div class="framework-lines-group"><div class="framework-line-type" data-fw="line-type">${_esc(inlineLineMatch[1])}:</div><div class="fw-line-row"><div class="framework-line-text" data-fw="line-text"${ea}>${_esc(inlineText)}${ei}</div>${ld}</div></div>`;
      continue;
    }

    // ── ✅ / ❌ Do/Don't headers
    if (/^[✅❌]/.test(trimmed) || /^Do:|^Don't:/i.test(trimmed)) {
      if (inSection) { html += closeSecI + '</div>'; inSection = false; }
      const text = trimmed.replace(/\*\*/g, '');
      html += `<div data-fw="do-dont" style="font-size:15px;font-weight:700;color:var(--text);margin:14px 0 6px;">${_esc(text)}</div>`;
      continue;
    }

    // ── Regular list items
    if (/^[-•◦]\s+/.test(trimmed)) {
      const itemText = trimmed.replace(/^[-•◦]\s+/, '');
      if (/^\s{2,}/.test(line)) {
        html += `<div class="fw-line-row"><div class="framework-line-text" data-fw="line-text"${ea}>${_esc(itemText)}${ei}</div>${ld}</div>`;
      } else {
        html += `<div data-fw="list-item" style="font-size:13px;color:var(--text2);padding:3px 24px 3px 16px;position:relative;line-height:1.6;border-radius:4px;cursor:text;transition:background 0.15s;"${ea}><span style="position:absolute;left:2px;color:var(--text3);">•</span>${_esc(itemText)}${ei}</div>`;
      }
      continue;
    }

    // ── Horizontal rules
    if (/^---+$/.test(trimmed)) {
      if (inSection) { html += closeSecI + '</div>'; inSection = false; }
      html += `<hr data-fw="hr" style="border:none;border-top:1px solid var(--border);margin:16px 0;">`;
      continue;
    }

    // ── Regular paragraph text
    if (trimmed.length > 0) {
      html += `<div data-fw="paragraph" style="font-size:13px;color:var(--text2);line-height:1.6;margin:4px 0;border-radius:4px;padding:2px 4px;cursor:text;transition:background 0.15s;"${ea}>${_esc(trimmed)}${ei}</div>`;
    }
  }

  if (inSection) html += closeSecI + '</div>';
  html += (interactive ? `<button class="fw-add-section-btn" onclick="addFrameworkSection('${ctx.briefId}','${ctx.angleId}')">+ Add Section</button>` : '') + '</div>';
  return html;
}

function renderScripts(brief) {
  const palettes = [
    ['#f472b6','#a855f7'],['#60a5fa','#818cf8'],['#34d399','#059669'],
    ['#fb923c','#ef4444'],['#a78bfa','#7c3aed'],['#38bdf8','#0ea5e9'],
  ];

  return (brief.generatedScripts || []).map((gs, idx) => {
    const angle = S.angles.find(a => a.id === gs.angleId);
    const scriptNum = idx + 1;

    // ── Split script into Angle Framework vs Guidelines
    const guidelinesMarker = /^## Guidelines:/m;
    const guidelinesSplit = gs.script.split(guidelinesMarker);
    const angleScriptPart = guidelinesSplit[0].trim();
    const guidelinesRawPart = guidelinesSplit.length > 1 ? ('## Guidelines:\n' + guidelinesSplit[1]).trim() : '';

    // ── Angle tab content (script preview + editor)
    const preview = renderFrameworkSections(angleScriptPart, {briefId: brief.id, angleId: gs.angleId});
    const escaped = _esc(gs.script);
    const angleTabContent = `
      <div class="fw-edit-banner"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg><span>Click any text to edit inline · Drag sections to reorder · Hover for more options</span></div>
      <div id="script-preview-${gs.angleId}" data-fw-brief-id="${brief.id}" data-fw-angle-id="${gs.angleId}">${preview}</div>
      <details style="margin-top:10px;">
        <summary style="font-size:11px;color:var(--text3);cursor:pointer;user-select:none;">Edit raw script data</summary>
        <textarea class="script-editor" id="se-${gs.angleId}" oninput="updateScriptCharCount('${brief.id}','${gs.angleId}',this);this.style.height='auto';this.style.height=this.scrollHeight+'px'" style="margin-top:8px;">${escaped}</textarea>
        <div class="script-char-count" id="scc-${gs.angleId}">${gs.script.length} chars</div>
      </details>`;

    // ── Guidelines tab content
    let guidelinesTabContent;
    if (guidelinesRawPart) {
      guidelinesTabContent = `<div class="fw-edit-banner" style="margin-bottom:12px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg><span>Click any item to edit · Hover to delete</span></div><div id="guidelines-preview-${gs.angleId}" data-gl-brief-id="${brief.id}" data-gl-angle-id="${gs.angleId}">${renderGuidelinesSection(guidelinesRawPart, {briefId: brief.id, angleId: gs.angleId})}</div>`;
    } else {
      guidelinesTabContent = '<div style="color:var(--text3);font-size:13px;padding:20px 0;">No guidelines generated yet. Re-generate the brief to include guidelines.</div>';
    }

    // ── Hooks tab content
    const assignment = (brief.hookAssignments || []).find(x => x.angleId === gs.angleId);
    let hooksTabContent;
    if (assignment && assignment.hooks && assignment.hooks.length) {

function updateScriptCharCount(briefId, angleId, textarea) {
  const brief = S.briefs.find(b => b.id === briefId);
  if (!brief) return;
  const gs = brief.generatedScripts.find(g => g.angleId === angleId);
  if (gs) {
    gs.script = textarea.value;
    saveState();
  }
  const cc = document.getElementById('scc-' + angleId);
  if (cc) cc.textContent = textarea.value.length + ' chars';
  // Live-update the preview (angle part only)
  const preview = document.getElementById('script-preview-' + angleId);

    preview.innerHTML = renderFrameworkSections(parts[0].trim(), {briefId: briefId, angleId: angleId});

// ─── INLINE EDITING & DRAG-AND-DROP ──────────────────────────────────────

function fwStartEdit(el) {
  if (el.contentEditable === 'true') return;
  el._originalText = el.textContent.trim();
  el.contentEditable = 'true';
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  // Exclude the edit icon from selection
  const editIcon = el.querySelector('.fw-edit-icon');
  if (editIcon) {
    const nodes = Array.from(el.childNodes).filter(n => !n.classList || !n.classList.contains('fw-edit-icon'));
    if (nodes.length) { range.setStartBefore(nodes[0]); range.setEndAfter(nodes[nodes.length - 1]); }
  }
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function fwFinishEdit(el) {
  el.contentEditable = 'false';
  const preview = el.closest('[data-fw-brief-id]');
  if (preview) syncFrameworkToRaw(preview.dataset.fwBriefId, preview.dataset.fwAngleId);
}

function fwCancelEdit(el) {
  if (el._originalText !== undefined) {
    // Restore original, preserve edit icon
    const icon = el.querySelector('.fw-edit-icon');
    el.textContent = el._originalText;
    if (icon) el.appendChild(icon);
  }
  el.contentEditable = 'false';
}

function fwEditKeydown(event, el) {
  if (event.key === 'Enter') { event.preventDefault(); el.blur(); }
  if (event.key === 'Escape') { event.preventDefault(); fwCancelEdit(el); }
}

function fwDeleteLine(btn, briefId, angleId) {
  const row = btn.closest('.fw-line-row');
  if (!row) return;
  row.style.transition = 'opacity 0.2s, transform 0.2s';
  row.style.opacity = '0';
  row.style.transform = 'translateX(-20px)';
  setTimeout(() => { row.remove(); syncFrameworkToRaw(briefId, angleId); }, 220);
}

function deleteFrameworkSection(btn) {
  const section = btn.closest('.framework-section');
  if (!section) return;
  const preview = section.closest('[data-fw-brief-id]');
  const briefId = preview ? preview.dataset.fwBriefId : null;
  const angleId = preview ? preview.dataset.fwAngleId : null;
  section.style.transition = 'opacity 0.2s, transform 0.2s, max-height 0.3s';
  section.style.opacity = '0';
  section.style.transform = 'translateX(-20px)';
  section.style.overflow = 'hidden';
  setTimeout(() => {
    section.remove();
    if (briefId && angleId) syncFrameworkToRaw(briefId, angleId);
  }, 220);
}

function addFrameworkLine(btn, briefId, angleId) {
  const section = btn.closest('.framework-section');
  if (!section) return;
  let lastGroup = section.querySelector('.framework-lines-group:last-of-type');
  if (!lastGroup) {
    lastGroup = document.createElement('div');
    lastGroup.className = 'framework-lines-group';
    lastGroup.innerHTML = '<div class="framework-line-type" data-fw="line-type">Host Line:</div>';
    section.insertBefore(lastGroup, btn);
  }
  const row = document.createElement('div');
  row.className = 'fw-line-row';
  row.innerHTML = `<div class="framework-line-text" data-fw="line-text" onclick="fwStartEdit(this)" onblur="fwFinishEdit(this)" onkeydown="fwEditKeydown(event,this)">New line text<span class="fw-edit-icon" contenteditable="false"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></span></div><button class="line-del" onclick="fwDeleteLine(this,'${briefId}','${angleId}')" title="Remove line">✕</button>`;
  row.style.opacity = '0';
  lastGroup.appendChild(row);

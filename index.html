<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreetTalk Brief Builder</title>
  <style>
    :root {
      --bg: #0d0d0f; --surface: #1a1a1a; --surface2: #1c1c21; --surface3: #252530;
      --border: #2e2e3a; --text: #ffffff; --text2: #a1a1aa; --text3: #71717a;
      --accent: #4242d7; --accent-hover: #3535c0; --accent-light: rgba(66,66,215,0.15);
      --green: #22c55e; --green-light: rgba(34,197,94,0.12);
      --yellow: #eab308; --yellow-light: rgba(234,179,8,0.12);
      --red: #ef4444; --red-light: rgba(239,68,68,0.12);
      --radius: 10px; --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; height: 100vh; display: flex; overflow: hidden; }
    .main-container { display: flex; width: 100%; height: 100%; }

    /* SIDEBAR */
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 16px 0; flex-shrink: 0; }
    .sidebar-logo { padding: 4px 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .sidebar-logo .logo-text { font-size: 16px; font-weight: 700; color: var(--text); }
    .sidebar-logo .logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .sidebar-section { padding: 16px 20px 6px; font-size: 10px; text-transform: uppercase; color: var(--text3); font-weight: 700; letter-spacing: 0.8px; }
    .sidebar-item { padding: 9px 20px; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 10px; transition: all 0.15s; font-size: 13.5px; }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; border-right: 2px solid var(--accent); }
    .sidebar-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-item .badge { margin-left: auto; background: var(--surface3); padding: 1px 7px; border-radius: 10px; font-size: 11px; }

    /* CONTENT */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; min-height: 64px; }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .main-content { flex: 1; overflow-y: auto; padding: 28px; }

    /* BUTTONS */
    .btn { padding: 9px 16px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; transition: all 0.15s; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface3); }
    .btn-green { background: var(--green); color: #0a1a0a; }
    .btn-green:hover { background: #16a34a; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: var(--red-light); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: var(--red); color: white; }

    /* FORMS */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-weight: 600; margin-bottom: 7px; color: var(--text); font-size: 13px; }
    .form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 9px 12px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text);
      border-radius: var(--radius-sm); font-family: inherit; font-size: 13px;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .form-textarea { min-height: 90px; resize: vertical; }
    .form-select option { background: var(--surface2); }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card + .card { margin-top: 16px; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .card-sub { font-size: 12px; color: var(--text3); }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

    /* ANGLE CARDS */
    .angle-card { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all 0.15s; }
    .angle-card:hover { border-color: #22c55e; }
    .angle-card.selected { border-color: #22c55e; background: rgba(34,197,94,0.08); }
    .angle-card.not-ready { border-color: rgba(239,68,68,0.35); box-shadow: 0 0 12px rgba(239,68,68,0.12); }
    .angle-card.not-ready:hover { border-color: rgba(239,68,68,0.5); }
    .angle-card.not-ready.selected { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.06); }
    .angle-card .angle-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .angle-card .angle-cat { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 600; letter-spacing: 0.4px; margin-bottom: 8px; }
    .angle-card .angle-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
    .angle-card .angle-actions { margin-top: 10px; display: flex; gap: 8px; }

    /* SHOT CARDS */
    .shot-chip { background: var(--surface3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
    .shot-chip:hover { border-color: var(--accent); }
    .shot-chip.selected { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    /* TAGS */
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .tag-aroll { background: rgba(99,102,241,0.15); color: #818cf8; }
    .tag-broll { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .tag-both { background: rgba(34,197,94,0.15); color: var(--green); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; color: var(--text2); margin-bottom: 8px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal-wide { width: 640px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* STEPS INDICATOR */
    .step-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--text3); margin-bottom: 20px; }
    .step-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* PROJECT LIST */
    .project-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 10px; transition: border-color 0.15s; }
    .project-row:hover { border-color: var(--border); }
    .project-row .proj-info { flex: 1; }
    .project-row .proj-name { font-weight: 700; font-size: 15px; }
    .project-row .proj-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .status-pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
    .status-draft { background: var(--surface3); color: var(--text3); }
    .status-generating { background: var(--accent-light); color: var(--accent); animation: gen-pulse 1.5s ease-in-out infinite; }
    @keyframes gen-pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    .status-ready { background: var(--yellow-light); color: var(--yellow); }
    .status-published { background: var(--green-light); color: var(--green); }

    /* BRIEF GENERATION */
    .script-block { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
    .script-angle { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .script-cat { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
    .script-text { font-size: 13px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; }
    .script-editor { width: 100%; min-height: 200px; resize: vertical; font-size: 13px; font-family: inherit; color: var(--text2); line-height: 1.7; background: var(--surface3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; box-sizing: border-box; outline: none; transition: border-color 0.15s; }
    .script-editor:focus { border-color: var(--accent); }
    .script-char-count { font-size: 11px; color: var(--text3); text-align: right; margin-top: 4px; }

    /* VIDEO PREVIEW */
    .video-embed { margin-top: 10px; border-radius: var(--radius-sm); overflow: hidden; background: #000; aspect-ratio: 9/16; max-width: 360px; }
    .video-embed iframe { width: 100%; height: 100%; border: none; }
    .video-placeholder { background: var(--surface3); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 12px; color: var(--text3); text-align: center; margin-top: 8px; }

    /* PRESENTATION PAGE */
    #presentation-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; display: none; font-family: inherit; }
    .pres-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px); background: rgba(26,26,26,0.92); }
    .pres-body { max-width: 1000px; margin: 0 auto; padding: 40px 28px 60px; }
    .pres-stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; display: flex; align-items: center; gap: 10px; }
    .pres-angle-card { background: var(--surface); border-radius: 14px; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--border); }
    .pres-card-header { display: flex; align-items: center; padding: 16px 22px; border-bottom: 1px solid var(--border); gap: 14px; }
    .pres-card-body { display: flex; gap: 24px; padding: 22px; align-items: flex-start; }
    .pres-video-col { flex-shrink: 0; width: 200px; }
    .pres-script-col { flex: 1; min-width: 0; }
    .pres-tab-bar { display: flex; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
    .pres-tab { flex: 1; padding: 8px 10px; background: var(--surface3); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.15s; }
    .pres-tab:hover { color: var(--text); background: var(--surface2); border-color: rgba(66,66,215,0.4); }
    .pres-tab.active { background: var(--accent); font-weight: 700; color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(66,66,215,0.3); }
    .pres-script-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; font-size: 13px; color: var(--text2); line-height: 1.75; white-space: pre-wrap; }

    /* ─── NOTION-STYLE FRAMEWORK SECTIONS ──────────────────────────────── */
    .framework-heading { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 14px; text-decoration: underline; text-underline-offset: 4px; }
    .framework-section { background: var(--surface3); border-radius: 8px; padding: 16px 18px; margin-bottom: 10px; position: relative; border: 1px solid transparent; transition: border-color 0.15s, box-shadow 0.15s; }
    .framework-section:hover { border-color: rgba(66,66,215,0.2); box-shadow: 0 0 0 1px rgba(66,66,215,0.08); }
    .framework-section-header { margin-bottom: 10px; }
    .framework-section-name { font-weight: 800; font-size: 13px; color: var(--text); text-transform: uppercase; letter-spacing: 0.3px; border-radius: 3px; transition: background 0.15s; }
    .framework-section-name:hover { background: rgba(66,66,215,0.06); cursor: text; }
    .framework-section-name[contenteditable="true"] { background: rgba(66,66,215,0.08); box-shadow: inset 0 0 0 2px var(--accent); outline: none; padding: 1px 4px; }
    .framework-section-desc { font-weight: 400; font-size: 13px; color: var(--text2); border-radius: 3px; transition: background 0.15s; }
    .framework-section-desc:hover { background: rgba(66,66,215,0.06); cursor: text; }
    .framework-section-desc[contenteditable="true"] { background: rgba(66,66,215,0.08); box-shadow: inset 0 0 0 2px var(--accent); outline: none; padding: 1px 4px; }
    .framework-line { margin-bottom: 6px; padding-left: 4px; }
    .framework-line:last-child { margin-bottom: 0; }
    .framework-line-type { font-weight: 700; font-size: 12px; color: var(--text); margin-bottom: 2px; }
    .framework-line-text { font-size: 13px; color: var(--text2); line-height: 1.6; padding: 3px 24px 3px 16px; position: relative; border-radius: 4px; cursor: text; transition: background 0.15s, box-shadow 0.15s; }
    .framework-line-text:hover { background: rgba(66,66,215,0.05); box-shadow: inset 0 0 0 1px rgba(66,66,215,0.18); }
    .framework-line-text[contenteditable="true"] { background: rgba(66,66,215,0.08); box-shadow: inset 0 0 0 2px var(--accent); outline: none; cursor: text; }
    .framework-line-text[contenteditable="true"]::before { display: none; }
    .framework-line-text[contenteditable="true"] .fw-edit-icon { display: none; }
    .framework-line-text::before { content: '◦'; position: absolute; left: 2px; color: var(--text3); }
    .framework-lines-group { margin-top: 8px; }
    /* ─── INTERACTIVE EDITING CHROME ──────────────────────────────── */
    .fw-edit-banner { display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(66,66,215,0.06);border:1px dashed rgba(66,66,215,0.25);border-radius:8px;margin-bottom:14px;font-size:12px;color:var(--accent); }
    .fw-edit-banner svg { flex-shrink:0;color:var(--accent); }
    .fw-drag-handle { position:absolute;left:-2px;top:16px;opacity:0;transition:opacity 0.15s;cursor:grab;color:var(--text3);font-size:14px;padding:2px 4px;user-select:none;z-index:1; }
    .framework-section:hover .fw-drag-handle { opacity:0.7; }
    .fw-drag-handle:hover { opacity:1 !important;color:var(--accent); }
    .fw-delete-btn { position:absolute;right:8px;top:8px;opacity:0;transition:opacity 0.15s;cursor:pointer;background:none;border:none;color:var(--text3);padding:4px 6px;border-radius:4px;font-size:13px;z-index:1; }
    .framework-section:hover .fw-delete-btn { opacity:0.5; }
    .fw-delete-btn:hover { opacity:1 !important;color:#ef4444;background:rgba(239,68,68,0.1); }
    .fw-edit-icon { position:absolute;right:6px;top:50%;transform:translateY(-50%);opacity:0;transition:opacity 0.15s;color:var(--text3);pointer-events:none; }
    .framework-line-text:hover .fw-edit-icon { opacity:0.5; }
    .fw-add-section-btn { display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;margin-top:8px;border:2px dashed var(--border);border-radius:8px;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s; }
    .fw-add-section-btn:hover { border-color:var(--accent);color:var(--accent);background:rgba(66,66,215,0.04); }
    .fw-add-line-btn { display:inline-flex;align-items:center;gap:4px;padding:3px 8px;margin-top:6px;border:1px dashed var(--border);border-radius:4px;background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all 0.15s;opacity:0; }
    .framework-section:hover .fw-add-line-btn { opacity:1; }
    .fw-add-line-btn:hover { border-color:var(--accent);color:var(--accent); }
    .framework-section.dragging { opacity:0.4;border:2px dashed var(--accent); }
    .framework-section.drag-over { border-top:3px solid var(--accent); }
    /* ─── ABOUT SECTION ──────────────────────────────────────────── */
    .about-section [data-about]:hover { background: rgba(66,66,215,0.05); }
    .about-section [data-about][contenteditable="true"] { background: rgba(66,66,215,0.08); box-shadow: inset 0 0 0 2px var(--accent); outline: none; }
    .custom-audio { display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;width:70%;margin:0 auto; }
    .custom-audio audio { display:none !important; }
    .custom-audio .ca-play { width:22px;height:22px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:opacity 0.15s; }
    .custom-audio .ca-play:hover { opacity:0.85; }
    .custom-audio .ca-time-label { font-size:11px;color:var(--text2);white-space:nowrap;font-variant-numeric:tabular-nums;flex-shrink:0; }
    .custom-audio .ca-track { flex:1;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;cursor:pointer;position:relative; }
    .custom-audio .ca-progress { height:100%;background:var(--accent);border-radius:2px;width:0%;pointer-events:none; }
    /* ─── LINE DELETE BUTTON (shared) ────────────────────────────── */
    .fw-line-row { display:flex;align-items:center;gap:6px; }
    .fw-line-row .framework-line-text { flex:1;min-width:0; }
    .line-del { display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.06);color:rgba(239,68,68,0.45);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;flex-shrink:0;line-height:1;padding:0; }
    .line-del:hover { background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4);color:#ef4444; }
    /* ─── GUIDELINES INLINE EDITING ──────────────────────────────── */
    .gl-item:hover { background:rgba(66,66,215,0.04); }
    .gl-item-text:hover { background:rgba(66,66,215,0.05);box-shadow:inset 0 0 0 1px rgba(66,66,215,0.18); }
    .gl-item-text[contenteditable="true"] { background:rgba(66,66,215,0.08);box-shadow:inset 0 0 0 2px var(--accent);outline:none; }
    .gl-item-text[contenteditable="true"] .fw-edit-icon { display:none; }
    .gl-item-text:hover .fw-edit-icon { opacity:0.5; }

    .pres-approve-btn { display: flex; align-items: center; gap: 5px; padding: 6px 14px; border: none; border-radius: 20px; font-size: 11.5px; font-weight: 700; cursor: pointer; transition: all 0.15s; letter-spacing: 0.2px; }
    .pres-approve-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .pres-comment-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--surface3); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text); transition: all 0.15s; }
    .pres-comment-btn:hover { border-color: var(--accent); background: rgba(66,66,215,0.08); color: var(--text); }
    .pres-collapse-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--accent); border: 1px solid var(--accent); border-radius: 8px; font-size: 12px; font-weight: 600; color: #fff; cursor: pointer; transition: all 0.15s; }
    .pres-collapse-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* COMMENT SECTION */
    .comment-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 14px; }
    .comment-item { border-bottom: 1px solid var(--border); padding: 10px 0; }
    .comment-item:last-child { border-bottom: none; }
    .comment-meta { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .comment-text { font-size: 13px; }
    .comment-add { display: flex; gap: 8px; margin-top: 10px; }
    .comment-add input { flex: 1; padding: 8px 12px; background: var(--surface3); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; }
    .comment-add input:focus { outline: none; border-color: var(--accent); }

    /* APPROVAL */
    .approval-btn { padding: 6px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); transition: all 0.15s; }
    .approval-btn.approved { background: var(--green-light); border-color: var(--green); color: var(--green); }
    .approval-btn.rejected { background: var(--red-light); border-color: var(--red); color: var(--red); }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* GENERATION LOADING */
    .gen-loader { text-align: center; padding: 50px; }

<script>
// ─── STATE ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'st_brief_v1';
const KNOWLEDGE_DOCS_KEY = 'st_knowledge_docs';

// Knowledge docs stored separately (they're large). Map of angleName → markdown string.
function loadKnowledgeDocs() {
  try { return JSON.parse(localStorage.getItem(KNOWLEDGE_DOCS_KEY) || '{}'); } catch(e) { return {}; }
}
function saveKnowledgeDoc(angleName, doc) {
  const docs = loadKnowledgeDocs();
  docs[angleName] = doc;
  localStorage.setItem(KNOWLEDGE_DOCS_KEY, JSON.stringify(docs));
}
function getKnowledgeDoc(angleName) {
  return loadKnowledgeDocs()[angleName] || '';
}

// Auto-load Challenge/Game Show knowledge doc
(function() {
  const docs = loadKnowledgeDocs();
  if (!docs["Challenge/Game Show"]) {
    saveKnowledgeDoc("Challenge/Game Show", "# Challenge / Game Show — Street Interview Angle Knowledge Doc\n\n## What This Document Is\n\nThis is the reference document for generating a **\"Challenge / Game Show\"** street interview brief angle inside the StreetTalk briefing app. When a creative strategist triggers the Challenge / Game Show angle builder, the system should follow the instructions below to analyze the brand's inputs and produce a fully structured angle section ready for production.\n\n**What this angle is:** The host turns the street interview into a game — a quiz, a challenge, a taste test competition, a prediction, or a skill test with stakes. The interviewee participates, competes, guesses, or attempts something, and the product enters as the answer, the reveal, or the \"cheat code\" that makes them better. The entire ad is built on **entertainment first, product second** — the viewer watches because the game is fun, and the product lands because the game made it relevant.\n\n**What separates this from other angles:**\n- **Not Authentic Testimonial** — the interviewee isn't just \"trying\" the product. They're competing, guessing, or being tested. There are stakes, a right/wrong answer, or a winner/loser dynamic.\n- **Not Us vs. Them** — even when two products appear (like a blind taste test), the framing is \"which do you prefer?\" as a game, not \"here's why ours is better\" as a comparison pitch.\n- **Not Problem-to-Solution** — even when a knowledge gap is exposed (like a quiz), the framing is entertainment/competition, not empathetic problem exploration.\n\n---\n\n## Role\n\nYou are a senior StreetTalk creative strategist. Your job is to produce a production-ready \"Challenge / Game Show\" street interview angle — a complete conversation framework that a host can execute on camera with real people on the street. The angle must feel like a fun, spontaneous game — not a commercial. Every line you write is a suggestion the host can adapt in the moment, not a teleprompter script.\n\n---\n\n## Inputs You Will Receive\n\nYou will be provided four inputs. Inputs 1 and 2 are required. Inputs 3 and 4 are optional but take priority when provided.\n\n### Input 1: Onboarding Call Transcript (REQUIRED)\n\nA transcript from the call between the creative strategist and the brand. Extract:\n\n- **The product's \"wow\" fact or surprise** — every Challenge angle needs something that surprises people. Listen for \"people don't realize,\" \"you'd never guess,\" \"the crazy thing is.\" This becomes the REVEAL or the answer to the challenge\n- **Natural competition dynamics** — does the product lend itself to a taste test, a knowledge quiz, a skill demonstration, a price guess, or a physical challenge? Listen for how the brand describes customer discovery moments\n- **Target audience interests** — what does the audience find fun? What would make them stop on the street and say \"sure, I'll try\"? A cash prize? A dare? A quiz? A bet?\n- **The \"most people get it wrong\" angle** — if most people hold a misconception or make a wrong assumption about the product category, that's a ready-made game. The wrong answer IS the entertainment\n- **Product experience that can happen live** — can the interviewee taste it, use it, hold it, or see it work in real time? The game needs a payoff moment where the product delivers\n- **Compliance or claim restrictions** — what can the host claim during the reveal? Especially important for health, supplement, and food brands\n\n### Input 2: Onboarding Form (REQUIRED)\n\nA completed brand intake form containing answers to the following questions:\n\n| Field | What to extract |\n|-------|----------------|\n| Brand name | Use as the brand name throughout the brief |\n| Website URL | Use for the CTA and brand link |\n| Social profiles | Note for CTA options (link in bio, etc.) |\n| Products to focus on | This is the product that enters the game as the answer, reveal, or reward |\n| Customer avatar(s) | Use to define Interview Demographic — these are the people who'd find the game fun and relevant |\n| Top marketing angles | Identify which facts, surprises, or misconceptions about the product already convert — build the game around these |\n| Requested interview questions or hooks | Incorporate if they align with a game/challenge format |\n| Customer pain points | These reveal what the interviewee might get WRONG in a quiz, or what frustration the product-as-prize resolves |\n| Preferred language / jargon | Weave into Host Lines, especially during the reveal |\n| Language to avoid | Add directly to the Don't list |\n| What customers like most post-purchase | This predicts what the interviewee will say AFTER the reveal — use to write REACTIONS |\n| What customers dislike | Avoid building the game around known weaknesses |\n| Ad inspiration brands | Study their tone — Challenge angles should feel fun and high-energy |\n| Competitors | Useful for blind test formats — the competitor product can be one of the options |\n| Offers / CTAs | Use in the CTA section verbatim (unless overridden by Input 4) |\n| Physical product giveaway preference | **Critical for this angle.** Many Challenge angles end with giving the product away as a prize — confirm if the brand supports this |\n| Other details | Check for budget constraints on cash prizes or giveaways |\n| Top 3 ads | Study for pacing — Challenge angles need faster pacing than conversational angles |\n| B-roll footage links | Note for production team |\n| Primary use for videos | Informs energy level (paid social typically wants faster, punchier games) |\n\n### Input 3: Additional Creative Guidelines (Optional)\n\nFree-text context from the creative strategist — tone notes, creative direction, production constraints, or anything else that should shape how the angle is written.\n\n**How to use this input:**\n- **Tone/energy notes** → Challenge angles default to high-energy and playful. If the strategist wants something more chill or educational, this overrides the default\n- **Production constraints** → Budget for cash prizes, number of interviewees needed, location requirements (e.g., \"near a food court\" for taste tests)\n- **Game format preference** → The strategist may specify a game type (quiz, blind test, speed challenge). This overrides the Decision section\n- **Content restrictions or mandatories** → Add directly to the Do/Don't section\n\n### Input 4: Call to Action / CTA (Optional)\n\nThe specific CTA the creative strategist provides for this brief.\n\n**How to use this input:**\n- Use this CTA **verbatim** in the CTA section of the Angle Framework — do not rephrase or improvise\n- If the CTA includes a URL, spell it out phonetically in the Host Line\n- If the CTA includes a discount code, the host must say the code clearly and repeat it\n- If this field is empty, fall back to the \"Offers / CTAs\" field from the onboarding form\n- If both are empty, write a generic CTA using the brand's website URL\n\n---\n\n## Decision: Game Mechanic\n\nBefore writing anything, determine what type of game creates the most natural entry point for the product. The game mechanic drives the CHALLENGE setup, REVEAL structure, and what makes the moment entertaining.\n\n**THE PREDICTION CHALLENGE** — The interviewee guesses or predicts something about the product, and the answer surprises them. The entertainment is the gap between what they assumed and what's true.\n- Best for: Food & bev, cookware, DTC products with surprising specs, any product where common assumptions are wrong\n- The CHALLENGE is the guess. The REVEAL is the correct answer. The product enters as \"the thing you got wrong about.\"\n- Examples: Cookt (\"Which one has more protein — the shake or the meal?\"), price-guess formats, nutrition-guess formats\n- Key moment: The interviewee commits to a wrong answer publicly, then reacts to being wrong. That reaction IS the ad.\n\n**THE BLIND TEST** — The interviewee tries two or more options without knowing which is which, picks a favorite, and the reveal shows they chose the brand's product. The entertainment is the unbiased preference.\n- Best for: Food & bev, beauty, fragrance, any product that wins on sensory experience\n- The CHALLENGE is the blind choice. The REVEAL is which product they picked. The product enters as \"the one you chose without knowing.\"\n- Examples: Happy Viking \"Pepsi Challenge\" (two cups, pick the better shake), SOTE blind taste test (four cups, three brands)\n- Key moment: The interviewee picks the brand's product WITHOUT knowing it's the brand's product. The reveal validates the choice.\n\n**THE CASH CHALLENGE** — The host offers money for correct answers or successful attempts. The interviewee tries, usually fails or struggles, and the product enters as the tool that makes them succeed.\n- Best for: EdTech, apps, language learning, fitness, any product that improves a measurable skill\n- The CHALLENGE is the attempt. The FAILURE is the entertainment. The product is the \"cheat code\" that makes them better.\n- Examples: Speak (\"$5 if you can put together a few sentences in Spanish\"), trivia-for-cash formats\n- Key moment: The interviewee fails at the challenge, the product helps them succeed, and the improvement is visible.\n\n**THE KNOWLEDGE QUIZ** — The host quizzes the interviewee on facts related to the product category. Wrong answers reveal knowledge gaps that the product fills.\n- Best for: Health & wellness, supplements, hydration, skincare, any product that requires education\n- The CHALLENGE is the quiz. The WRONG ANSWERS are the entertainment. The product enters as \"what you didn't know.\"\n- Examples: SOTE hydration quiz (\"How many electrolytes does your body need?\"), ingredient awareness quizzes\n- Key moment: The interviewee confidently gives a wrong answer. The correction naturally leads to the product.\n\n**THE GUESSING GAME** — The interviewee guesses something about the product itself (its origin, its ingredient, its price, what it's made of) and the answer is surprising.\n- Best for: Food with unique origins, products with unexpected ingredients, premium products with surprising prices\n- The CHALLENGE is the guess. The SURPRISE is the entertainment. The product's unique attribute IS the punchline.\n- Examples: Cookt (\"Guess the Country From One Bite\"), origin-story reveals, ingredient-reveal games\n- Key moment: The interviewee's guess is entertainingly wrong, and the real answer makes the product more interesting.\n\nThis decision affects the CHALLENGE setup, number of rounds/options, REVEAL structure, and where the product enters the conversation.\n\n---\n\n## Output Structure\n\nGenerate the following sections in this exact order. Use markdown formatting throughout. Use `---` horizontal rules between major sections.\n\n---\n\n### SECTION 1: ANGLE HEADER\n\n```\n## Interview Angle #[N] - [Brand Name] \"[Angle Title]\"\n[City] Host - [Host Name or TBD]\n```\n\nThe angle title should capture the game or challenge concept. Make it punchy and entertainment-forward. Examples from real briefs:\n- \"THE PEPSI CHALLENGE\"\n- \"Guess the Country From One Bite\"\n- \"$5 Spanish Challenge\"\n- \"Hydration IQ Test\"\n\n---\n\n### SECTION 2: HOST DEMOGRAPHIC\n\nWrite a bullet list of 5–7 traits describing the ideal host. For Challenge / Game Show, the host is the **game master** — they need to be high-energy enough to make the game fun, confident enough to run the format smoothly, and charismatic enough to keep the interviewee engaged through the full game.\n\nConsider:\n- Gender and age range that matches the product's audience\n- Energy level — **playful, confident, fast-paced**. The host drives the game's tempo. Dead energy kills a game format\n- The host should feel like a fun friend daring you to try something, or a charming game show host on the street\n- Comfort with improvisation — games go off-script more than any other angle. The host needs to riff\n\nFormat:\n```\n### Host Demographic:\n- [Gender/age]\n- [Energy/personality — high-energy, playful, game master vibe]\n- [Appearance/attire]\n- [Improvisation comfort]\n- [Communication style — fast, punchy, encouraging]\n```\n\n---\n\n### SECTION 3: INTERVIEW DEMOGRAPHIC\n\nWrite a bullet list of 4–6 traits describing the ideal interviewee. For Challenge / Game Show, the interviewee needs to be **game for it** — literally. They need to be willing to play, guess, taste, or compete on camera. The best interviewees are confident enough to commit but not so knowledgeable that the game has no surprise.\n\nKey considerations:\n- They should be willing to be on camera and play along\n- They should NOT be experts on the product category (experts ruin the surprise)\n- They should be expressive — big reactions make better content\n- Diverse interviewees create montage potential (multiple people all getting it wrong = compelling pattern)\n\nFormat:\n```\n### Interview Demographic:\n- [Gender/age]\n- [Energy/personality — game for it, expressive, competitive]\n- [Target knowledge level — NOT an expert, average consumer]\n- [Attire/appearance signals]\n```\n\n---\n\n### SECTION 4: INTERACTION OVERVIEW\n\nWrite 1–2 sentences summarizing the game mechanic. This should describe: what the game is, what the interviewee will do, and what the product payoff moment looks like.\n\nFormat:\n```\n> 🚨 [1-2 sentence summary of the game and the product's role in it]\n```\n\n---\n\n### SECTION 5: PROPS\n\nList every physical item needed. Challenge angles typically require MORE props than conversational angles because you're staging a game.\n\nAlways consider:\n1. The product itself (specific variant, flavor, size)\n2. Game-specific items (unmarked cups, blindfolds, label covers, quiz cards, timer)\n3. Competitor products (if using a blind test format — need at least 1–2 alternatives)\n4. Cash or prizes (if using a cash challenge — specify denominations)\n5. Reveal tools (labels to place after the guess, cards with correct answers)\n6. Production aids (trays, tables, napkins, sanitizer for food tastings)\n\nFormat:\n```\n### Props:\n- [Product — specific variant/flavor/size]\n- [Game items — cups, blindfolds, quiz cards, timer, etc.]\n- [Competitor products — if blind test format]\n- [Cash/prizes — if applicable, specify amounts]\n- [Reveal tools — answer cards, labels, etc.]\n- [Production aids — table, tray, napkins, etc.]\n```\n\n**Important:** Game formats require more production setup than conversational angles. Props must be specific enough for the production team to source AND for the game to run smoothly on camera.\n\n---\n\n### SECTION 6: DO / DON'T GUIDELINES\n\n**Standard Do's for Challenge / Game Show:**\n- Keep the game simple — the rules should be explainable in one sentence\n- Let the interviewee commit to their answer BEFORE the reveal — do not hint, correct, or lead them\n- Capture the reaction to being wrong/surprised — that moment is the ad\n- Run the game with multiple interviewees — montages of different people all getting it wrong (or all choosing the brand) create powerful social proof\n- Keep energy high — the host sets the tempo. Dead air kills a game format\n- Make it genuinely fun — the interviewee should walk away entertained, not embarrassed\n\n**Standard Don'ts for Challenge / Game Show:**\n- Do not rig the game — the interviewee must have a genuine chance. If they get it right, that's fine. Honest wins are still good content\n- Do not make the interviewee feel stupid for getting it wrong — the tone is \"surprising, right?\" not \"you're wrong, idiot\"\n- Do not reveal the answer before the interviewee commits — the commitment is what makes the reveal entertaining\n- Do not over-explain the rules — if the game needs more than 10 seconds of setup, simplify it\n- Do not let the game overshadow the product — the product must be the punchline, answer, or prize. If the viewer remembers the game but not the brand, the angle failed\n\nThen layer in brand-specific Do/Don'ts from the onboarding form. If the product is in a regulated category, include the **approved explanation language** structure:\n\nFormat:\n```\n✅ Do:\n- [Keep the game simple — rules in one sentence]\n- [Let the interviewee commit before the reveal]\n- [Capture the reaction to being wrong/surprised]\n- [Run with multiple interviewees for montage]\n- [Brand-specific do]\n\n❌ Don't:\n- [Do not rig the game]\n- [Do not make the interviewee feel stupid]\n- [Do not reveal before they commit]\n- [Brand-specific language restrictions]\n\nDo not say or imply:\n- \"[banned word/phrase]\"\n```\n\n---\n\n### SECTION 7: ANGLE FRAMEWORK (Conversation Flow)\n\nThis is the core of the brief. It lives under a bold, underlined heading: **Angle Framework:**\n\nEach conversation flow step is its own block. The block label format is:\n\n`SECTION NAME - Description of what this section does`\n\nInside each block, use these internal labels:\n- **Host Line:** — What the host says (dialogue in quotes on sub-bullets)\n- **Example Line:** — Target interviewee responses (dialogue in quotes on sub-bullets)\n- **Host Action:** — Physical staging directions (in italicized text on sub-bullets)\n\nThe conversation flow for Challenge / Game Show follows this exact order (9 blocks):\n\n---\n\n#### 7a. HOOK\n\n**Purpose:** Stop the person and invite them into the game. The hook should communicate the game premise and the stakes (fun, cash, bragging rights) in one punchy line. The interviewee should immediately understand what they're being asked to do and feel excited to try.\n\n**CRITICAL RULES FOR HOOKS:**\n\n1. **Lead with the game, not the product.** The hook is an invitation to play, not a product pitch. \"I'll give you $5 if you can say three sentences in Spanish\" is a game hook. \"Want to try a language learning app?\" is a product pitch.\n\n2. **State the stakes immediately.** Cash, bragging rights, or a simple dare. The interviewee needs a reason to stop and play. \"$5,\" \"quick challenge,\" \"bet you can't,\" or \"let's test\" are all stake signals.\n\n3. **Keep it to one sentence.** If the game needs two sentences to explain, simplify the game.\n\n4. **Be realistic.** The host is cold-approaching someone. The game must be something a stranger would actually agree to on the spot. Blind taste tests, quick quizzes, and \"guess this\" games work. Elaborate multi-round competitions don't.\n\n**What GOOD hooks look like (from real briefs):**\n- \"Quick blind taste test — which of these shakes tastes better?\" — clear game, immediate\n- \"I'll give you $5 if you can put together a few sentences in Spanish.\" — cash stakes, clear challenge\n- \"Quick test — which one do you think has more protein?\" — prediction game, one sentence\n- \"On a scale of 1–10, how confident are you speaking Spanish in public?\" — self-rating that sets up the challenge\n\n**What BAD hooks look like:**\n- ❌ \"Want to try this cool new protein shake?\" — no game, just a product offer\n- ❌ \"We're doing a really fun challenge today where we test people's knowledge of hydration science and then give them a chance to try our product\" — way too long\n- ❌ \"Are you a health expert? Because I'm about to prove you wrong\" — aggressive, not fun\n- ❌ \"We're filming a game show on the street!\" — too meta, breaks the fourth wall\n\nWrite 1–2 hook options.\n\nFormat:\n```\nHOOK - How we are going to begin the interaction\n  • Host Line:\n    ◦ \"[One-sentence game invitation with stakes]\"\n```\n\n---\n\n#### 7b. RULES / SETUP\n\n**Purpose:** Briefly explain how the game works. This should take no more than 10 seconds on camera. If the game is self-explanatory from the hook (like \"which cup tastes better?\"), this section can be minimal. If the game has rounds, options, or a scoring system, lay it out fast.\n\nFor different game mechanics:\n- **Prediction:** \"I'm going to show you two options. You tell me which one has more [X]. Ready?\"\n- **Blind test:** \"I have [N] cups/options. You try each one and pick your favorite. You won't know which is which until after.\"\n- **Cash challenge:** \"Here's how it works — you try, and if you [succeed at X], you keep the $5.\"\n- **Knowledge quiz:** \"I'm going to ask you [N] questions about [topic]. Let's see how many you get right.\"\n- **Guessing game:** \"You get one [taste/look/feel]. Tell me [what country/ingredient/price]. Closest guess wins.\"\n\nFormat:\n```\nRULES / SETUP - Quick explanation of how the game works\n  • Host Line:\n    ◦ \"[1-2 sentence game rules]\"\n  • Host Action:\n    ◦ [Set up the game — lay out cups, show options, prepare the quiz, hold up the cash]\n```\n\n---\n\n#### 7c. THE CHALLENGE\n\n**Purpose:** The interviewee plays the game. This is the core entertainment section — the part that makes someone stop scrolling. The host runs the game, the interviewee participates, and the camera captures everything.\n\nFor different game mechanics:\n- **Prediction:** The interviewee states their guess and commits to it publicly\n- **Blind test:** The interviewee tries each option and picks a favorite\n- **Cash challenge:** The interviewee attempts the task (speaks Spanish, answers trivia, etc.)\n- **Knowledge quiz:** The host asks questions, the interviewee answers\n- **Guessing game:** The interviewee experiences the product (one bite, one look) and guesses\n\nThis section uses Host Line (running the game), Host Action (staging), AND Example Line (the interviewee's in-game responses).\n\n**Key rule: Let the interviewee COMMIT to their answer/choice before moving to the reveal.** The commitment is what creates tension. If the host reveals too early or hints at the answer, the reveal moment loses all its power.\n\nFormat:\n```\nTHE CHALLENGE - The game itself\n  • Host Line:\n    ◦ \"[Running the game — presenting options, asking the question, starting the timer]\"\n    ◦ \"[Encouraging engagement — 'take your time,' 'be honest,' 'lock it in']\"\n  • Host Action:\n    ◦ [Present the options / start the challenge]\n    ◦ [Let the interviewee engage fully before prompting an answer]\n    ◦ [Capture their deliberation — facial expressions, tasting reactions, thinking]\n  • Example Line:\n    ◦ \"[Committed answer — 'Definitely this one' / 'I'm going with B' / 'I'd say $80']\"\n    ◦ \"[Thinking-out-loud — 'Hmm, that one's smoother' / 'Wait, let me try again']\"\n    ◦ \"[Confident wrong answer — the best content comes from people who are sure and wrong]\"\n```\n\n---\n\n#### 7d. THE REVEAL\n\n**Purpose:** The host reveals the correct answer, the product identity, or the game result. This is the MONEY SHOT of the entire angle — the moment where surprise, delight, or disbelief creates the clip that makes the ad work.\n\n**Structure the reveal in two beats:**\n1. **Beat 1: The answer** — What the correct answer is, which cup was which, whether they won or lost\n2. **Beat 2: The product connection** — How the answer connects to the brand/product. This is where the product enters the game naturally.\n\n**Do NOT rush the reveal.** Let the interviewee process. The gap between hearing the answer and reacting is where the best content lives.\n\nFormat:\n```\nTHE REVEAL - Revealing the answer and connecting to the product\n  • Host Line:\n    ◦ \"[Beat 1: The answer — 'So the one you picked... that's actually [Brand]']\"\n    ◦ \"[Beat 2: The product connection — 'And here's what makes it different...']\"\n  • Host Action:\n    ◦ [Remove blindfold / flip the label / show the answer card]\n    ◦ [Let the interviewee react BEFORE explaining anything]\n```\n\n---\n\n#### 7e. REACTIONS\n\n**Purpose:** Capture the interviewee's reaction to the reveal. For Challenge angles, reactions are typically BIGGER than other frameworks because the game creates genuine surprise.\n\nFor different game mechanics, the best reactions are:\n- **Prediction (wrong):** \"No way!\" / \"I was so sure!\" / \"That's actually the meal??\"\n- **Blind test (chose the brand):** \"Wait, THAT's the one I picked?\" / \"I knew it tasted better\"\n- **Cash challenge (product helped):** \"That was way easier than I expected\" / \"Okay, I actually learned something\"\n- **Knowledge quiz (wrong answers):** \"I had no idea\" / \"Everyone needs to know this\"\n- **Guessing game (surprised):** \"No way that's from [country]\" / \"I would've never guessed\"\n\nWrite 4–6 target reaction lines.\n\nFormat:\n```\nREACTIONS - Reactions we are aiming to receive\n  • Example Line:\n    ◦ \"[Surprise — 'No way!' / 'Are you serious?']\"\n    ◦ \"[Self-deprecating — 'I was so confident and so wrong']\"\n    ◦ \"[Product appreciation — 'Okay, that actually makes sense now']\"\n    ◦ \"[Desire — 'I need this' / 'Where do I get that?']\"\n```\n\n---\n\n#### 7f. VALUE PROPS\n\n**Purpose:** After the reveal and reaction, the host reinforces WHY the answer was what it was — what makes the product different, better, or surprising. Each value prop should connect back to the game result.\n\nIf the interviewee chose the brand's product in a blind test: \"Here's why you picked it...\"\nIf the interviewee got a quiz question wrong: \"Here's what most people don't know...\"\nIf the interviewee failed a challenge: \"Here's what makes this product different from what you were trying...\"\n\nWrite 3–4 value props as complete sentences the host can say naturally.\n\nFormat:\n```\nVALUE PROPS - How our hosts describe the features/benefits of the product\n  • Host Line:\n    ◦ \"[Value prop #1 — explains WHY the game result happened]\"\n    ◦ \"[Value prop #2 — a feature that reinforces the surprise]\"\n    ◦ \"[Value prop #3 — broader benefit or daily use case]\"\n```\n\n---\n\n#### 7g. SECOND REACTIONS (Optional)\n\n**Purpose:** After hearing the value props, the interviewee often has a second reaction — typically more conversion-focused. For Challenge angles, this is where \"that's surprising\" turns into \"I actually want this.\"\n\nFormat:\n```\nSECOND REACTIONS - Reactions after hearing the value props\n  • Example Line:\n    ◦ \"[Purchase intent — 'I'm buying this']\"\n    ◦ \"[Sharing intent — 'I need to tell my friends about this']\"\n    ◦ \"[Lifestyle fit — 'This would be perfect for my mornings']\"\n```\n\nThis section is optional. Include it when the reveal is strong enough to generate two distinct reaction waves.\n\n---\n\n#### 7h. RECOMMENDATION (Optional)\n\n**Purpose:** If appropriate, ask the interviewee who else should know about this. Works especially well after quiz/knowledge formats where the interviewee learned something new.\n\nFormat:\n```\nRECOMMENDATION - Who would the interviewee recommend this to\n  • Host Line:\n    ◦ \"Who else needs to know about this?\"\n  • Example Line:\n    ◦ \"[Specific person — 'My roommate who lives on protein shakes']\"\n    ◦ \"[Broad group — 'Anyone who thinks they know about [topic]']\"\n```\n\nThis section is optional. Omit it for lighter game formats (guessing games, taste tests) where a recommendation feels forced.\n\n---\n\n#### 7i. CTA\n\n**Purpose:** Close the interview with a clear call to action. For Challenge angles, the CTA works best when it ties back to the game result — \"if you want to see if YOUR [blank] would pass the test, check out...\"\n\nFormat:\n```\nCTA - How our hosts will close the interview\n  • Host Line:\n    ◦ \"[CTA tied back to the game — website, code, offer]\"\n```\n\n---\n\n### SECTION 8: KEY MENTIONS\n\nList critical terms, game logistics, compliance notes, or boundary reminders.\n\nFormat:\n```\n### Key Mentions:\n- [Game logistics — cash budget per interviewee, number of rounds, product variants needed]\n- [Compliance note or boundary reminder]\n- [Critical term or phrase]\n```\n\n---\n\n## Quality Checks\n\nBefore finalizing the output, verify:\n\n1. **The hook leads with the GAME, not the product** — read the first Host Line. Does it sound like an invitation to play or an invitation to hear a sales pitch? It must be the former\n2. **The game is explainable in one sentence** — if the RULES / SETUP section is longer than 2 sentences, the game is too complicated. Simplify\n3. **The interviewee COMMITS before the reveal** — check that no Host Line hints at, suggests, or reveals the answer before the interviewee has locked in their choice/answer/guess\n4. **The reveal has two beats** — Beat 1 is the answer, Beat 2 is the product connection. Both must be present. If the reveal goes straight from answer to value props, the moment is lost\n5. **Every Host Line sounds fun and fast** — read it aloud. Challenge angles need ENERGY. If a line sounds slow, corporate, or educational, rewrite it punchier\n6. **Props are specific enough for production** — blind taste tests need exact cup counts, label covers, and product variants specified. Cash challenges need denominations. Quiz formats need question cards\n7. **The product is the punchline, answer, or prize** — if the game could exist without the product, the angle fails. The product must be structurally necessary to the game's resolution\n8. **The game doesn't embarrass the interviewee** — getting a quiz question wrong is fine and fun. Making someone feel stupid is not. Check that the tone of REACTIONS and the REVEAL is surprise/delight, not mockery\n9. **The CTA matches Input 4 exactly** — if a CTA was provided, use it verbatim\n10. **Language to avoid from the onboarding form does NOT appear in any Host Line or Example Line**\n11. **Multiple interviewees are assumed** — Challenge angles are STRONGEST as montages. The brief should note that the game should be run with at least 5–8 people for edit variety\n\n---\n\n## Full Output Example\n\nBelow is a complete example of what a finished Challenge / Game Show angle should look like, based on the Happy Viking brief:\n\n---\n\n## Interview Angle #1 - Happy Viking \"THE PEPSI CHALLENGE\"\nNYC Host - TBD\n\n### Host Demographic:\n- Male or Female, 25–40\n- High-energy, playful, competitive game master vibe\n- Casual athletic or streetwear — matches the health/fitness crowd\n- Quick with banter, comfortable improvising\n- Encouraging, not condescending — makes losing the challenge feel fun\n\n### Interview Demographic:\n- Adults 22–45\n- Fitness-curious or health-conscious — people who've tried protein shakes before\n- Expressive and willing to be on camera\n- NOT nutrition experts — the game works best when they judge purely on taste\n- Diverse mix for montage variety\n\n> 🚨 Set up a blind taste test with two shakes — one is Happy Viking, the other is a leading competitor. Interviewees taste both without knowing which is which and pick their favorite. Reveal that the one they chose is the plant-based superfood option, not the whey shake they expected.\n\n### Props:\n- Happy Viking shake (chocolate or vanilla — pre-blended)\n- Competitor protein shake (Core Power, Orgain, or similar — pre-blended)\n- Two unmarked cups per interviewee (labeled A and B on the bottom only)\n- Small portable table or tray\n- Napkins\n- Label reveal cards (\"Cup A = [Competitor]\" / \"Cup B = Happy Viking\")\n- Water cups for palate cleanse between tastings\n\n### Angle Framework:\n\n**HOOK - How we are going to begin the interaction**\n- Host Line:\n  - \"Quick blind taste test — which of these shakes tastes better?\"\n\n**RULES / SETUP - Quick explanation of how the game works**\n- Host Line:\n  - \"Two shakes. You don't know which is which. Try both, pick your favorite. Simple.\"\n- Host Action:\n  - *Hand them Cup A first. Let them taste and react.*\n  - *Then hand Cup B. Let them taste and react.*\n  - *Do NOT say anything about the brands, ingredients, or differences until they've picked.*\n\n**THE CHALLENGE - The game itself**\n- Host Line:\n  - \"Okay, Cup A... now Cup B... which one are you picking?\"\n  - \"Lock it in — A or B?\"\n- Host Action:\n  - *Let them deliberate. Capture the thinking face.*\n  - *If they want to re-taste, let them. The deliberation is good content.*\n- Example Line:\n  - \"Cup B is way better.\"\n  - \"That one's smoother.\"\n  - \"A was fine but B actually tastes like dessert.\"\n  - \"B, easily. Not even close.\"\n\n**THE REVEAL - Revealing the answer and connecting to the product**\n- Host Line:\n  - \"So the one you picked — Cup B — that's Happy Viking. It's not whey protein. It's 100% plant-based.\"\n  - \"And it's not just protein. It's a complete superfood meal — 30 grams of plant protein and 10 grams of fiber.\"\n- Host Action:\n  - *Flip the label on Cup B to show Happy Viking branding.*\n  - *Let them react BEFORE continuing with value props.*\n\n**REACTIONS - Reactions we are aiming to receive**\n- Example Line:\n  - \"Wait... that's plant-based?\"\n  - \"That's actually good. Like, really good.\"\n  - \"No way. I thought for sure it was the whey one.\"\n  - \"I've had plant protein before and it was nothing like that.\"\n\n**VALUE PROPS - How our hosts describe the features/benefits of the product**\n- Host Line:\n  - \"30 grams of plant protein plus 10 grams of fiber — that's the 30/10 Rule. It's a full meal, not just a shake.\"\n  - \"Over 100 superfoods. No gluten, no dairy, no soy.\"\n  - \"Easy on your stomach — no bloating, no chalky aftertaste. That's why it tasted different.\"\n\n**SECOND REACTIONS - Reactions after hearing the value props**\n- Example Line:\n  - \"I've been scarred by plant protein. This changes things.\"\n  - \"Okay, where do I buy this?\"\n  - \"My trainer needs to know about this.\"\n\n**CTA - How our hosts will close the interview**\n- Host Line:\n  - \"If you've been scarred by chalky shakes, try Happy Viking — it's a complete meal that actually tastes good. Check it out at happyviking.com.\"\n\n### Key Mentions:\n- Run the taste test with at least 8–10 people for montage variety\n- Both shakes must be served at the same temperature in identical cups\n- Do not tell interviewees what type of protein either shake is until after the reveal\n- Always have water available between tastings for palate cleanse\n\n---\n\n## Reference Examples (Summary)\n\nThe following real StreetTalk briefs use Challenge / Game Show framing. Study their patterns when generating new briefs:\n\n**Happy Viking — \"THE PEPSI CHALLENGE\" (Blind Test)**\nType: Blind taste test, two cups, pick a favorite. The reveal that the preferred shake is plant-based (not whey) creates the surprise. The \"100+ superfoods\" fact layer adds a second reaction wave. Classic, proven format.\n\n**Cookt — \"Do You Underestimate Real Meals?\" (Prediction Challenge)**\nType: Prediction game. \"Which has more protein — the shake or the real meal?\" Most people guess the shake. The reveal that the COOKT meal has more protein reframes what \"meal prep\" means. The taste test that follows doubles as an Authentic Testimonial moment.\n\n**Cookt — \"Guess the Country From One Bite\" (Guessing Game)**\nType: Guessing game. Interviewees take one bite and guess the country of origin. The international flavors create surprise and entertainment. Each wrong guess is content. The reveal positions COOKT as globally inspired, not \"boring meal prep.\"\n\n**Speak — \"$5 Spanish Challenge\" (Cash Challenge)**\nType: Cash challenge. \"I'll give you $5 if you can put together a few sentences in Spanish.\" Most people struggle. The product (Speak app) then teaches them in real time on camera, showing visible improvement. The cash incentive gets people to stop; the skill improvement is the product proof.\n\n**Speak — \"Could You Flirt in Spanish?\" (Skill Challenge)**\nType: Lighter skill challenge without cash. \"Be honest, could you flirt in Spanish right now?\" — gets a laugh and a \"no way.\" Host speaks Spanish back, introduces Speak as the way to actually learn. The flirting framing is the entertainment hook; the product is the serious solution underneath.\n\n**SOTE — Hydration Knowledge Quiz (Knowledge Quiz)**\nType: Trivia format. \"How many electrolytes does your body need? What happens when you're dehydrated? What's in most sports drinks?\" Wrong answers reveal knowledge gaps. The product fills those gaps. Education wrapped in entertainment — the viewer learns alongside the interviewee.\n\n---\n\n## Notes for Future Angles\n\nThis document covers the **Challenge / Game Show** angle only. The same structural template (Sections 1–8 + Quality Checks) applies to all angle frameworks. When building additional angle knowledge docs, replace:\n- The \"Decision\" section with the angle-specific strategic logic\n- The conversation flow guidance with angle-specific mechanics\n- The reference examples with briefs that use that angle\n- The quality checks with angle-specific verification criteria\n\nThe Section structure (Header → Demographics → Overview → Props → Do/Don't → Angle Framework → Key Mentions) remains constant across all angles.\n");

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const saved = JSON.parse(raw);
    // Merge — ensure default DB items exist
    return {
      brands: saved.brands && saved.brands.length ? saved.brands : DEFAULT_STATE.brands,
      // Always use DEFAULT_STATE as master angle list; preserve saved videoUrls for matching IDs
      angles: DEFAULT_STATE.angles.map(da => {
        const sv = (saved.angles || []).find(sa => sa.id === da.id);
        return sv ? Object.assign({}, da, { videoUrl: sv.videoUrl || da.videoUrl }) : da;
      }),
      shots: saved.shots && saved.shots.length ? saved.shots : DEFAULT_STATE.shots,
      // Always use DEFAULT_STATE as master hook list; preserve saved videoUrls for matching IDs
      hooks: DEFAULT_STATE.hooks.map(dh => {
        const sv = (saved.hooks || []).find(sh => sh.id === dh.id);
        return sv ? Object.assign({}, dh, { videoUrl: sv.videoUrl || dh.videoUrl }) : dh;
      }),
      projects: saved.projects || [],
      briefs: saved.briefs || [],
    };
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}

const BRAND_SYNC_INTERVAL = 5 * 60 * 1000; // 5 minutes

// Simple CSV parser that handles quoted fields with commas and newlines
function _parseCSV(text) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i + 1] === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
        row.push(field.trim()); field = '';
        if (row.some(f => f)) rows.push(row);
        row = [];
        if (ch === '\r') i++;
      } else { field += ch; }
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(f => f)) rows.push(row); }
  return rows;
}

function _extractDomain(url) {
  if (!url) return '';
  try {
    let clean = url.trim();
    if (!/^https?:\/\//i.test(clean)) clean = 'https://' + clean;
    return new URL(clean).hostname.replace(/^www\./, '');
  } catch(e) { return url.replace(/^https?:\/\/(www\.)?/i, '').split('/')[0]; }
}

async function syncBrandsFromSheet() {
  const indicator = document.getElementById('brand-sync-indicator');
  try {
    if (indicator) { indicator.textContent = 'Syncing...'; indicator.className = 'brand-sync-ind syncing'; }

    // Use Google Visualization API (supports CORS for link-shared sheets)
    const vizUrl = `https://docs.google.com/spreadsheets/d/${BRAND_SHEET_ID}/gviz/tq?tqx=out:csv&gid=${BRAND_SHEET_GID}`;
    const resp = await fetch(vizUrl);
    if (!resp.ok) throw new Error('Sheet fetch failed: ' + resp.status);
    const text = await resp.text();
    const rows = _parseCSV(text);
    if (rows.length < 2) { if (indicator) { indicator.textContent = 'No data'; indicator.className = 'brand-sync-ind'; } return; }

    // Column mapping (row 0 is headers):
    // A(0): brand name, B(1): website URL, E(4): products
    const headers = rows[0];
    const dataRows = rows.slice(1);
    let added = 0;
    let updated = 0;

    for (const row of dataRows) {
      const name = (row[0] || '').trim();
      if (!name) continue;
      const websiteUrl = (row[1] || '').trim();
      const domain = _extractDomain(websiteUrl);
      const productsRaw = (row[4] || '').trim();
      // Split products by comma, newline, or semicolon
      const products = productsRaw ? productsRaw.split(/[,;\n]+/).map(p => p.trim()).filter(Boolean) : [];

      // Check if brand already exists (match by name, case-insensitive)
      const existing = S.brands.find(b => b.name.toLowerCase() === name.toLowerCase());
      if (existing) {
        // Update domain and products if they were empty
        let changed = false;
        if (!existing.domain && domain) { existing.domain = domain; changed = true; }
        if ((!existing.products || existing.products.length === 0) && products.length > 0) { existing.products = products; changed = true; }
        if (changed) updated++;
      } else {
        // Add new brand
        S.brands.push({
          id: uid(),
          name: name,
          domain: domain,
          products: products,
        });
        added++;
      }
    }

    if (added > 0 || updated > 0) {
      saveState();
      // Refresh current view if on home or projects
      if (currentView === 'home' || currentView === 'projects') nav(currentView);
    }

    const syncTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (indicator) {
      indicator.textContent = added > 0 ? `+${added} new · ${syncTime}` : `Synced · ${syncTime}`;
      indicator.className = 'brand-sync-ind synced';
    }
    console.log(`[BrandSync] ${dataRows.length} rows, ${added} added, ${updated} updated`);
  } catch(e) {
    console.warn('[BrandSync] Failed:', e.message);
    if (indicator) { indicator.textContent = 'Sync failed'; indicator.className = 'brand-sync-ind error'; }
  }
}

function startBrandSync() {
  // Initial sync on load
  syncBrandsFromSheet();
  // Periodic sync
  clearInterval(_brandSyncTimer);
  _brandSyncTimer = setInterval(syncBrandsFromSheet, BRAND_SYNC_INTERVAL);
}

          return `<div class="stepper-step ${cls}" onclick="nav('${step.view}')">

              <span class="step-label">${step.label}</span>
            </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function nav(view, arg) {
  currentView = view;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');

  const titles = {
    'home': ['Home', 'Welcome to StreetTalk Brief Builder'],
    'projects': ['Projects', 'Manage your brand campaigns'],
    'brief-building': ['Angle Selection', 'Select angles and add guidelines'],
    'hook-selection': ['Hook Selection', 'Assign hooks to each angle'],
    'brief-generation': ['Brief Generation', 'Generate and publish scripts'],
    'angles-db': ['Angles Database', 'Creative angle library'],
    'hooks-db': ['Hooks Database', 'Hook playbook — openings that stop the scroll'],
    'brands-db': ['Brands Database', 'Brand and product management'],
  };

  const [title, sub] = titles[view] || [view, ''];
  document.getElementById('page-title').textContent = title;
  document.getElementById('page-sub').textContent = sub;
  document.getElementById('header-actions').innerHTML = '';

  // Update context bar
  renderContextBar();

  const mc = document.getElementById('main-content');

  if (view === 'home') renderHome(mc);
  else if (view === 'projects') renderProjects(mc);
  else if (view === 'brief-building') renderBriefBuilding(mc);
  else if (view === 'hook-selection') renderHookSelection(mc);
  else if (view === 'brief-generation') renderBriefGeneration(mc);
  else if (view === 'angles-db') renderAnglesDB(mc);
  else if (view === 'hooks-db') renderHooksDB(mc);
  else if (view === 'brands-db') renderBrandsDB(mc);
}

function updateBadges() {

// ─── USER PROJECT FILTERING ───────────────────────────────────────────────
function getUserProjects() {
  if (!_currentUser) return S.projects;
  return S.projects.filter(p => !p.ownerEmail || p.ownerEmail === _currentUser.email);
}
function getUserBriefs() {
  const projIds = new Set(getUserProjects().map(p => p.id));
  return S.briefs.filter(b => projIds.has(b.projectId));
}

function createProject() {
  const brandId = document.getElementById('proj-brand').value;
  const productName = document.getElementById('proj-product').value;

function deleteProject(id) {
  if (!confirm('Delete this project and all its brief data?')) return;
  S.projects = S.projects.filter(p => p.id !== id);
  S.briefs = S.briefs.filter(b => b.projectId !== id);
  if (_activeProjectId === id) setActiveProject(S.projects.length ? S.projects[0].id : null);
  saveState();
  renderProjects(document.getElementById('main-content'));
}

function toggleAngle(projectId, angleId, cardEl) {
  let brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) {
    brief = { id: uid(), projectId, selectedAngles: [], guidelines: '', cta: '', callTranscript: '', onboardingForm: '', shotAssignments: [], hookAssignments: [], generatedScripts: [], status: 'draft', presentationToken: '', comments: [], approvals: {}, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    S.briefs.push(brief);
  }

  const idx = brief.selectedAngles.findIndex(sa => sa.angleId === angleId);
  if (idx >= 0) {
    brief.selectedAngles.splice(idx, 1);
    cardEl.classList.remove('selected');
  } else {
    brief.selectedAngles.push({ angleId, notes: '' });
    cardEl.classList.add('selected');
  }
  saveState();
  renderContextBar();
  // Flash saved indicator
  const ind = document.getElementById('autosave-bb');
  if (ind) { ind.className = 'autosave-indicator saved'; ind.innerHTML = '<span class="save-dot"></span> Saved'; }
  updateBBSummary(projectId);
}

function updateBBSummary(projectId) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  const count = brief ? brief.selectedAngles.length : 0;
  const el = document.getElementById(`bb-selected-summary-${projectId}`);
  if (!el) return;
  if (count === 0) { el.innerHTML = `<div style="color:var(--text3);font-size:12px;">No angles selected yet.</div>`; return; }
  const names = (brief.selectedAngles || []).map(sa => {
    const a = S.angles.find(x => x.id === sa.angleId);
    return a ? a.name : sa.angleId;
  });
  el.innerHTML = `<div style="font-size:12px;color:var(--green);">✓ ${count} angle${count !== 1?'s':''} selected: ${names.join(', ')}</div>`;
}

function saveBriefBuilding(projectId) {
  let brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) {
    brief = { id: uid(), projectId, selectedAngles: [], guidelines: '', cta: '', callTranscript: '', onboardingForm: '', shotAssignments: [], hookAssignments: [], generatedScripts: [], status: 'draft', presentationToken: '', comments: [], approvals: {}, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    S.briefs.push(brief);
  }
  brief.guidelines     = document.getElementById(`bb-guidelines-${projectId}`)?.value || '';
  brief.cta            = document.getElementById(`bb-cta-${projectId}`)?.value || '';
  brief.callTranscript = document.getElementById(`bb-call-transcript-${projectId}`)?.value || '';
  brief.onboardingForm = document.getElementById(`bb-onboarding-form-${projectId}`)?.value || '';
  brief.updatedAt = new Date().toISOString();
  saveState();
  renderContextBar();
  showToast('Angle selection saved!');

function previewVideo(url, title) {
  const embed = getEmbedUrl(url);
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = `
    <div class="modal modal-wide">
      <div class="modal-title" style="margin-bottom:16px;">▶ ${title}</div>
      ${embed ? `<div class="video-embed"><iframe src="${embed}" allowfullscreen></iframe></div>` : `<div class="notice">Could not embed this URL. <a href="${url}" target="_blank" style="color:var(--accent);">Open in new tab →</a></div>`}
      <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
    </div>
  `;

function getEmbedUrl(url) {
  if (!url) return null;
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  if (yt) return `https://www.youtube.com/embed/${yt[1]}?autoplay=1`;
  const vm = url.match(/vimeo\.com\/(\d+)/);
  if (vm) return `https://player.vimeo.com/video/${vm[1]}?autoplay=1`;
  return null;
}

let _hookPickerFilter = { search: '', format: '' };

function _getFilteredHooks() {
  return S.hooks.filter(h => {
    if (_hookPickerFilter.format && h.format !== _hookPickerFilter.format) return false;
    if (_hookPickerFilter.search) {
      const q = _hookPickerFilter.search.toLowerCase();
      if (!h.name.toLowerCase().includes(q) && !(h.tags||'').toLowerCase().includes(q) && !(h.description||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function _renderHookList(projectId, angleId) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  const assignment = (brief?.hookAssignments || []).find(x => x.angleId === angleId) || { hooks: [] };
  const assignedIds = assignment.hooks.map(h => h.hookId);
  const filteredHooks = _getFilteredHooks();
  const listEl = document.getElementById('hook-picker-list');
  if (!listEl) return;

            ${assigned ? `<span style="font-size:11px;color:var(--green);font-weight:600;">✓ Added</span>` : ''}
            ${embedSrc ? `
              <button onclick="toggleHookPickerPreview('${hook.id}')" id="hook-preview-btn-${hook.id}"
                style="width:44px;height:44px;border-radius:10px;border:1px solid var(--border);background:var(--surface3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;"

              </button>` : ''}

          <div id="hook-preview-panel-${hook.id}" style="display:none;padding:0 12px 12px;">

function renderHookPicker(projectId, angleId) {
  const m = document.getElementById('hook-picker-overlay');
  if (!m) return;
  _hookPickerFilter = { search: '', format: '' };
  m.innerHTML = `
    <div class="modal" style="max-width:540px;">
      <div class="modal-title">Add Hooks</div>
      <div class="modal-sub">Select hooks from the playbook, then click Done.</div>

    _hookPickerFilter.search = this.value;

  });

    _hookPickerFilter.format = this.value;

function toggleHookPickerPreview(hookId) {
  const panel = document.getElementById(`hook-preview-panel-${hookId}`);
  const btn   = document.getElementById(`hook-preview-btn-${hookId}`);
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  // Toggle button appearance when open
  if (btn) {
    if (isOpen) { btn.style.background = 'var(--surface3)'; btn.style.borderColor = 'var(--border)'; btn.style.color = 'var(--text2)'; }
    else { btn.style.background = 'var(--accent)'; btn.style.borderColor = 'var(--accent)'; btn.style.color = '#fff'; }
  }
}

function addHookToAngle(projectId, angleId, hookId) {
  let brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  if (!brief.hookAssignments) brief.hookAssignments = [];
  let assignment = brief.hookAssignments.find(x => x.angleId === angleId);
  if (!assignment) {
    assignment = { angleId, hooks: [] };
    brief.hookAssignments.push(assignment);
  }
  if (assignment.hooks.some(h => h.hookId === hookId)) return;
  const hook = S.hooks.find(h => h.id === hookId);
  assignment.hooks.push({ hookId, notes: '', format: hook ? hook.format : '' });
  saveState();
  renderContextBar();
  onHSProjectChange(projectId);
  const ind = document.getElementById('autosave-hs');
  if (ind) { ind.className = 'autosave-indicator saved'; ind.innerHTML = '<span class="save-dot"></span> Saved'; }
}

function removeHookFromAngle(projectId, angleId, idx) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  const assignment = brief.hookAssignments?.find(x => x.angleId === angleId);
  if (!assignment) return;
  assignment.hooks.splice(idx, 1);
  saveState();
  renderContextBar();
  onHSProjectChange(projectId);
  const ind = document.getElementById('autosave-hs');
  if (ind) { ind.className = 'autosave-indicator saved'; ind.innerHTML = '<span class="save-dot"></span> Saved'; }
}

function updateHookNotes(projectId, angleId, idx, val) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  const assignment = brief.hookAssignments?.find(x => x.angleId === angleId);
  if (!assignment || !assignment.hooks[idx]) return;
  assignment.hooks[idx].notes = val;
  _debouncedAutoSave(projectId, 'hs');
}

function saveHookSelection(projectId) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (brief) { brief.updatedAt = new Date().toISOString(); saveState(); }
  renderContextBar();
  showToast('Hook selection saved!');
  setTimeout(() => nav('brief-generation'), 600);
}

        <button class="btn btn-green" onclick="publishBrief('${projectId}')">🚀 ${brief.status === 'published' ? 'Update Share Link' : 'Publish & Share'}</button>

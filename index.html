<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreetTalk Brief Builder</title>
  <style>
    :root {
      --bg: #0d0d0f; --surface: #1a1a1a; --surface2: #1c1c21; --surface3: #252530;
      --border: #2e2e3a; --text: #ffffff; --text2: #a1a1aa; --text3: #71717a;
      --accent: #4242d7; --accent-hover: #3535c0; --accent-light: rgba(66,66,215,0.15);
      --green: #22c55e; --green-light: rgba(34,197,94,0.12);
      --yellow: #eab308; --yellow-light: rgba(234,179,8,0.12);
      --red: #ef4444; --red-light: rgba(239,68,68,0.12);
      --radius: 10px; --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; height: 100vh; display: flex; overflow: hidden; }
    .main-container { display: flex; width: 100%; height: 100%; }

    /* SIDEBAR */
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 16px 0; flex-shrink: 0; }
    .sidebar-logo { padding: 4px 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .sidebar-logo .logo-text { font-size: 16px; font-weight: 700; color: var(--text); }
    .sidebar-logo .logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .sidebar-section { padding: 16px 20px 6px; font-size: 10px; text-transform: uppercase; color: var(--text3); font-weight: 700; letter-spacing: 0.8px; }
    .sidebar-item { padding: 9px 20px; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 10px; transition: all 0.15s; font-size: 13.5px; }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; border-right: 2px solid var(--accent); }
    .sidebar-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-item .badge { margin-left: auto; background: var(--surface3); padding: 1px 7px; border-radius: 10px; font-size: 11px; }

    /* CONTENT */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; min-height: 64px; }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .main-content { flex: 1; overflow-y: auto; padding: 28px; }

    /* BUTTONS */
    .btn { padding: 9px 16px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; transition: all 0.15s; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface3); }
    .btn-green { background: var(--green); color: #0a1a0a; }
    .btn-green:hover { background: #16a34a; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: var(--red-light); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: var(--red); color: white; }

    /* FORMS */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-weight: 600; margin-bottom: 7px; color: var(--text); font-size: 13px; }
    .form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 9px 12px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text);
      border-radius: var(--radius-sm); font-family: inherit; font-size: 13px;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .form-textarea { min-height: 90px; resize: vertical; }
    .form-select option { background: var(--surface2); }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card + .card { margin-top: 16px; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .card-sub { font-size: 12px; color: var(--text3); }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

    /* ANGLE CARDS */
    .angle-card { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all 0.15s; }
    .angle-card:hover { border-color: #22c55e; }
    .angle-card.selected { border-color: #22c55e; background: rgba(34,197,94,0.08); }
    .angle-card.not-ready { border-color: rgba(239,68,68,0.35); box-shadow: 0 0 12px rgba(239,68,68,0.12); }
    .angle-card.not-ready:hover { border-color: rgba(239,68,68,0.5); }
    .angle-card.not-ready.selected { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.06); }
    .angle-card .angle-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .angle-card .angle-cat { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 600; letter-spacing: 0.4px; margin-bottom: 8px; }
    .angle-card .angle-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
    .angle-card .angle-actions { margin-top: 10px; display: flex; gap: 8px; }

    /* SHOT CARDS */
    .shot-chip { background: var(--surface3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
    .shot-chip:hover { border-color: var(--accent); }
    .shot-chip.selected { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    /* TAGS */
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .tag-aroll { background: rgba(99,102,241,0.15); color: #818cf8; }
    .tag-broll { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .tag-both { background: rgba(34,197,94,0.15); color: var(--green); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; color: var(--text2); margin-bottom: 8px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal-wide { width: 640px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* STEPS INDICATOR */
    .step-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--text3); margin-bottom: 20px; }
    .step-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* PROJECT LIST */
    .project-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 10px; transition: border-color 0.15s; }
    .project-row:hover { border-color: var(--border); }
    .project-row .proj-info { flex: 1; }
    .project-row .proj-name { font-weight: 700; font-size: 15px; }
    .project-row .proj-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .status-pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
    .status-draft { background: var(--surface3); color: var(--text3); }
    .status-generating { background: var(--accent-light); color: var(--accent); animation: gen-pulse 1.5s ease-in-out infinite; }
    @keyframes gen-pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    .status-ready { background: var(--yellow-light); color: var(--yellow); }
    .status-published { background: var(--green-light); color: var(--green); }

    /* BRIEF GENERATION */
    .script-block { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
    .script-angle { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .script-cat { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
    .script-text { font-size: 13px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; }
    .script-editor { width: 100%; min-height: 200px; resize: vertical; font-size: 13px; font-family: inherit; color: var(--text2); line-height: 1.7; background: var(--surface3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; box-sizing: border-box; outline: none; transition: border-color 0.15s; }
    .script-editor:focus { border-color: var(--accent); }
    .script-char-count { font-size: 11px; color: var(--text3); text-align: right; margin-top: 4px; }

    /* VIDEO PREVIEW */
    .video-embed { margin-top: 10px; border-radius: var(--radius-sm); overflow: hidden; background: #000; aspect-ratio: 9/16; max-width: 360px; }
    .video-embed iframe { width: 100%; height: 100%; border: none; }
    .video-placeholder { background: var(--surface3); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 12px; color: var(--text3); text-align: center; margin-top: 8px; }

    /* PRESENTATION PAGE */
    #presentation-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; overflow-y: auto; display: none; font-family: inherit; }
    .pres-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px); background: rgba(26,26,26,0.92); }
    .pres-body { max-width: 1000px; margin: 0 auto; padding: 40px 28px 60px; }
    .pres-stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; display: flex; align-items: center; gap: 10px; }
    .pres-angle-card { background: var(--surface); border-radius: 14px; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--border); }
    .pres-card-header { display: flex; align-items: center; padding: 16px 22px; border-bottom: 1px solid var(--border); gap: 14px; }
    .pres-card-body { display: flex; gap: 24px; padding: 22px; align-items: flex-start; }
    .pres-video-col { flex-shrink: 0; width: 200px; }
    .pres-script-col { flex: 1; min-width: 0; }
    .pres-tab-bar { display: flex; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
    .pres-tab { flex: 1; padding: 8px 10px; background: var(--surface3); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.15s; }
    .pres-tab:hover { color: var(--text); background: var(--surface2); border-color: rgba(66,66,215,0.4); }
    .pres-tab.active { background: var(--accent); font-weight: 700; color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(66,66,215,0.3); }
    .pres-script-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; font-size: 13px; color: var(--text2); line-height: 1.75; white-space: pre-wrap; }

    /* ─── PRINT / PDF EXPORT ───────────────────────────────────────────── */
    @media print {
      body, html { background: #fff !important; color: #111 !important; }
      * { color-adjust: exact !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      #app-shell, .copy-toast, .pres-header { display: none !important; }
      #presentation-overlay { position: static !important; display: block !important; background: #fff !important; overflow: visible !important; z-index: auto !important; }
      .pres-body { max-width: 100% !important; padding: 20px !important; }
      /* Show all angles expanded */
      .pres-card-body { display: flex !important; }
      /* Hide interactive elements */
      .pres-approve-btn, .pres-comment-btn, .pres-collapse-btn, .pres-tab-bar,
      [id^="ptabpanel-"][id$="-comment"], [id^="ptabpanel-"][id$="-creators"],
      [id^="comment-input-"], .no-print { display: none !important; }
      /* Show all relevant tab panels */
      [id^="ptabpanel-"][id$="-full-script"], [id^="ptabpanel-"][id$="-guidelines"], [id^="ptabpanel-"][id$="-hooks"] { display: block !important; }
      /* Section label for print */
      .print-section-label { display: block !important; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #666; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #ddd; }
      /* Fix dark-mode colors for print */
      .pres-angle-card { background: #fff !important; border: 1px solid #ddd !important; break-inside: avoid; }
      .pres-card-header { border-bottom: 1px solid #ddd !important; }
      .framework-section { background: #f9f9f9 !important; border: 1px solid #e5e5e5 !important; }
      .pres-script-col { flex: 1 !important; }
      .pres-video-col { display: none !important; }
      a { color: #4242d7 !important; }
    }
    .print-section-label { display: none; }

    /* ─── NOTION-STYLE FRAMEWORK SECTIONS ──────────────────────────────── */
    .framework-heading { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 14px; text-decoration: underline; text-underline-offset: 4px; }
    .framework-section { background: var(--surface3); border-radius: 8px; padding: 16px 18px; margin-bottom: 10px; position: relative; border: 1px solid transparent; transition: border-color 0.15s, box-shadow 0.15s; }
    .framework-section:hover { border-color: rgba(66,66,215,0.2); box-shadow: 0 0 0 1px rgba(66,66,215,0.08); }
    .framework-section-header { margin-bottom: 10px; }
    .framework-section-name { font-weight: 800; font-size: 13px; color: var(--text); text-transform: uppercase; letter-spacing: 0.3px; border-radius: 3px; transition: background 0.15s; }
    .framework-section-name:hover { background: rgba(66,66,215,0.06); cursor: text; }
    .framework-section-name[contenteditable="true"] { background: rgba(66,66,215,0.08); box-shadow: inset 0 0 0 2px var(--accent); outline: none; padding: 1px 4px; }
    .framework-section-desc { font-weight: 400; font-size: 13px; color: var(--text2); border-radius: 3px; transition: background 0.15s; }
    .framework-section-desc:hover { background: rgba(66,66,215,0.06); cursor: text; }
    .framework-section-desc[contenteditable="true"] { background: rgba(66,66,215,0.08); box-shadow: inset 0 0 0 2px var(--accent); outline: none; padding: 1px 4px; }
    .framework-line { margin-bottom: 6px; padding-left: 4px; }
    .framework-line:last-child { margin-bottom: 0; }
    .framework-line-type { font-weight: 700; font-size: 12px; color: var(--text); margin-bottom: 2px; }
    .framework-line-text { font-size: 13px; color: var(--text2); line-height: 1.6; padding: 3px 24px 3px 16px; position: relative; border-radius: 4px; cursor: text; transition: background 0.15s, box-shadow 0.15s; }
    .framework-line-text:hover { background: rgba(66,66,215,0.05); box-shadow: inset 0 0 0 1px rgba(66,66,215,0.18); }
    .framework-line-text[contenteditable="true"] { background: rgba(66,66,215,0.08); box-shadow: inset 0 0 0 2px var(--accent); outline: none; cursor: text; }
    .framework-line-text[contenteditable="true"]::before { display: none; }
    .framework-line-text[contenteditable="true"] .fw-edit-icon { display: none; }
    .framework-line-text::before { content: '◦'; position: absolute; left: 2px; color: var(--text3); }
    .framework-lines-group { margin-top: 8px; }
    /* ─── INTERACTIVE EDITING CHROME ──────────────────────────────── */
    .fw-edit-banner { display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(66,66,215,0.06);border:1px dashed rgba(66,66,215,0.25);border-radius:8px;margin-bottom:14px;font-size:12px;color:var(--accent); }
    .fw-edit-banner svg { flex-shrink:0;color:var(--accent); }
    .fw-drag-handle { position:absolute;left:-2px;top:16px;opacity:0;transition:opacity 0.15s;cursor:grab;color:var(--text3);font-size:14px;padding:2px 4px;user-select:none;z-index:1; }
    .framework-section:hover .fw-drag-handle { opacity:0.7; }
    .fw-drag-handle:hover { opacity:1 !important;color:var(--accent); }
    .fw-delete-btn { position:absolute;right:8px;top:8px;opacity:0;transition:opacity 0.15s;cursor:pointer;background:none;border:none;color:var(--text3);padding:4px 6px;border-radius:4px;font-size:13px;z-index:1; }
    .framework-section:hover .fw-delete-btn { opacity:0.5; }
    .fw-delete-btn:hover { opacity:1 !important;color:#ef4444;background:rgba(239,68,68,0.1); }
    .fw-edit-icon { position:absolute;right:6px;top:50%;transform:translateY(-50%);opacity:0;transition:opacity 0.15s;color:var(--text3);pointer-events:none; }
    .framework-line-text:hover .fw-edit-icon { opacity:0.5; }
    .fw-add-section-btn { display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;margin-top:8px;border:2px dashed var(--border);border-radius:8px;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s; }
    .fw-add-section-btn:hover { border-color:var(--accent);color:var(--accent);background:rgba(66,66,215,0.04); }
    .fw-add-line-btn { display:inline-flex;align-items:center;gap:4px;padding:3px 8px;margin-top:6px;border:1px dashed var(--border);border-radius:4px;background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all 0.15s;opacity:0; }
    .framework-section:hover .fw-add-line-btn { opacity:1; }
    .fw-add-line-btn:hover { border-color:var(--accent);color:var(--accent); }
    .framework-section.dragging { opacity:0.4;border:2px dashed var(--accent); }
    .framework-section.drag-over { border-top:3px solid var(--accent); }
    /* ─── ABOUT SECTION ──────────────────────────────────────────── */
    .about-section [data-about]:hover { background: rgba(66,66,215,0.05); }
    .about-section [data-about][contenteditable="true"] { background: rgba(66,66,215,0.08); box-shadow: inset 0 0 0 2px var(--accent); outline: none; }
    .custom-audio { display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;width:70%;margin:0 auto; }
    .custom-audio audio { display:none !important; }
    .custom-audio .ca-play { width:22px;height:22px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:opacity 0.15s; }
    .custom-audio .ca-play:hover { opacity:0.85; }
    .custom-audio .ca-time-label { font-size:11px;color:var(--text2);white-space:nowrap;font-variant-numeric:tabular-nums;flex-shrink:0; }
    .custom-audio .ca-track { flex:1;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;cursor:pointer;position:relative; }
    .custom-audio .ca-progress { height:100%;background:var(--accent);border-radius:2px;width:0%;pointer-events:none; }
    /* ─── LINE DELETE BUTTON (shared) ────────────────────────────── */
    .fw-line-row { display:flex;align-items:center;gap:6px; }
    .fw-line-row .framework-line-text { flex:1;min-width:0; }
    .line-del { display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.06);color:rgba(239,68,68,0.45);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;flex-shrink:0;line-height:1;padding:0; }
    .line-del:hover { background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4);color:#ef4444; }
    /* ─── GUIDELINES INLINE EDITING ──────────────────────────────── */
    .gl-item:hover { background:rgba(66,66,215,0.04); }
    .gl-item-text:hover { background:rgba(66,66,215,0.05);box-shadow:inset 0 0 0 1px rgba(66,66,215,0.18); }
    .gl-item-text[contenteditable="true"] { background:rgba(66,66,215,0.08);box-shadow:inset 0 0 0 2px var(--accent);outline:none; }
    .gl-item-text[contenteditable="true"] .fw-edit-icon { display:none; }
    .gl-item-text:hover .fw-edit-icon { opacity:0.5; }

    .pres-approve-btn { display: flex; align-items: center; gap: 5px; padding: 6px 14px; border: none; border-radius: 20px; font-size: 11.5px; font-weight: 700; cursor: pointer; transition: all 0.15s; letter-spacing: 0.2px; }
    .pres-approve-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .pres-comment-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--surface3); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text); transition: all 0.15s; }
    .pres-comment-btn:hover { border-color: var(--accent); background: rgba(66,66,215,0.08); color: var(--text); }

// ─── STATE ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'st_brief_v1';
const KNOWLEDGE_DOCS_KEY = 'st_knowledge_docs';
const SNAPSHOTS_KEY = 'st_brief_snapshots';

// ─── SNAPSHOT SYSTEM ─────────────────────────────────────────────────────────
// Snapshots freeze a complete copy of all data needed to render a published brief.
// The presentation view reads from the snapshot, not from live state.
// This means edits to the brief/angles/hooks won't affect the published view until republished.
function loadSnapshots() {
  try { return JSON.parse(localStorage.getItem(SNAPSHOTS_KEY) || '{}'); } catch(e) { return {}; }
}
function saveSnapshot(token, snapshotData) {
  const all = loadSnapshots();
  all[token] = snapshotData;
  localStorage.setItem(SNAPSHOTS_KEY, JSON.stringify(all));
}
function getSnapshot(token) {
  return loadSnapshots()[token] || null;
}
function deleteSnapshot(token) {
  const all = loadSnapshots();
  delete all[token];
  localStorage.setItem(SNAPSHOTS_KEY, JSON.stringify(all));
}
// Build a self-contained snapshot of everything the presentation needs
function buildSnapshot(brief, project, brand) {
  const angleIds = brief.selectedAngles.map(sa => sa.angleId);
  const snappedAngles = S.angles.filter(a => angleIds.includes(a.id)).map(a => JSON.parse(JSON.stringify(a)));
  const hookIds = new Set();
  (brief.hookAssignments || []).forEach(ha => (ha.hooks || []).forEach(h => hookIds.add(h.hookId)));
  const snappedHooks = S.hooks.filter(h => hookIds.has(h.id)).map(h => JSON.parse(JSON.stringify(h)));
  return {
    brief: JSON.parse(JSON.stringify(brief)),
    project: project ? JSON.parse(JSON.stringify(project)) : null,
    brand: brand ? JSON.parse(JSON.stringify(brand)) : null,
    angles: snappedAngles,
    hooks: snappedHooks,
    publishedAt: new Date().toISOString()
  };
}

// Knowledge docs stored separately (they're large). Map of angleName → markdown string.
function loadKnowledgeDocs() {
  try { return JSON.parse(localStorage.getItem(KNOWLEDGE_DOCS_KEY) || '{}'); } catch(e) { return {}; }
}
function saveKnowledgeDoc(angleName, doc) {
  const docs = loadKnowledgeDocs();
  docs[angleName] = doc;
  localStorage.setItem(KNOWLEDGE_DOCS_KEY, JSON.stringify(docs));
}
function getKnowledgeDoc(angleName) {
  return loadKnowledgeDocs()[angleName] || '';
}

  const docs = loadKnowledgeDocs();
  if (!docs["Authentic Testimonial"]) {
    saveKnowledgeDoc("Authentic Testimonial", `# Authentic Testimonial — Street Interview Angle Knowledge Doc

## What This Document Is

This is the reference document for generating an **"Authentic Testimonial"** street interview brief angle inside the StreetTalk briefing app. When a creative strategist triggers the Authentic Testimonial angle builder, the system should follow the instructions below to analyze the brand's inputs and produce a fully structured angle section ready for production.

**What this angle is:** Someone tries your product on camera and shares their honest, unscripted reaction in real time. There is no competitor product. There is no comparison. The entire ad is built on the strength of ONE genuine moment — the interviewee experiencing the product for the first time and reacting authentically.

---

## Role

You are a senior StreetTalk creative strategist. Your job is to produce a production-ready "Authentic Testimonial" street interview angle — a complete conversation framework that a host can execute on camera with real people on the street. The angle must feel natural, not scripted. Every line you write is a suggestion the host can adapt in the moment, not a teleprompter script.

---

## Inputs You Will Receive

You will be provided four inputs. Inputs 1 and 2 are required. Inputs 3 and 4 are optional but take priority when provided.

### Input 1: Onboarding Call Transcript (REQUIRED)

A transcript from the call between the creative strategist and the brand. Extract:

- **The core product experience** — what does the product feel like, taste like, smell like, look like when someone uses it for the first time? This is the moment the entire angle is built around
- **The "aha moment"** — what do first-time users say that signals the product clicked? Brands almost always describe this in the call. Listen for "people always say..." or "the first thing they notice is..."
- **Sensory language** — how the brand describes the product experience. Taste (smooth, clean, sweet, unexpected heat), feel (lightweight, silky, instant absorption), smell (subtle, not overpowering, sophisticated), visual (glow, sheer, natural finish)
- **The pain point the product solves** — what frustration or unmet need exists before the product enters? This becomes the HOOK and FOLLOW-UP setup
- **Application or usage instructions** — how should the product be tried on camera? Does it need to be applied a certain way? Is there a trick to getting the best first impression?
- **Compliance or claim restrictions** — what can and can't the host say about the product's effects?

### Input 2: Onboarding Form (REQUIRED)

A completed brand intake form containing answers to the following questions:

| Field | What to extract |
|-------|----------------|
| Brand name | Use as the brand name throughout the brief |
| Website URL | Use for the CTA and brand link |
| Social profiles | Note for CTA options (link in bio, etc.) |
| Products to focus on | This is the product being tried on camera — the star of the angle |
| Customer avatar(s) | Use to define Interview Demographic — these are the people most likely to have a strong reaction |

## Decision: Trial Mechanic

Before writing anything, determine what type of on-camera product trial makes sense. This drives the DEMONSTRATION section, Props, and the type of reaction you're designing for.

**SENSORY TRIAL** — The interviewee tastes, smells, feels, or sees the product's effect in real time.
- Best for: Food & bev, fragrance, skincare, beauty, supplements with taste
- The reaction is visceral and immediate — the camera captures the sensory moment
- Examples: SOTE blind taste test, Mike's Hot Honey drizzle, Thomson Carter fragrance try-on, Jones Road Miracle Balm application

**APPLICATION TRIAL** — The interviewee applies or uses the product and reacts to the result.
- Best for: Beauty, skincare, cookware (hold/feel), wellness products
- The reaction builds over a few seconds — there's a "before" and "after" visible on camera
- Examples: Jones Road "10-Second Glow Challenge," Sky&Sol moisturizer application, Taima pan weight/feel

**EDUCATION-TO-TRIAL** — The host first educates the interviewee on a problem they didn't know they had, then introduces the product as the solution.
- Best for: Health & wellness, supplements, skincare with ingredient stories, products that require context
- The reaction is cognitive first ("I didn't know that") then experiential ("oh wow, this is different")
- Examples: Sky&Sol "clean" moisturizer myth, Perelel trimester-specific vitamins, SOTE hydration education

This decision affects the HOOK framing, DEMONSTRATION structure, and what type of REACTIONS you're aiming for.

### SECTION 6: DO / DON'T GUIDELINES

**Standard Do's for Authentic Testimonial:**
- Let the product experience speak for itself — don't over-explain before the trial
- Capture the FIRST reaction — this is the money shot. Don't let the host talk over it
- Keep it conversational — the interviewee should feel like they're talking to a friend, not participating in a commercial
- Encourage honest responses — "just tell me what you think" is better than leading questions
- Get varied reactions — some people will love it quietly, others will be loud. Both are valuable

**Standard Don'ts for Authentic Testimonial:**
- Do not over-sell before the trial — the host should introduce the product simply, not pitch it
- Do not coach reactions — never say "you're going to love this" or "amazing, right?"
- Do not rush the experience — give the interviewee time to form their own opinion
- Do not use the product on someone without permission (especially skincare, beauty, fragrance)
- Do not make the interviewee feel pressured to give a positive response

### SECTION 7: ANGLE FRAMEWORK (Conversation Flow)

Inside each block, use these internal labels:
- **Host Line:** — What the host says (dialogue in quotes on sub-bullets)
- **Example Line:** — Target interviewee responses (dialogue in quotes on sub-bullets)
- **Host Action:** — Physical staging directions (in italicized text on sub-bullets)

The conversation flow for Authentic Testimonial follows this order (8 blocks):

---

#### 7a. HOOK

**Purpose:** Stop the person and establish the context for the trial. The hook should surface the interviewee's current situation or frustration with the product category — NOT introduce the product yet.

**CRITICAL RULES FOR HOOKS:**

1. **Be direct, not clever.** Simple question about the product category or the pain point it solves. No gimmicks, no staged scenarios.

2. **The scenario must be realistic.** The host is cold-approaching a stranger on the street. Ask a broad question anyone in the target demo could answer. Do NOT assume they're doing or using something specific.

3. **Never stage a fake coincidence.** No pretending the host is casually using the product. No assuming the interviewee is mid-activity.

**What GOOD hooks look like (from real briefs):**
- "Can I give you a 10-second glow challenge?" — direct offer, anyone can say yes
- "Quick question, what do you think 'clean' means when moisturizers say they are?" — broad question about the category
- "That looks boring... how's it taste?" — direct, situational (the person is already eating)
- "When you hear vanilla perfume… what comes to mind?" — simple perception question

**What BAD hooks look like:**
- ❌ "I noticed you look a little dehydrated — want to try something?" — presumptuous, insulting
- ❌ *(Host applies product to own face)* "Want to try what I'm wearing?" — staged
- ❌ "We're doing a top-secret product launch and you've been selected!" — gimmicky

**The formula for Authentic Testimonial hooks:** Either (a) ask about the product category / pain point, OR (b) offer the trial directly as a fun challenge. Both are simple and direct.

Write 1–2 hook options.

Format:
\`\`\`
HOOK - How we are going to begin the interaction
  • Host Line:
    ◦ "[Simple, direct question or trial offer]"
\`\`\`

---

#### 7b. FOLLOW-UP QUESTION

**Purpose:** Get the interviewee talking about their current experience, frustration, or routine BEFORE the trial. This creates context — when they react positively to the product, the viewer understands WHY it matters.

For Authentic Testimonial, the follow-up should reveal:
- What they currently use (so the product feels like a discovery)
- What frustrates them about the category (so the product feels like a solution)
- Their expectations (so the product can exceed them)

Keep it to 1–3 questions.

Format:
\`\`\`
FOLLOW-UP QUESTION - To prompt a response from the interviewee
  • Host Line:
    ◦ "[Question about current routine/product]"
    ◦ "[Question about frustration or unmet need]"
\`\`\`

---

#### 7c. INITIAL RESPONSES

**Purpose:** Define what "good" interviewee responses sound like BEFORE the trial. These are the pain points, frustrations, or expectations that make the eventual positive product reaction feel earned.

Pull from:
- **Customer pain points** in the onboarding form
- **Category frustrations** mentioned in the call transcript
- **Common complaints** the target audience has

Write 4–6 example responses.

Format:
\`\`\`

  • Example Line:
    ◦ "[Current routine/product they use]"
    ◦ "[Frustration with current approach]"
    ◦ "[Low expectation or skepticism]"
    ◦ "[Openness to trying something new]"
\`\`\`

---

#### 7d. PRODUCT INTRODUCTION + DEMONSTRATION

**Purpose:** This is where the host introduces the product AND the interviewee tries it. For Authentic Testimonial, these happen together — the host gives a brief, minimal introduction, then immediately has the interviewee try it. Do NOT over-explain the product before the trial. Let the experience do the talking.

**The introduction should be ONE sentence** — just enough for the interviewee to know what they're about to try. Save the full value prop explanation for AFTER they've reacted.

This section uses Host Line (brief introduction), Host Action (staging the trial), AND Example Line (target first reactions during the trial).

**For tastings:** Host hands the product, interviewee tastes, captures real-time sensory reactions.
**For beauty/skincare application:** Host applies or guides application, captures the visual transformation and the interviewee's response to seeing/feeling it.
**For fragrance:** Host sprays or offers a test strip, captures the smell reaction and any immediate compliments from bystanders.
**For physical products (cookware, luggage, tech):** Host hands the product to hold/feel, captures the weight, texture, or feature surprise.

\`\`\`

\`\`\`

**Key rule:** The interviewee's FIRST uncoached reaction to the product is the most valuable moment in the entire ad. Do not talk over it. Do not prompt it. Let it happen.

#### 7e. REACTIONS

**Purpose:** Define the target reactions AFTER the interviewee has had a moment to process the experience. These are the "money shot" sound bites — the lines that make the ad work in the edit.

For Authentic Testimonial, the best reactions are:
- **Sensory surprise** — "Oh wow, that's actually smooth" / "Wait, there's no aftertaste?"
- **Exceeded expectations** — "That's way better than I expected" / "This doesn't feel like what I normally use"
- **Instant convert** — "I need this" / "Where do I get this?" / "I'd actually use this every day"
- **Relatable realization** — "This is what I've been looking for" / "Why haven't I tried this before?"

Write 4–6 target reaction lines.

    ◦ "[Instant convert]"

#### 7f. VALUE PROPS

**Purpose:** NOW the host explains why the product works the way it does. This comes AFTER the reaction — the interviewee has already experienced the product positively, and the value props explain the "why" behind what they just felt.

Each value prop should connect back to the reaction the interviewee just had. If they said "that's so smooth," the value prop explains WHY it's smooth (the ingredients, the formulation, the material).

Write 3–4 value props as complete sentences the host can say naturally.

**Purpose:** Close the interview with a clear call to action. Use the CTA from Input 4 verbatim. If Input 4 is empty, use the offer from the onboarding form. Spell out the URL phonetically if it's not intuitive.

For Authentic Testimonial, the CTA can be warmer and more conversational than other angles because the interviewee has just had a positive experience. The host can tie it back to the reaction.

## Quality Checks

Before finalizing the output, verify:

1. **Every hook is direct and realistic** — would this actually happen on a sidewalk? No staged setups, no fake coincidences, no assumptions about what the stranger is doing
2. **The product introduction is ONE sentence or less before the trial** — do not over-explain. The interviewee should try the product with minimal setup, not sit through a pitch first
3. **The first reaction moment is protected** — no Host Lines interrupt the interviewee's initial response. The Host Action should include "let them react before speaking"
4. **Every Host Line sounds conversational** — read it aloud. If it sounds like ad copy, rewrite it
5. **Value Props come AFTER the reaction, not before** — the experience sells the product first, the explanation reinforces it second
6. **Props include application tools and setup items** — not just the product itself. Think: cups, spatulas, mirrors, napkins, anything needed for a clean on-camera trial
7. **Pain points from the onboarding form appear in INITIAL RESPONSES** — the viewer needs to see their own frustration reflected before the product solves it
8. **Target REACTIONS match what real customers say post-purchase** — pull from "what customers like most" in the onboarding form
9. **The CTA matches Input 4 exactly** — if a CTA was provided, use it verbatim
10. **Language to avoid from the onboarding form does NOT appear in any Host Line or Example Line**
11. **Application instructions are specific enough for a host to execute on camera** — "apply the product" is not specific enough; "break the top layer with your finger, apply to cheekbones using the spatula, then have them blend with their fingers" is

## Reference Examples (Summary)

**Jones Road — "10-Second Glow Challenge"**
Type: Application trial. Host applies Miracle Balm on camera, interviewee sees instant glow in mirror. The speed (10 seconds) IS the value prop — busy women see that it fits their life.

**SOTE — "True Blind Taste Test"**
Type: Sensory trial (blind format). Four cups, three brands, interviewee picks a favorite without knowing which is which. The reveal creates a genuine surprise moment. Hook is direct: "You look like you drink electrolytes. Blind taste test — let's go!"

**Mike's Hot Honey — Tasting Angle**
Type: Sensory trial (food upgrade). Host approaches someone eating something plain, offers to "make it way better with just one thing." The drizzle and first taste reaction IS the ad. Fast, visceral, sensory.

**Thomson Carter — Fragrance Try-On**
Type: Perception shift trial. Opens with "when you hear vanilla perfume, what comes to mind?" — gets a negative expectation (too sweet, basic, cupcakes) — then has them try the product. The gap between expectation and experience creates the moment.

**Sky&Sol — "Clean" Moisturizer Education**
Type: Education-to-trial. Opens with a question about what "clean" means in skincare. Educates on the problem (fillers and synthetics in "clean" products), then introduces tallow-based formula. The aha moment is cognitive then experiential.

**Perelel — Prenatal Vitamins**
Type: Education-to-trial. Supportive, empathetic tone targeting pregnant women and new moms. Educates on trimester-specific nutrition, introduces OB/GYN-founded brand as the solution. Tone is "doctor meets friend."

## Decision: Test Format

Before writing anything, determine how many options and what format creates the strongest proof for this product.

**HEAD-TO-HEAD (2 options)** — The brand's product vs. one competitor. Simple, fast, clear winner.
- Best for: Products with one dominant competitor, products where the taste/feel difference is dramatic, fast-paced content formats
- Simpler production — only two options to prepare and manage
- Clearer narrative — "they chose ours over [category leader]"
- Less credible if the viewer thinks the test was rigged (only two options feels like a coin flip)
- Examples: Happy Viking vs. competitor shake ("THE PEPSI CHALLENGE")

**LINEUP (3–4 options)** — The brand's product alongside multiple competitors. More credible, more dramatic reveal.
- Best for: Products in crowded categories where beating MULTIPLE competitors is the story, products where the brand wants to prove category dominance
- More credible — choosing one out of four feels more meaningful than one out of two
- More dramatic reveal — the interviewee tries all four, picks one, and the reveal shows they chose the underdog/newcomer over established brands
- More complex production — needs more prep, more cups/samples, more time per interviewee
- Examples: SOTE blind taste test (4 cups — Liquid IV, Gatorade, LMNT, SOTE)

**SINGLE BLIND (1 product, identity hidden)** — The interviewee tries the brand's product without knowing what it is, reacts, then learns the brand. No competitor present.
- Best for: Products where the brand identity carries baggage (e.g., "plant-based" makes people expect bad taste), products where removing the label changes the experience
- The "blind" element removes preconceptions — the interviewee judges purely on experience
- The reveal is about IDENTITY, not preference — "that thing you loved? It's plant-based / it's tallow / it's sugar-free"
- Less competitive but still powerful — the interviewee's own bias is the "competitor"
- Examples: Removing the "plant-based" label from a shake so people judge on taste alone

This decision affects the SETUP section, number of props needed, how THE TASTING is structured, and what the REVEAL looks like.

### SECTION 6: DO / DON'T GUIDELINES

**Standard Do's for Blind Reaction:**
- Set up the test so the camera can see the labels but the interviewee cannot — this is what makes the format credible AND entertaining (the viewer knows something the interviewee doesn't)
- Let the interviewee taste/try each option fully before prompting for feedback — no rush
- Use neutral tasting prompts: "What do you notice?" / "How does that one compare?" / "First reaction?"
- Get a COMMITTED preference before the reveal — "if you had to pick one as your daily, which cup?"
- Capture the reveal reaction — let the interviewee see the brand names and react before the host explains anything
- Run the test with multiple interviewees — a montage where 7 out of 8 people pick the brand is devastating social proof
- Embrace non-picks — if 1–2 people choose a competitor, it makes the majority choosing the brand MORE credible

**Standard Don'ts for Blind Reaction:**
- NEVER hint at which option is which — the host cannot make eye contact with a specific cup, cannot smile when they taste the brand's product, cannot use language that favors one option
- Do not use leading tasting prompts — "Isn't that one smoother?" is leading. "What do you notice about that one?" is neutral
- Do not reveal the brands before the interviewee commits to a preference — the commitment is everything
- Do not rig the test — different temperatures, different amounts, different freshness, or different containers all rig the test. Everything must be identical except the product itself
- Do not skip the palate cleanse — for taste tests, the interviewee must have water between tastings, or the first option flavors the second
- Do not explain the product before the test — "this is a test of electrolyte powders, one of which is all-natural and organic" tips the answer. Just say "four electrolyte drinks — taste each one"

### SECTION 7: ANGLE FRAMEWORK (Conversation Flow)

This is the core of the brief. It lives under a bold, underlined heading: **Angle Framework:**

Each conversation flow step is its own block. The block label format is:

\`SECTION NAME - Description of what this section does\`

Inside each block, use these internal labels:
- **Host Line:** — What the host says (dialogue in quotes on sub-bullets)
- **Example Line:** — Target interviewee responses (dialogue in quotes on sub-bullets)
- **Host Action:** — Physical staging directions (in italicized text on sub-bullets)

The conversation flow for Blind Reaction follows this exact order (9 blocks):

---

#### 7a. HOOK

**Purpose:** Stop the person and invite them into the blind test. The hook should communicate what they're about to do (taste test, smell test, etc.) and that it's BLIND — they won't know which is which.

**CRITICAL RULES FOR HOOKS:**

1. **Lead with the test, not the product.** "Blind taste test — let's go" works. "Want to try our electrolyte powder?" doesn't.

2. **Communicate "blind" immediately.** The interviewee (and viewer) must know from the first second that this is an unbiased test. "You won't know which is which" signals fairness.

3. **Keep it fast.** Blind tests have built-in intrigue — most people are curious to see if they can pick the "right" one. You don't need a long setup.

4. **Optional: qualify the interviewee.** A quick "do you drink electrolytes?" or "do you use protein shakes?" ensures the test is relevant to them. But keep it to one question — don't turn the qualifier into a conversation.

**What GOOD hooks look like (from real briefs):**
- "You look like you drink electrolytes. Blind taste test — electrolytes edition — let's go!" — fast, fun, qualifier built into the hook
- "Quick blind taste test — which of these shakes tastes better?" — simple, direct, two options
- "Four drinks, four brands. You taste, you pick. You won't know which is which." — clear rules in the hook itself

**What BAD hooks look like:**
- ❌ "Want to try some electrolyte powders? One of them is really good" — not blind, hints at a winner
- ❌ "We're doing a scientific taste study to compare multiple hydration products across several dimensions" — too formal, kills the energy
- ❌ "I bet you can't guess which one is the healthy option" — creates a guessing game, not a preference test

Write 1–2 hook options.

Format:
\`\`\`
HOOK - How we are going to begin the interaction
  • Host Line:
    ◦ "[Quick blind test invitation — communicate the format and 'blind' element]"
\`\`\`

---

#### 7b. TASTING INSTRUCTIONS

**Purpose:** Brief setup of how the test works. Keep this to 1–2 sentences. The interviewee needs to know: (1) how many options, (2) that they're blind, and (3) what to do (taste each one, tell me what you think).

**Key rule: Do NOT describe the products.** Don't say "these are electrolyte powders — one is sugar-free, one is..." Just say "four drinks" or "two shakes." The less context the interviewee has, the more credible the test.

Format:
\`\`\`
TASTING INSTRUCTIONS - How the test works
  • Host Line:
    ◦ "[Number of options, what they'll do, and what to tell you]"
    ◦ "Don't try to guess the brand. Just tell me how each one [tastes/smells/feels]."
  • Host Action:
    ◦ [Position the interviewee so they can see the cups but NOT the labels]
    ◦ [Ensure camera captures the labels throughout]
\`\`\`

---

#### 7c. THE TASTING

**Purpose:** The interviewee tries each option and reacts in real time. This is the longest section and the core content of the ad. Each tasting gets its own beat — the host presents the option, the interviewee tries it, and the host captures their first reaction before moving to the next.

**Structure per option:**
1. Host presents the cup/sample ("Alright, Cup A. First reaction.")
2. Interviewee tries it (Host says NOTHING — let the reaction happen)
3. Host prompts briefly if needed ("What do you notice?" / "How does that compare?")
4. Move to next option

**After all options are tasted:** The host asks for the final committed preference. This is the most important moment before the reveal — the interviewee must COMMIT to a choice publicly.

For different formats:
- **Head-to-head (2 options):** "Which one?" — fast, simple
- **Lineup (3–4 options):** "Out of all four, which one would you drink every day?" — forces a single pick

Write Host Lines for presenting each option, neutral prompts, and the commitment question. Write Example Lines for tasting reactions and the final choice.

Format:
\`\`\`
THE TASTING - The blind product experience
  • Host Line:
    ◦ "Alright, Cup A. First reaction."
    ◦ "Cup B. What stands out?"
    ◦ "Cup C. How does this one compare?"
    ◦ "Cup D. What are your thoughts?"
    ◦ [If they struggle: "Does it taste [sweet/salty/smooth/strong]?"]
    ◦ "Out of all [number], which one would you [drink/use/pick] every day?"
  • Host Action:
    ◦ [Hand each cup/sample one at a time]
    ◦ [Offer water/palate cleanse between tastings]
    ◦ [Do NOT react to their reactions — stay neutral]
    ◦ [Let them re-taste if they want to — the deliberation is content]
  • Example Line:
    ◦ "[Reaction to a competitor — 'That's really sweet' / 'Kind of chalky' / 'Really salty']"
    ◦ "[Reaction to the brand's product — 'That's smoother' / 'Way easier to drink' / 'This one actually tastes good']"
    ◦ "[Deliberation — 'Can I try B again?' / 'Hmm, between C and D...']"
    ◦ "[Committed choice — 'Cup D. Definitely.' / 'B, not even close.']"
\`\`\`

---

#### 7d. THE REVEAL

**Purpose:** The host reveals which brand is behind each cup. This is the MONEY SHOT — the moment the interviewee discovers what they chose and what they rejected.

**Structure the reveal in three beats:**
1. **Beat 1: Build tension** — "Alright, here's the reveal." Pause.
2. **Beat 2: Reveal each option** — Go through each cup, naming the brand. Save the interviewee's chosen cup for last (or near last) for maximum impact.
3. **Beat 3: Let the reaction land** — The interviewee processes that they picked [Brand] over [Competitors]. Do NOT explain why yet. Let the moment breathe.

**Reveal order strategy:**
- For LINEUP format: Reveal the competitors first, building to the interviewee's pick. "Cup A was Liquid IV. Cup B was Gatorade. Cup C was LMNT. And the one you picked — Cup D — that's Salt of the Earth."
- For HEAD-TO-HEAD: "So the one you chose — Cup B — that's [Brand]." Simple, direct.

**If the interviewee DIDN'T pick the brand:** The reveal still works. The host can note their choice, then transition to education: "Interesting — you went with [competitor]. Here's what's different about [Brand]..." and move into value props. Not every interviewee needs to pick the brand for the angle to work — a few non-picks mixed into the montage actually increase credibility.

Format:
\`\`\`
THE REVEAL - Revealing which product they chose
  • Host Line:
    ◦ "Alright, here's the reveal."
    ◦ "[Reveal competitor cups first — 'Cup A is [Brand]. Cup B is [Brand].']"
    ◦ "[Reveal their choice last — 'And the one you picked... Cup [X]... that's [Brand].']"
  • Host Action:
    ◦ [Flip labels, place brand name cards next to cups, or point to each cup as you name it]
    ◦ [Pause after revealing their choice. Let them react before explaining anything]
\`\`\`

---

#### 7e. REACTIONS

**Purpose:** Capture the interviewee's reaction to learning what they chose. For Blind Reaction, these tend to be among the most genuine and powerful reactions of any angle because the interviewee can't deny their own choice — they made it blind.

The best reactions:
- **Surprise at their own choice** — "Wait, THAT's the one I picked?" / "No way, I chose the [unexpected brand]?"
- **Validation** — "That makes sense, it was way smoother" / "I knew something was different about that one"
- **Bias reversal** — "I would never have picked that off the shelf" / "I always buy [competitor] but I chose this?"
- **Immediate conversion** — "Okay, I'm switching" / "Where do I get this?"

Write 4–6 target reaction lines.

Format:
\`\`\`
REACTIONS - Reactions we are aiming to receive
  • Example Line:
    ◦ "[Surprise — 'No way!' / 'Are you serious?']"
    ◦ "[Validation — 'That makes sense, it tasted cleaner']"
    ◦ "[Bias reversal — 'I always buy [competitor] and I picked this?']"
    ◦ "[Conversion — 'Okay, I'm switching']"
\`\`\`

---

#### 7f. PRODUCT INTRODUCTION + VALUE PROPS

**Purpose:** NOW the host explains what makes the brand's product different — why it tasted/felt/smelled better in the blind test. This comes AFTER the reveal and reaction because the interviewee has already proven they prefer it. The value props explain the "why" behind a choice they already made.

Each value prop should connect to something the interviewee NOTICED during the tasting. If they said "that one's smoother," explain WHY it's smoother (premium ingredients, no artificial sweeteners, etc.).

Format:
\`\`\`
PRODUCT INTRODUCTION + VALUE PROPS - Why their choice was different
  • Host Line:
    ◦ "[What makes the brand's product different — the reason it won the blind test]"
    ◦ "[Value prop #1 — connects to what they noticed during tasting]"
    ◦ "[Value prop #2 — a feature that reinforces their choice]"
    ◦ "[Value prop #3 — broader benefit or daily use positioning]"
\`\`\`

---

#### 7g. SECOND REACTIONS (Optional)

**Purpose:** After hearing why the product won, the interviewee often has a deeper reaction — from "I liked it" to "I need to switch."

Format:
\`\`\`
SECOND REACTIONS - Reactions after hearing the value props

    ◦ "[Advocacy — 'Everyone at my gym needs to try this']"

#### 7h. CTA

**Purpose:** Close with the CTA. For Blind Reaction, the CTA works best when it references the test result: "if you want the electrolyte that wins blind taste tests..." or "the one people keep choosing without knowing the brand..."

## Quality Checks

Before finalizing the output, verify:

1. **The test is genuinely fair** — all options are in identical containers, same temperature, same amount, same flavor category. If ANY detail favors the brand's product, the test loses credibility. Check the props list for fairness
2. **Labels are visible to camera but NOT to interviewee** — this dual visibility is what makes the format work for video. The viewer knows something the interviewee doesn't. If the brief doesn't specify camera positioning for labels, add it to Host Action
3. **The host stays NEUTRAL during the tasting** — check every Host Line during THE TASTING section. No leading prompts ("isn't that one better?"), no facial reactions, no body language that favors an option
4. **The interviewee COMMITS before the reveal** — there must be a clear moment where they lock in their choice. "Cup D, definitely" is a commitment. "They're all pretty good" is not. If the commitment prompt is missing, add one
5. **The reveal saves their choice for last** — the reveal should build tension by naming competitors first, then landing on "and the one you chose..." Check the reveal order
6. **Palate cleanse is included between tastings** — for taste tests. Water between options prevents the first taste from flavoring the second. Check the Host Action in THE TASTING
7. **Props are specific enough for production** — exact brands, exact flavors, exact cup types, exact labeling method. The production team needs to replicate this test identically for every interviewee
8. **Multiple interviewees are assumed** — Blind Reaction is STRONGEST as a montage. The brief should specify running with at least 8–10 people. A compilation where most people choose the brand is the most powerful social proof format in the StreetTalk playbook
9. **Non-picks are addressed** — the brief must note what happens if someone doesn't choose the brand. Ignoring this possibility makes the brief feel naive. Include guidance in Key Mentions
10. **The CTA matches Input 4 exactly** — if a CTA was provided, use it verbatim
11. **Language to avoid from the onboarding form does NOT appear in any Host Line or Example Line**

## What This Document Is

This is the reference document for generating a **"Challenge / Game Show"** street interview brief angle inside the StreetTalk briefing app. When a creative strategist triggers the Challenge / Game Show angle builder, the system should follow the instructions below to analyze the brand's inputs and produce a fully structured angle section ready for production.

**What this angle is:** The host turns the street interview into a game — a quiz, a challenge, a taste test competition, a prediction, or a skill test with stakes. The interviewee participates, competes, guesses, or attempts something, and the product enters as the answer, the reveal, or the "cheat code" that makes them better. The entire ad is built on **entertainment first, product second** — the viewer watches because the game is fun, and the product lands because the game made it relevant.

## Decision: Game Mechanic

Before writing anything, determine what type of game creates the most natural entry point for the product. The game mechanic drives the CHALLENGE setup, REVEAL structure, and what makes the moment entertaining.

**THE PREDICTION CHALLENGE** — The interviewee guesses or predicts something about the product, and the answer surprises them. The entertainment is the gap between what they assumed and what's true.
- Best for: Food & bev, cookware, DTC products with surprising specs, any product where common assumptions are wrong
- The CHALLENGE is the guess. The REVEAL is the correct answer. The product enters as "the thing you got wrong about."
- Examples: Cookt ("Which one has more protein — the shake or the meal?"), price-guess formats, nutrition-guess formats
- Key moment: The interviewee commits to a wrong answer publicly, then reacts to being wrong. That reaction IS the ad.

**THE BLIND TEST** — The interviewee tries two or more options without knowing which is which, picks a favorite, and the reveal shows they chose the brand's product. The entertainment is the unbiased preference.
- Best for: Food & bev, beauty, fragrance, any product that wins on sensory experience
- The CHALLENGE is the blind choice. The REVEAL is which product they picked. The product enters as "the one you chose without knowing."
- Examples: Happy Viking "Pepsi Challenge" (two cups, pick the better shake), SOTE blind taste test (four cups, three brands)
- Key moment: The interviewee picks the brand's product WITHOUT knowing it's the brand's product. The reveal validates the choice.

**THE CASH CHALLENGE** — The host offers money for correct answers or successful attempts. The interviewee tries, usually fails or struggles, and the product enters as the tool that makes them succeed.
- Best for: EdTech, apps, language learning, fitness, any product that improves a measurable skill
- The CHALLENGE is the attempt. The FAILURE is the entertainment. The product is the "cheat code" that makes them better.
- Examples: Speak ("$5 if you can put together a few sentences in Spanish"), trivia-for-cash formats
- Key moment: The interviewee fails at the challenge, the product helps them succeed, and the improvement is visible.

**THE KNOWLEDGE QUIZ** — The host quizzes the interviewee on facts related to the product category. Wrong answers reveal knowledge gaps that the product fills.
- Best for: Health & wellness, supplements, hydration, skincare, any product that requires education
- The CHALLENGE is the quiz. The WRONG ANSWERS are the entertainment. The product enters as "what you didn't know."
- Examples: SOTE hydration quiz ("How many electrolytes does your body need?"), ingredient awareness quizzes
- Key moment: The interviewee confidently gives a wrong answer. The correction naturally leads to the product.

**THE GUESSING GAME** — The interviewee guesses something about the product itself (its origin, its ingredient, its price, what it's made of) and the answer is surprising.
- Best for: Food with unique origins, products with unexpected ingredients, premium products with surprising prices
- The CHALLENGE is the guess. The SURPRISE is the entertainment. The product's unique attribute IS the punchline.
- Examples: Cookt ("Guess the Country From One Bite"), origin-story reveals, ingredient-reveal games
- Key moment: The interviewee's guess is entertainingly wrong, and the real answer makes the product more interesting.

This decision affects the CHALLENGE setup, number of rounds/options, REVEAL structure, and where the product enters the conversation.

### SECTION 6: DO / DON'T GUIDELINES

**Standard Do's for Challenge / Game Show:**
- Keep the game simple — the rules should be explainable in one sentence
- Let the interviewee commit to their answer BEFORE the reveal — do not hint, correct, or lead them
- Capture the reaction to being wrong/surprised — that moment is the ad
- Run the game with multiple interviewees — montages of different people all getting it wrong (or all choosing the brand) create powerful social proof
- Keep energy high — the host sets the tempo. Dead air kills a game format
- Make it genuinely fun — the interviewee should walk away entertained, not embarrassed

**Standard Don'ts for Challenge / Game Show:**
- Do not rig the game — the interviewee must have a genuine chance. If they get it right, that's fine. Honest wins are still good content
- Do not make the interviewee feel stupid for getting it wrong — the tone is "surprising, right?" not "you're wrong, idiot"
- Do not reveal the answer before the interviewee commits — the commitment is what makes the reveal entertaining
- Do not over-explain the rules — if the game needs more than 10 seconds of setup, simplify it
- Do not let the game overshadow the product — the product must be the punchline, answer, or prize. If the viewer remembers the game but not the brand, the angle failed

### SECTION 7: ANGLE FRAMEWORK (Conversation Flow)

This is the core of the brief. It lives under a bold, underlined heading: **Angle Framework:**

Each conversation flow step is its own block. The block label format is:

\`SECTION NAME - Description of what this section does\`

Inside each block, use these internal labels:
- **Host Line:** — What the host says (dialogue in quotes on sub-bullets)
- **Example Line:** — Target interviewee responses (dialogue in quotes on sub-bullets)
- **Host Action:** — Physical staging directions (in italicized text on sub-bullets)

The conversation flow for Challenge / Game Show follows this exact order (9 blocks):

---

#### 7a. HOOK

**Purpose:** Stop the person and invite them into the game. The hook should communicate the game premise and the stakes (fun, cash, bragging rights) in one punchy line. The interviewee should immediately understand what they're being asked to do and feel excited to try.

**CRITICAL RULES FOR HOOKS:**

1. **Lead with the game, not the product.** The hook is an invitation to play, not a product pitch. "I'll give you $5 if you can say three sentences in Spanish" is a game hook. "Want to try a language learning app?" is a product pitch.

2. **State the stakes immediately.** Cash, bragging rights, or a simple dare. The interviewee needs a reason to stop and play. "$5," "quick challenge," "bet you can't," or "let's test" are all stake signals.

3. **Keep it to one sentence.** If the game needs two sentences to explain, simplify the game.

4. **Be realistic.** The host is cold-approaching someone. The game must be something a stranger would actually agree to on the spot. Blind taste tests, quick quizzes, and "guess this" games work. Elaborate multi-round competitions don't.

**What GOOD hooks look like (from real briefs):**
- "Quick blind taste test — which of these shakes tastes better?" — clear game, immediate
- "I'll give you $5 if you can put together a few sentences in Spanish." — cash stakes, clear challenge
- "Quick test — which one do you think has more protein?" — prediction game, one sentence
- "On a scale of 1–10, how confident are you speaking Spanish in public?" — self-rating that sets up the challenge

**What BAD hooks look like:**
- ❌ "Want to try this cool new protein shake?" — no game, just a product offer
- ❌ "We're doing a really fun challenge today where we test people's knowledge of hydration science and then give them a chance to try our product" — way too long
- ❌ "Are you a health expert? Because I'm about to prove you wrong" — aggressive, not fun
- ❌ "We're filming a game show on the street!" — too meta, breaks the fourth wall

Write 1–2 hook options.

Format:
\`\`\`
HOOK - How we are going to begin the interaction
  • Host Line:
    ◦ "[One-sentence game invitation with stakes]"
\`\`\`

---

#### 7b. RULES / SETUP

**Purpose:** Briefly explain how the game works. This should take no more than 10 seconds on camera. If the game is self-explanatory from the hook (like "which cup tastes better?"), this section can be minimal. If the game has rounds, options, or a scoring system, lay it out fast.

For different game mechanics:
- **Prediction:** "I'm going to show you two options. You tell me which one has more [X]. Ready?"
- **Blind test:** "I have [N] cups/options. You try each one and pick your favorite. You won't know which is which until after."
- **Cash challenge:** "Here's how it works — you try, and if you [succeed at X], you keep the $5."
- **Knowledge quiz:** "I'm going to ask you [N] questions about [topic]. Let's see how many you get right."
- **Guessing game:** "You get one [taste/look/feel]. Tell me [what country/ingredient/price]. Closest guess wins."

Format:
\`\`\`

  • Host Line:

  • Host Action:

\`\`\`

#### 7c. THE CHALLENGE

**Purpose:** The interviewee plays the game. This is the core entertainment section — the part that makes someone stop scrolling. The host runs the game, the interviewee participates, and the camera captures everything.

For different game mechanics:
- **Prediction:** The interviewee states their guess and commits to it publicly
- **Blind test:** The interviewee tries each option and picks a favorite
- **Cash challenge:** The interviewee attempts the task (speaks Spanish, answers trivia, etc.)
- **Knowledge quiz:** The host asks questions, the interviewee answers
- **Guessing game:** The interviewee experiences the product (one bite, one look) and guesses

This section uses Host Line (running the game), Host Action (staging), AND Example Line (the interviewee's in-game responses).

**Key rule: Let the interviewee COMMIT to their answer/choice before moving to the reveal.** The commitment is what creates tension. If the host reveals too early or hints at the answer, the reveal moment loses all its power.

#### 7d. THE REVEAL

**Purpose:** The host reveals the correct answer, the product identity, or the game result. This is the MONEY SHOT of the entire angle — the moment where surprise, delight, or disbelief creates the clip that makes the ad work.

**Structure the reveal in two beats:**
1. **Beat 1: The answer** — What the correct answer is, which cup was which, whether they won or lost
2. **Beat 2: The product connection** — How the answer connects to the brand/product. This is where the product enters the game naturally.

**Do NOT rush the reveal.** Let the interviewee process. The gap between hearing the answer and reacting is where the best content lives.

  • Host Action:

    ◦ [Let the interviewee react BEFORE explaining anything]

**Purpose:** Capture the interviewee's reaction to the reveal. For Challenge angles, reactions are typically BIGGER than other frameworks because the game creates genuine surprise.

- **Blind test (chose the brand):** "Wait, THAT's the one I picked?" / "I knew it tasted better"
- **Cash challenge (product helped):** "That was way easier than I expected" / "Okay, I actually learned something"
- **Knowledge quiz (wrong answers):** "I had no idea" / "Everyone needs to know this"
- **Guessing game (surprised):** "No way that's from [country]" / "I would've never guessed"

#### 7f. VALUE PROPS

**Purpose:** After the reveal and reaction, the host reinforces WHY the answer was what it was — what makes the product different, better, or surprising. Each value prop should connect back to the game result.

If the interviewee chose the brand's product in a blind test: "Here's why you picked it..."
If the interviewee got a quiz question wrong: "Here's what most people don't know..."

## Quality Checks

Before finalizing the output, verify:

1. **The hook leads with the GAME, not the product** — read the first Host Line. Does it sound like an invitation to play or an invitation to hear a sales pitch? It must be the former
2. **The game is explainable in one sentence** — if the RULES / SETUP section is longer than 2 sentences, the game is too complicated. Simplify
3. **The interviewee COMMITS before the reveal** — check that no Host Line hints at, suggests, or reveals the answer before the interviewee has locked in their choice/answer/guess
4. **The reveal has two beats** — Beat 1 is the answer, Beat 2 is the product connection. Both must be present. If the reveal goes straight from answer to value props, the moment is lost
5. **Every Host Line sounds fun and fast** — read it aloud. Challenge angles need ENERGY. If a line sounds slow, corporate, or educational, rewrite it punchier
6. **Props are specific enough for production** — blind taste tests need exact cup counts, label covers, and product variants specified. Cash challenges need denominations. Quiz formats need question cards

**What this angle is:** The host shows the product (or describes it), has the interviewee guess what it costs, and the real price surprises them. The entire ad is built on the **gap between perceived value and actual price** — either the product is more affordable than it looks, or the interviewee realizes they're massively overpaying for what they currently use. That gap IS the ad. The interviewee's reaction to the price — shock, disbelief, "wait, really?" — is the money shot that converts viewers.

## Decision: Price Direction

Before writing anything, determine which price direction creates the strongest moment. This drives the entire angle — what you build up, what you reveal, and what the interviewee reacts to.

**GUESS HIGH, REVEAL LOW** — The product looks, feels, or sounds premium. People overestimate the price. The reveal is that it costs LESS than they assumed. The emotional payoff is "I can actually afford this."
- Best for: Premium DTC products with accessible pricing, products made from expensive-sounding materials (titanium, organic, handmade), tech products with impressive feature lists, products that look like they "should" cost more
- The VALUE BUILD emphasizes features that signal premium — materials, craftsmanship, specs, ingredients
- The price guess captures the interviewee committing to a high number
- The reveal creates a "deal" feeling — the product suddenly feels like a steal
- Examples: Taima Titanium ("Pure titanium pan — how much do you think?"), NoblTravel ("GPS, scale, charger, carry-on — guess the price")

**STICKER SHOCK FLIP** — The interviewee is asked what they currently PAY for the category product. Their answer is shockingly high. The reveal is that the brand offers the same (or better) for dramatically less. The emotional payoff is "I've been overpaying this whole time."
- Best for: Categories where incumbents overcharge (eyewear, insurance, skincare, mattresses), services with opaque pricing, products that replace expensive alternatives
- The VALUE BUILD emphasizes what the interviewee is currently spending
- The price reveal is the BRAND'S price, positioned against what they just admitted paying
- The interviewee reacts to the gap between their current spend and the alternative
- Examples: Lens Direct ("How much do new lenses cost you?" → "$300–$500" → "What if you could keep your frames and replace just the lenses for $79?")

**ESCALATING FEATURE STACK** — The host reveals features one at a time, and the interviewee updates their price guess after each reveal. The price goes UP in their mind with each feature, making the final real price even more surprising.
- Best for: Products with many distinct features (smart luggage, multi-function tools, bundled services), products where the feature count creates a "too good to be true" feeling
- The VALUE BUILD is the entire middle section — each feature is its own mini-reveal
- The interviewee re-guesses after each feature, creating an escalating tension
- The final price lands BELOW their escalated estimate, and the gap is enormous
- Examples: NoblTravel ("It has GPS tracking. How much? Now add a built-in scale. Update your guess. Now add a phone charger...")

This decision affects the HOOK framing, VALUE BUILD structure, how the price guess is captured, and what the interviewee reacts to.

### SECTION 6: DO / DON'T GUIDELINES

**Standard Do's for Guess the Price:**
- Build the perceived value BEFORE asking for the guess — the bigger the value build, the bigger the price gap surprise
- Let the interviewee commit to a specific number before revealing — "around a lot" is not a commitment. Get a dollar amount
- Pause after the price reveal — the silence between "it's actually $79" and their reaction is the most valuable moment in the ad
- Get MULTIPLE guesses from different interviewees — montages of people guessing $200, $300, $400 followed by the real price create cumulative social proof
- Show the product during the value build — the interviewee should be able to see, hold, or interact with the product as features are described

**Standard Don'ts for Guess the Price:**
- Do not reveal the price before the interviewee commits to a guess — the commitment is what creates the gap
- Do not rush past the reaction — let the interviewee process the surprise. Their "wait, really?" face is the ad
- Do not pad the value build with weak features — every feature mentioned should genuinely make the product FEEL more expensive. Filler features dilute the guess
- Do not use bait-and-switch pricing — the revealed price must be the real, available price. If there are subscription terms, asterisks, or qualifiers, they must be mentioned
- Do not tell the interviewee they're wrong — the tone is "surprising, right?" not "you guessed too high." The interviewee should feel smart for recognizing value, not dumb for guessing wrong

#### 7a. HOOK

**Purpose:** Stop the person and set up the price question. The hook can either go straight to "how much do you think this costs?" or first qualify the interviewee as someone who cares about the category.

**CRITICAL RULES FOR HOOKS:**

1. **Be direct.** "How much do you think this costs?" works. You don't need a elaborate setup.

2. **Show the product or describe it immediately.** The interviewee needs something to anchor their guess to. A vague "guess the price of something" is meaningless. "This pan is made of pure titanium — how much do you think it costs?" gives them a mental framework.

3. **For Sticker Shock Flip: Ask about THEIR spending first.** Don't show the brand's product yet. Start with "How much do you pay for [category]?" — their own answer becomes the anchor that makes the brand's price surprising.

4. **The scenario must be realistic.** Standard rules apply — no staged coincidences, no assumptions about the interviewee.

**What GOOD hooks look like:**
- "Quick question — this pan is made of 100% titanium. How much do you think it costs?" — direct, product-first, immediate intrigue
- "Do you wear glasses? How much does it cost you for new lenses?" — qualifier → their spending → sets up the flip
- "This carry-on has GPS tracking, a built-in scale, and a phone charger. What would you guess it costs?" — feature stack in the hook itself

**What BAD hooks look like:**
- ❌ "Want to play a guessing game about prices?" — too meta, not product-specific
- ❌ "Do you think expensive things are always better?" — philosophical, not direct
- ❌ "We found a product that's going to blow your mind with its price" — hype, not substance

#### 7b. VALUE BUILD

**Purpose:** This is the section that makes or breaks the angle. Before the interviewee guesses the price, the host needs to build up the product's perceived value — every feature, material, spec, or credential that makes the product FEEL expensive.

The VALUE BUILD is what inflates the guess. The bigger the value build, the bigger the gap between guess and real price, the bigger the reaction.

**For Guess High, Reveal Low:**
- Describe features one at a time, letting each one sink in
- Emphasize premium-signaling language: "pure titanium," "aerospace-grade," "hand-finished," "doctor-founded"
- Let the interviewee hold or touch the product — physical quality reinforces perceived value
- Each feature should make them think "okay, this is even more expensive than I thought"

**For Sticker Shock Flip:**
- The "value build" is the interviewee's OWN spending. Ask follow-up questions that surface how much they pay: "And how often do you replace them?" / "What did you pay last time?"

#### 7d. THE PRICE REVEAL

**Purpose:** The host reveals the actual price. This is the MONEY SHOT — the single most important moment in the entire angle. Everything before this was setup; everything after this is payoff.

**Structure the reveal in two beats:**
1. **Beat 1: The price** — delivered clearly, confidently, with a slight pause before it. "It's actually... $79." The pause creates anticipation. The number lands clean.
2. **Beat 2: Let it sit** — do NOT immediately explain or justify. Let the interviewee process. Their face, their voice, their reaction in the 2–3 seconds after hearing the price is the most valuable footage in the entire shoot.

**For Sticker Shock Flip, the reveal has an extra beat:**
1. **Beat 1: Acknowledge their spending** — "So you're paying $300 every time..."
2. **Beat 2: Introduce the alternative** — "What if you could keep your frames and just replace the lenses..."

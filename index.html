<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Street Talk Brief Builder</title>
  <style>
    :root {
      --bg: #0d0d0f; --surface: #1a1a1a; --surface2: #1c1c21; --surface3: #252530;
      --border: #2e2e3a; --text: #ffffff; --text2: #a1a1aa; --text3: #71717a;
      --accent: #4242d7; --accent-hover: #3535c0; --accent-light: rgba(66,66,215,0.15);
      --green: #22c55e; --green-light: rgba(34,197,94,0.12);
      --yellow: #eab308; --yellow-light: rgba(234,179,8,0.12);
      --red: #ef4444; --red-light: rgba(239,68,68,0.12);
      --radius: 10px; --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; height: 100vh; display: flex; overflow: hidden; }
    .main-container { display: flex; width: 100%; height: 100%; }

    /* SIDEBAR */
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 16px 0; flex-shrink: 0; }
    .sidebar-logo { padding: 4px 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .sidebar-logo .logo-text { font-size: 16px; font-weight: 700; color: var(--text); }
    .sidebar-logo .logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .sidebar-section { padding: 16px 20px 6px; font-size: 10px; text-transform: uppercase; color: var(--text3); font-weight: 700; letter-spacing: 0.8px; }
    .sidebar-item { padding: 9px 20px; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 10px; transition: all 0.15s; font-size: 13.5px; }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; border-right: 2px solid var(--accent); }
    .sidebar-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-item .badge { margin-left: auto; background: var(--surface3); padding: 1px 7px; border-radius: 10px; font-size: 11px; }

    /* CONTENT */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; min-height: 64px; }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .main-content { flex: 1; overflow-y: auto; padding: 28px; }

    /* BUTTONS */
    .btn { padding: 9px 16px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; transition: all 0.15s; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface3); }
    .btn-green { background: var(--green); color: #0a1a0a; }
    .btn-green:hover { background: #16a34a; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: var(--red-light); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: var(--red); color: white; }

    /* FORMS */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-weight: 600; margin-bottom: 7px; color: var(--text); font-size: 13px; }
    .form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 9px 12px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text);
      border-radius: var(--radius-sm); font-family: inherit; font-size: 13px;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .form-textarea { min-height: 90px; resize: vertical; }
    .form-select option { background: var(--surface2); }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card + .card { margin-top: 16px; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .card-sub { font-size: 12px; color: var(--text3); }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    /* ANGLE CARDS */
    .angle-card { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all 0.15s; }
    .angle-card:hover { border-color: var(--accent); }
    .angle-card.selected { border-color: var(--accent); background: var(--accent-light); }
    .angle-card .angle-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .angle-card .angle-cat { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 600; letter-spacing: 0.4px; margin-bottom: 8px; }
    .angle-card .angle-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
    .angle-card .angle-actions { margin-top: 10px; display: flex; gap: 8px; }

    /* SHOT CARDS */
    .shot-chip { background: var(--surface3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
    .shot-chip:hover { border-color: var(--accent); }
    .shot-chip.selected { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    /* TAGS */
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .tag-aroll { background: rgba(99,102,241,0.15); color: #818cf8; }
    .tag-broll { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .tag-both { background: rgba(34,197,94,0.15); color: var(--green); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; color: var(--text2); margin-bottom: 8px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal-wide { width: 640px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* STEPS INDICATOR */
    .step-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--text3); margin-bottom: 20px; }
    .step-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* PROJECT LIST */
    .project-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 10px; transition: border-color 0.15s; }
    .project-row:hover { border-color: var(--border); }
    .project-row .proj-info { flex: 1; }
    .project-row .proj-name { font-weight: 700; font-size: 15px; }
    .project-row .proj-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .status-pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
    .status-draft { background: var(--surface3); color: var(--text3); }
    .status-ready { background: var(--yellow-light); color: var(--yellow); }
    .status-published { background: var(--green-light); color: var(--green); }

    /* BRIEF GENERATION */
    .script-block { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
    .script-angle { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .script-cat { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
    .script-text { font-size: 13px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; }
    .script-editor { width: 100%; min-height: 200px; resize: vertical; font-size: 13px; font-family: inherit; color: var(--text2); line-height: 1.7; background: var(--surface3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; box-sizing: border-box; outline: none; transition: border-color 0.15s; }
    .script-editor:focus { border-color: var(--accent); }
    .script-char-count { font-size: 11px; color: var(--text3); text-align: right; margin-top: 4px; }

    /* VIDEO PREVIEW */
    .video-embed { margin-top: 10px; border-radius: var(--radius-sm); overflow: hidden; background: #000; aspect-ratio: 9/16; max-width: 360px; }
    .video-embed iframe { width: 100%; height: 100%; border: none; }
    .video-placeholder { background: var(--surface3); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 12px; color: var(--text3); text-align: center; margin-top: 8px; }

    /* PRESENTATION PAGE */
    #presentation-overlay { position: fixed; inset: 0; background: #f2f2f4; z-index: 2000; overflow-y: auto; display: none; font-family: inherit; }
    .pres-header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 12px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .pres-body { max-width: 1120px; margin: 0 auto; padding: 36px 28px; }
    .pres-stat-chip { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 9px 16px; display: flex; align-items: center; gap: 10px; }
    .pres-angle-card { background: #fff; border-radius: 16px; margin-bottom: 24px; overflow: hidden; border: 1px solid #e5e7eb; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .pres-card-header { display: flex; align-items: center; padding: 18px 24px; border-bottom: 1px solid #f0f0f0; gap: 14px; }
    .pres-card-body { display: flex; gap: 28px; padding: 24px; align-items: flex-start; }
    .pres-video-col { flex-shrink: 0; width: 220px; }
    .pres-script-col { flex: 1; min-width: 0; }
    .pres-tab-bar { display: flex; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
    .pres-tab { flex: 1; padding: 8px 10px; background: #f9f9f9; border: none; border-right: 1px solid #e0e0e0; font-size: 12px; font-weight: 500; color: #888; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: background 0.1s; }
    .pres-tab:last-child { border-right: none; }
    .pres-tab.active { background: #fff; font-weight: 700; color: #111; }
    .pres-script-box { background: #f8f8fb; border: 1px solid #ebebeb; border-radius: 10px; padding: 18px; font-size: 13px; color: #333; line-height: 1.75; white-space: pre-wrap; }
    .pres-approve-btn { display: flex; align-items: center; gap: 5px; padding: 7px 16px; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .pres-comment-btn { display: flex; align-items: center; gap: 5px; padding: 7px 14px; background: #f4f4f5; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; color: #555; }
    .pres-collapse-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: #f5f0ff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; color: #7c3aed; cursor: pointer; }

    /* COMMENT SECTION */
    .comment-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 14px; }
    .comment-item { border-bottom: 1px solid var(--border); padding: 10px 0; }
    .comment-item:last-child { border-bottom: none; }
    .comment-meta { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .comment-text { font-size: 13px; }
    .comment-add { display: flex; gap: 8px; margin-top: 10px; }
    .comment-add input { flex: 1; padding: 8px 12px; background: var(--surface3); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; }
    .comment-add input:focus { outline: none; border-color: var(--accent); }

    /* APPROVAL */
    .approval-btn { padding: 6px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); transition: all 0.15s; }
    .approval-btn.approved { background: var(--green-light); border-color: var(--green); color: var(--green); }
    .approval-btn.rejected { background: var(--red-light); border-color: var(--red); color: var(--red); }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* GENERATION LOADING */
    .gen-loader { text-align: center; padding: 50px; }
    .gen-spinner { width: 44px; height: 44px; border: 3px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* SHOT ASSIGNMENT */
    .angle-shot-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .assigned-shot-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .assigned-shot-row:last-child { border-bottom: none; }
    .remove-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0; margin-top: 2px; }
    .remove-btn:hover { color: var(--red); }

    /* HOME */
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .stat-num { font-size: 32px; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 13px; color: var(--text3); margin-top: 4px; }
    .workflow-step { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .workflow-step:last-child { border-bottom: none; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .step-info .step-title { font-weight: 700; font-size: 14px; }
    .step-info .step-desc { font-size: 12px; color: var(--text3); margin-top: 3px; }

    /* DB VIEWS */
    .db-row { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; }
    .db-row .db-name { font-weight: 600; flex: 1; }
    .db-row .db-meta { font-size: 12px; color: var(--text3); }

    /* NOTICE BANNER */
    .notice { background: var(--accent-light); border: 1px solid rgba(99,102,241,0.3); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    /* COPY SUCCESS */
    .copy-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--green); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .copy-toast.show { opacity: 1; }
  </style>
</head>

let S = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const saved = JSON.parse(raw);
    // Merge ŌĆö ensure default DB items exist
    return {
      brands: saved.brands && saved.brands.length ? saved.brands : DEFAULT_STATE.brands,
      angles: saved.angles && saved.angles.length ? saved.angles : DEFAULT_STATE.angles,
      shots: saved.shots && saved.shots.length ? saved.shots : DEFAULT_STATE.shots,
      hooks: saved.hooks && saved.hooks.length ? saved.hooks : DEFAULT_STATE.hooks,
      projects: saved.projects || [],
      briefs: saved.briefs || [],
    };
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
  updateBadges();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ŌöĆŌöĆŌöĆ NAVIGATION ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
let currentView = 'home';

function nav(view, arg) {
  currentView = view;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');

  const titles = {
    'home': ['Home', 'Welcome to Street Talk Brief Builder'],
    'projects': ['Projects', 'Manage your brand campaigns'],
    'brief-building': ['Brief Building', 'Select angles and add guidelines'],
    'shot-selection': ['Shot Selection', 'Assign shots to each angle'],
    'brief-generation': ['Brief Generation', 'Generate and publish scripts'],
    'angles-db': ['Angles Database', 'Creative angle library'],
    'shots-db': ['Shots Database', 'Shot type library'],
    'hooks-db': ['Hooks Database', 'Hook playbook ŌĆö openings that stop the scroll'],
    'brands-db': ['Brands Database', 'Brand and product management'],
  };

  const [title, sub] = titles[view] || [view, ''];
  document.getElementById('page-title').textContent = title;
  document.getElementById('page-sub').textContent = sub;
  document.getElementById('header-actions').innerHTML = '';

  const mc = document.getElementById('main-content');

  if (view === 'home') renderHome(mc);
  else if (view === 'projects') renderProjects(mc);
  else if (view === 'brief-building') renderBriefBuilding(mc);
  else if (view === 'shot-selection') renderShotSelection(mc);
  else if (view === 'brief-generation') renderBriefGeneration(mc);
  else if (view === 'angles-db') renderAnglesDB(mc);
  else if (view === 'shots-db') renderShotsDB(mc);
  else if (view === 'hooks-db') renderHooksDB(mc);
  else if (view === 'brands-db') renderBrandsDB(mc);
}

function updateBadges() {
  document.getElementById('badge-projects').textContent = S.projects.length;
  document.getElementById('badge-angles').textContent = S.angles.length;
  document.getElementById('badge-shots').textContent = S.shots.length;
  document.getElementById('badge-hooks').textContent = S.hooks.length;

function renderProjects(mc) {
  document.getElementById('header-actions').innerHTML = `<button class="btn btn-primary" onclick="showCreateProjectModal()">+ New Project</button>`;

  if (S.projects.length === 0) {
    mc.innerHTML = `<div class="empty-state"><div class="empty-icon">­¤ōü</div><h3>No projects yet</h3><p>Create your first project to get started.</p><br><button class="btn btn-primary" onclick="showCreateProjectModal()">+ New Project</button></div>`;
    return;
  }

  mc.innerHTML = S.projects.map(p => {
    const brand = S.brands.find(b => b.id === p.brandId);
    const brief = S.briefs.find(b => b.projectId === p.id);
    const status = brief ? brief.status : 'draft';
    const angleCount = brief ? brief.selectedAngles.length : 0;
    return `
      <div class="project-row">
        <div class="proj-info">
          <div class="proj-name">${p.productName}</div>
          <div class="proj-meta">${brand ? brand.name : 'ŌĆö'} ┬Ę Round ${p.roundNumber} ┬Ę ${angleCount} angle${angleCount !== 1 ? 's' : ''}</div>
        </div>
        <span class="status-pill status-${status}">${status}</span>
        <div style="display:flex;gap:8px;">
          ${brief && brief.status === 'published' ? `<button class="btn btn-green btn-sm" onclick="openPresentation('${brief.presentationToken}')">View Brief</button>` : ''}
          <button class="btn btn-secondary btn-sm" onclick="deleteProject('${p.id}')">Delete</button>
        </div>
      </div>
    `;
  }).join('');
}

function showCreateProjectModal() {
  const brandOptions = S.brands.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
  const firstBrandProducts = S.brands[0] ? S.brands[0].products.map(p => `<option value="${p}">${p}</option>`).join('') : '';

  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.id = 'create-project-modal';
  m.innerHTML = `
    <div class="modal">
      <div class="modal-title">New Project</div>
      <div class="modal-sub">Set up a new brief project</div>
      <div class="form-group">
        <label class="form-label">Brand</label>
        <select class="form-select" id="proj-brand" onchange="updateProductOptions()">
          ${brandOptions}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Product</label>
        <select class="form-select" id="proj-product">${firstBrandProducts}</select>
      </div>
      <div class="form-group">
        <label class="form-label">Round of Service</label>
        <select class="form-select" id="proj-round">
          ${[1,2,3,4,5,6].map(n => `<option value="${n}">Round ${n}</option>`).join('')}
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createProject()">Create Project</button>
      </div>
    </div>
  `;
  document.body.appendChild(m);
}

function updateProductOptions() {
  const brandId = document.getElementById('proj-brand').value;
  const brand = S.brands.find(b => b.id === brandId);
  const sel = document.getElementById('proj-product');
  if (brand) sel.innerHTML = brand.products.map(p => `<option value="${p}">${p}</option>`).join('');
}

function createProject() {
  const brandId = document.getElementById('proj-brand').value;
  const productName = document.getElementById('proj-product').value;
  const roundNumber = parseInt(document.getElementById('proj-round').value);
  if (!brandId || !productName) return;

  const project = { id: uid(), brandId, productName, roundNumber, createdAt: new Date().toISOString() };
  S.projects.push(project);
  saveState();
  closeModal();
  nav('projects');
}

function deleteProject(id) {
  if (!confirm('Delete this project and all its brief data?')) return;
  S.projects = S.projects.filter(p => p.id !== id);
  S.briefs = S.briefs.filter(b => b.projectId !== id);
  saveState();
  renderProjects(document.getElementById('main-content'));
}

function toggleAngle(projectId, angleId, cardEl) {
  let brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) {
    brief = { id: uid(), projectId, selectedAngles: [], guidelines: '', cta: '', shotAssignments: [], generatedScripts: [], status: 'draft', presentationToken: '', comments: [], approvals: {}, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    S.briefs.push(brief);
  }

  const idx = brief.selectedAngles.findIndex(sa => sa.angleId === angleId);
  if (idx >= 0) {
    brief.selectedAngles.splice(idx, 1);
    cardEl.classList.remove('selected');
  } else {
    brief.selectedAngles.push({ angleId, notes: '' });
    cardEl.classList.add('selected');
  }
  updateBBSummary(projectId);
}

function updateBBSummary(projectId) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  const count = brief ? brief.selectedAngles.length : 0;
  const el = document.getElementById(`bb-selected-summary-${projectId}`);
  if (!el) return;
  if (count === 0) { el.innerHTML = `<div style="color:var(--text3);font-size:12px;">No angles selected yet.</div>`; return; }
  const names = (brief.selectedAngles || []).map(sa => {
    const a = S.angles.find(x => x.id === sa.angleId);
    return a ? a.name : sa.angleId;
  });
  el.innerHTML = `<div style="font-size:12px;color:var(--green);">Ō£ō ${count} angle${count !== 1?'s':''} selected: ${names.join(', ')}</div>`;
}

function saveBriefBuilding(projectId) {
  let brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) {
    brief = { id: uid(), projectId, selectedAngles: [], guidelines: '', cta: '', shotAssignments: [], generatedScripts: [], status: 'draft', presentationToken: '', comments: [], approvals: {}, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    S.briefs.push(brief);
  }
  brief.guidelines = document.getElementById(`bb-guidelines-${projectId}`)?.value || '';
  brief.cta = document.getElementById(`bb-cta-${projectId}`)?.value || '';
  brief.updatedAt = new Date().toISOString();
  saveState();
  showToast('Brief building saved!');
}

function previewVideo(url, title) {
  const embed = getEmbedUrl(url);
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = `
    <div class="modal modal-wide">
      <div class="modal-title" style="margin-bottom:16px;">Ō¢Č ${title}</div>
      ${embed ? `<div class="video-embed"><iframe src="${embed}" allowfullscreen></iframe></div>` : `<div class="notice">Could not embed this URL. <a href="${url}" target="_blank" style="color:var(--accent);">Open in new tab ŌåÆ</a></div>`}
      <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
    </div>
  `;
  document.body.appendChild(m);
}

function getEmbedUrl(url) {
  if (!url) return null;
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  if (yt) return `https://www.youtube.com/embed/${yt[1]}?autoplay=1`;
  const vm = url.match(/vimeo\.com\/(\d+)/);
  if (vm) return `https://player.vimeo.com/video/${vm[1]}?autoplay=1`;
  return null;
}

function renderShotPicker(projectId, angleId) {
  const m = document.getElementById('shot-picker-overlay');
  if (!m) return;
  const brief = S.briefs.find(b => b.projectId === projectId);
  const assignment = (brief?.shotAssignments || []).find(x => x.angleId === angleId) || { shots: [] };
  const assignedIds = assignment.shots.map(s => s.shotId);

  m.innerHTML = `
    <div class="modal">
      <div class="modal-title">Add Shots</div>
      <div class="modal-sub">Select multiple shots, then click Done when finished.</div>
      ${S.shots.map(shot => {
        const assigned = assignedIds.includes(shot.id);
        const typeClass = shot.type === 'A-roll' ? 'tag-aroll' : shot.type === 'B-roll' ? 'tag-broll' : 'tag-both';
        return `
          <div class="db-row" style="cursor:${assigned ? 'default' : 'pointer'};${assigned ? 'opacity:0.5;' : ''}" onclick="${assigned ? '' : `addShotToAngle('${projectId}','${angleId}','${shot.id}');renderShotPicker('${projectId}','${angleId}');`}">

        `;
      }).join('')}
      <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Done</button></div>

function addShotToAngle(projectId, angleId, shotId) {
  let brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  if (!brief.shotAssignments) brief.shotAssignments = [];
  let assignment = brief.shotAssignments.find(x => x.angleId === angleId);
  if (!assignment) {
    assignment = { angleId, shots: [] };
    brief.shotAssignments.push(assignment);
  }
  if (assignment.shots.some(s => s.shotId === shotId)) return;
  const shot = S.shots.find(s => s.id === shotId);
  assignment.shots.push({ shotId, notes: '', type: shot ? shot.type : '' });
  saveState();
  onSSProjectChange(projectId);
}

function removeShotFromAngle(projectId, angleId, idx) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  const assignment = brief.shotAssignments?.find(x => x.angleId === angleId);
  if (!assignment) return;
  assignment.shots.splice(idx, 1);
  saveState();
  onSSProjectChange(projectId);
}

function updateShotNotes(projectId, angleId, idx, val) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  const assignment = brief.shotAssignments?.find(x => x.angleId === angleId);
  if (!assignment || !assignment.shots[idx]) return;
  assignment.shots[idx].notes = val;
}

function saveShotSelection(projectId) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (brief) { brief.updatedAt = new Date().toISOString(); saveState(); }
  showToast('Shot selection saved!');
}

    const scriptContent = isPublished
      ? `<div class="script-text">${escaped}</div>`
      : `<textarea class="script-editor" id="se-${gs.angleId}" oninput="updateScriptCharCount('${brief.id}','${gs.angleId}',this);this.style.height='auto';this.style.height=this.scrollHeight+'px'">${escaped}</textarea>

    return `

        <div class="script-cat">${angle ? angle.category : ''}</div>

  }).join('');
}

function updateScriptCharCount(briefId, angleId, textarea) {
  const brief = S.briefs.find(b => b.id === briefId);

  const gs = brief.generatedScripts.find(g => g.angleId === angleId);
  if (gs) {
    gs.script = textarea.value;
    saveState();
  }
  const cc = document.getElementById('scc-' + angleId);
  if (cc) cc.textContent = textarea.value.length + ' chars';
}

function generateBrief(projectId) {
  const container = document.getElementById(`bg-scripts-${projectId}`);
  container.innerHTML = `<div class="gen-loader"><div class="gen-spinner"></div><div style="color:var(--text2);">Generating scripts...</div></div>`;

  setTimeout(() => {
    const brief = S.briefs.find(b => b.projectId === projectId);
    const project = S.projects.find(p => p.id === projectId);
    const brand = project ? S.brands.find(b => b.id === project.brandId) : null;
    if (!brief) return;

    const prod = project ? project.productName : 'the product';
    const brandName = brand ? brand.name : 'the brand';
    const cta = brief.cta || 'Link in bio to shop now!';

    brief.generatedScripts = brief.selectedAngles.map(sa => {
      const angle = S.angles.find(a => a.id === sa.angleId);
      if (!angle) return null;
      const tplFn = SCRIPT_TEMPLATES[angle.name];
      const script = tplFn ? tplFn(prod, brandName, cta) : `[HOOK ŌĆö 0:00ŌĆō0:05]\nTalent opens with a compelling statement about ${prod}.\n\n[MAIN ŌĆö 0:05ŌĆō0:22]\nDemonstrate the key benefit of ${prod} by ${brandName}.\nKeep it authentic ŌĆö let the product speak for itself.\n\n[CTA ŌĆö 0:22ŌĆō0:30]\n"${cta}"`;
      return { angleId: angle.id, angleName: angle.name, script };
    }).filter(Boolean);

    brief.status = 'ready';
    brief.updatedAt = new Date().toISOString();
    saveState();
    onBGProjectChange(projectId);
  }, 2200);
}

function publishBrief(projectId) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  if (!brief.presentationToken) brief.presentationToken = uid();
  brief.status = 'published';
  brief.updatedAt = new Date().toISOString();
  saveState();

  const fakeUrl = `https://brief.streettalk.co/view/${brief.presentationToken}`;
  navigator.clipboard.writeText(fakeUrl).catch(() => {});
  showToast('Presentation published! Link copied.');
  onBGProjectChange(projectId);
}

let _currentPresentationToken = null;

function openPresentation(token) {
  const brief = S.briefs.find(b => b.presentationToken === token);
  if (!brief) { alert('Presentation not found.'); return; }

  _currentPresentationToken = token;
  const project = S.projects.find(p => p.id === brief.projectId);
  const brand = project ? S.brands.find(b => b.id === project.brandId) : null;

  const body = document.getElementById('pres-body');
  body.innerHTML = renderPresentationBody(brief, project, brand);

  document.getElementById('presentation-overlay').style.display = 'block';
  history.pushState({}, '', `#presentation/${token}`);
}

function toggleApproval(briefId, angleId, btn) {
  const brief = S.briefs.find(b => b.id === briefId);
  if (!brief) return;
  if (!brief.approvals) brief.approvals = {};
  const cur = brief.approvals[angleId];
  let next;
  if (cur === true) { brief.approvals[angleId] = false; next = false; }
  else if (cur === false) { delete brief.approvals[angleId]; next = null; }
  else { brief.approvals[angleId] = true; next = true; }
  saveState();
  // Update button style in-place (works for both old and new presentation UI)
  if (btn && btn.classList.contains('pres-approve-btn')) {
    const bg    = next === true ? '#dcfce7' : next === false ? '#fee2e2' : '#fce7f3';
    const color = next === true ? '#16a34a' : next === false ? '#dc2626' : '#db2777';
    const label = next === true ? 'Ō£ō Approved' : next === false ? 'Ō£Ś Rejected' : 'Approve Script';
    btn.style.background = bg; btn.style.color = color;
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ${label}`;
  } else if (btn) {
    // Legacy fallback
    if (next === true) { btn.className = 'approval-btn approved'; btn.textContent = 'Ō£ō Approved'; }
    else if (next === false) { btn.className = 'approval-btn rejected'; btn.textContent = 'Ō£Ś Rejected'; }
    else { btn.className = 'approval-btn'; btn.textContent = 'Approve?'; }
  }
}

function presTabSwitch(angleId, tab) {
  const tabs = ['full-script','shots','hooks','creators','comment'];
  tabs.forEach(t => {
    const panel = document.getElementById(`ptabpanel-${angleId}-${t}`);
    const btn   = document.getElementById(`ptab-${angleId}-${t}`);
    if (panel) panel.style.display = 'none';
    if (btn)   btn.classList.remove('active');
  });
  const activePanel = document.getElementById(`ptabpanel-${angleId}-${tab}`);
  const activeBtn   = document.getElementById(`ptab-${angleId}-${tab}`);
  if (activePanel) activePanel.style.display = 'block';
  if (activeBtn)   activeBtn.classList.add('active');
}

function toggleAngleCollapse(angleId) {
  const content = document.getElementById(`pres-content-${angleId}`);
  const icon    = document.getElementById(`pres-chevron-${angleId}`);
  if (!content) return;
  const isHidden = content.style.display === 'none';
  content.style.display = isHidden ? 'flex' : 'none';
  if (icon) icon.style.transform = isHidden ? '' : 'rotate(180deg)';
  // Update button label
  const btn = content.previousElementSibling && content.previousElementSibling.querySelector('.pres-collapse-btn span');
  if (btn) btn.textContent = isHidden ? 'Collapse' : 'Expand';
}

function addComment(briefId, angleId) {
  const input = document.getElementById(`comment-input-${angleId}`);
  if (!input || !input.value.trim()) return;
  const brief = S.briefs.find(b => b.id === briefId);
  if (!brief) return;
  if (!brief.comments) brief.comments = [];
  brief.comments.push({ id: uid(), angleId, text: input.value.trim(), author: 'Reviewer', createdAt: new Date().toISOString() });
  saveState();
  input.value = '';

  // Re-render just the comments section
  const project = S.projects.find(p => p.id === brief.projectId);
  const brand = project ? S.brands.find(b => b.id === project.brandId) : null;
  document.getElementById('pres-body').innerHTML = renderPresentationBody(brief, project, brand);
}

function closePresentation() {
  document.getElementById('presentation-overlay').style.display = 'none';
  _currentPresentationToken = null;
  history.pushState({}, '', window.location.pathname);
}

function copyShareLink() {
  if (!_currentPresentationToken) return;
  const fakeUrl = `https://brief.streettalk.co/view/${_currentPresentationToken}`;
  navigator.clipboard.writeText(fakeUrl).catch(() => {});
  showToast('Link copied!');
}

function checkHash() {
  const hash = window.location.hash;
  const match = hash.match(/^#presentation\/(.+)$/);
  if (match) openPresentation(match[1]);
}

function getHookEmbed(url) {
  if (!url) return '';
  // Streamable embed
  const streamMatch = url.match(/streamable\.com\/([a-z0-9]+)$/i);
  if (streamMatch) {
    return `<div class="video-embed" style="margin-top:12px;"><iframe src="https://streamable.com/e/${streamMatch[1]}" frameborder="0" allowfullscreen scrolling="no"></iframe></div>`;
  }
  // Frame.io ŌĆö show as link (requires auth, can't embed)
  if (url.includes('frame.io')) {
    return `<div style="margin-top:8px;"><a href="${url}" target="_blank" style="font-size:12px;color:var(--accent);text-decoration:none;">ŌåŚ View on Frame.io</a></div>`;
  }
  // Generic link
  return `<div style="margin-top:8px;"><a href="${url}" target="_blank" style="font-size:12px;color:var(--accent);text-decoration:none;">ŌåŚ View example</a></div>`;
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) closeModal();
});

// Handle hash navigation
window.addEventListener('hashchange', checkHash);

// ─── DRAG AND DROP ──────────────────────────────────────────────────────
let _fwDragSrc = null;

function fwDragStart(e) {
  _fwDragSrc = e.currentTarget;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
}

function fwDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const section = e.currentTarget.closest ? e.currentTarget.closest('.framework-section') : e.currentTarget;
  if (section && section !== _fwDragSrc) {
    section.parentElement.querySelectorAll('.framework-section').forEach(s => s.classList.remove('drag-over'));
    section.classList.add('drag-over');
  }
}

function fwDrop(e) {
  e.preventDefault();
  const target = e.currentTarget.closest ? e.currentTarget.closest('.framework-section') : e.currentTarget;
  if (target && target !== _fwDragSrc && _fwDragSrc) {
    const parent = target.parentElement;
    parent.insertBefore(_fwDragSrc, target);
    const preview = _fwDragSrc.closest('[data-fw-brief-id]');
    if (preview) syncFrameworkToRaw(preview.dataset.fwBriefId, preview.dataset.fwAngleId);
  }
  document.querySelectorAll('.framework-section').forEach(s => { s.classList.remove('drag-over'); s.classList.remove('dragging'); });
}

function fwDragEnd(e) {
  document.querySelectorAll('.framework-section').forEach(s => { s.classList.remove('drag-over'); s.classList.remove('dragging'); });
  _fwDragSrc = null;
}

// ─── SYNC DOM → RAW MARKDOWN ────────────────────────────────────────────
function syncFrameworkToRaw(briefId, angleId) {
  const preview = document.getElementById('script-preview-' + angleId);
  if (!preview) return;

  function getText(el) {
    let t = '';
    el.childNodes.forEach(n => {
      if (n.nodeType === 3) t += n.textContent;
      else if (n.nodeType === 1) {
        const cl = n.className || '';
        if (cl.includes('fw-edit-icon') || cl.includes('fw-drag-handle') || cl.includes('fw-delete-btn') || cl.includes('fw-add-line-btn') || cl.includes('fw-add-section-btn')) return;
        t += getText(n);
      }
    });
    return t.trim();
  }

  let md = '';
  function walk(el) {
    if (!el || el.nodeType !== 1) return;
    const cl = el.className || '';
    if (cl.includes('fw-edit-banner') || cl.includes('fw-drag-handle') || cl.includes('fw-delete-btn') || cl.includes('fw-add-line-btn') || cl.includes('fw-add-section-btn') || cl.includes('fw-edit-icon')) return;
    const fw = el.dataset ? el.dataset.fw : null;
    if (!fw) { Array.from(el.children || []).forEach(walk); return; }

    switch(fw) {
      case 'h1': md += '# ' + getText(el) + '\n\n'; break;
      case 'h2': md += '## ' + getText(el) + '\n\n'; break;
      case 'h3': {
        const t = getText(el);
        md += '### ' + t + '\n'; break;
      }
      case 'heading': md += '### ' + getText(el) + '\n'; break;
      case 'section': {
        const nameEl = el.querySelector('.framework-section-name');
        const descEl = el.querySelector('.framework-section-desc');
        const name = nameEl ? getText(nameEl) : 'SECTION';
        let desc = descEl ? getText(descEl) : '';
        desc = desc.replace(/^–\s*/, '').trim();
        md += '**' + name + ' – ' + desc + '**\n';
        el.querySelectorAll('.framework-lines-group').forEach(lg => {
          const typeEl = lg.querySelector('[data-fw="line-type"]');
          if (typeEl) md += '- **' + getText(typeEl).replace(/:$/, '') + ':**\n';
          lg.querySelectorAll('[data-fw="line-text"]').forEach(lt => {
            md += '  - ' + getText(lt) + '\n';
          });
        });
        md += '\n';
        break;
      }
      case 'line-type': break; // handled inside section
      case 'line-text': break; // handled inside section
      case 'callout': md += '> ' + getText(el) + '\n\n'; break;
      case 'list-item': md += '- ' + getText(el) + '\n'; break;
      case 'paragraph': md += getText(el) + '\n\n'; break;
      case 'hr': md += '---\n\n'; break;
      case 'do-dont': md += getText(el) + '\n\n'; break;
      default: Array.from(el.children || []).forEach(walk);
    }
  }

  Array.from(preview.children).forEach(walk);

  // Preserve the guidelines section
  const brief = S.briefs.find(b => b.id === briefId);
  if (!brief) return;
  const gs = brief.generatedScripts.find(g => g.angleId === angleId);
  if (!gs) return;

  const guidelinesSplit = gs.script.split(/^## Guidelines:/m);
  const guidelinesPart = guidelinesSplit.length > 1 ? '\n\n## Guidelines:\n' + guidelinesSplit[1] : '';

  gs.script = md.trim() + guidelinesPart;
  saveState();

  const ta = document.getElementById('se-' + angleId);
  if (ta) ta.value = gs.script;
  const cc = document.getElementById('scc-' + angleId);
  if (cc) cc.textContent = gs.script.length + ' chars';
}

function glDeleteItem(btn, briefId, angleId) {

  item.style.opacity = '0';
  item.style.transform = 'translateX(-20px)';

function glAddItem(btn, type, briefId, angleId) {
  const wrapper = btn.parentElement;
  const newItem = document.createElement('div');
  newItem.className = 'gl-item';
  newItem.dataset.gl = 'item';
  newItem.dataset.glType = type;
  newItem.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:3px 4px;border-radius:4px;position:relative;transition:background 0.15s;';
  newItem.innerHTML = `<span style="color:var(--text2);font-size:6px;flex-shrink:0;">●</span><span class="gl-item-text" style="font-size:13px;color:var(--text);line-height:1.6;flex:1;border-radius:4px;padding:1px 22px 1px 2px;cursor:text;transition:background 0.15s,box-shadow 0.15s;position:relative;" onclick="fwStartEdit(this)" onblur="glFinishEdit(this)" onkeydown="fwEditKeydown(event,this)">New item<span class="fw-edit-icon" contenteditable="false"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></span></span><button class="line-del" onclick="glDeleteItem(this,'${briefId}','${angleId}')" title="Remove line">✕</button>`;
  newItem.style.opacity = '0';
  wrapper.insertBefore(newItem, btn);
  requestAnimationFrame(() => { newItem.style.transition = 'opacity 0.2s'; newItem.style.opacity = '1'; });
  syncGuidelinesToRaw(briefId, angleId);
  const textEl = newItem.querySelector('.gl-item-text');
  if (textEl) setTimeout(() => fwStartEdit(textEl), 200);
}

function syncGuidelinesToRaw(briefId, angleId) {
  const container = document.getElementById('guidelines-preview-' + angleId);
  if (!container) return;

  function getText(el) {
    let t = '';
    el.childNodes.forEach(n => {
      if (n.nodeType === 3) t += n.textContent;
      else if (n.nodeType === 1) {
        const cl = n.className || '';
        if (cl.includes('fw-edit-icon') || cl.includes('gl-del-btn')) return;
        t += getText(n);
      }
    });
    return t.trim();
  }

  let md = '## Guidelines:\n\n';

  // Do's and Don'ts
  const dosDiv = container.querySelector('[data-gl="dos"]');
  const dontsDiv = container.querySelector('[data-gl="donts"]');
  if (dosDiv || dontsDiv) {
    md += "### Do's and Don'ts\n";
    if (dosDiv) dosDiv.querySelectorAll('[data-gl="item"]').forEach(el => {
      const text = getText(el.querySelector('.gl-item-text') || el);
      if (text) md += '- **Do:** ' + text + '\n';
    });
    if (dontsDiv) dontsDiv.querySelectorAll('[data-gl="item"]').forEach(el => {
      const text = getText(el.querySelector('.gl-item-text') || el);
      if (text) md += "- **Don't:** " + text + '\n';
    });
    md += '\n';
  }

  // Interview Demographic
  const interviewDiv = container.querySelector('[data-gl="interview"]');
  if (interviewDiv) {
    md += '### Interview Demographic\n';
    interviewDiv.querySelectorAll('[data-gl="item"]').forEach(el => {
      const text = getText(el.querySelector('.gl-item-text') || el);
      if (text) md += '- ' + text + '\n';
    });
    md += '\n';
  }

  // Update state: combine angle part + new guidelines
  const brief = S.briefs.find(b => b.id === briefId);
  if (!brief) return;
  const gs = brief.generatedScripts.find(g => g.angleId === angleId);
  if (!gs) return;

  const anglePart = gs.script.split(/^## Guidelines:/m)[0].trim();
  gs.script = anglePart + '\n\n' + md.trim();
  saveState();

  const ta = document.getElementById('se-' + angleId);
  if (ta) ta.value = gs.script;
  const cc = document.getElementById('scc-' + angleId);
  if (cc) cc.textContent = gs.script.length + ' chars';
}

function _customAudioHtml(src, id, deleteAction) {
  return `<div class="custom-audio" id="ca-${id}">
    <button class="ca-play" onclick="caToggle('${id}')" title="Play">
      <svg width="10" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
    </button>
    <span class="ca-time-label" id="ca-time-${id}">0:00 / 0:00</span>
    <div class="ca-track" onclick="caSeek(event,'${id}')"><div class="ca-progress"></div></div>
    <audio src="${src}" preload="metadata" onloadedmetadata="caLoaded('${id}')" ontimeupdate="caUpdate('${id}')" onended="caEnded('${id}')"></audio>
    ${deleteAction ? `<button onclick="${deleteAction}" title="Remove audio" style="width:18px;height:18px;border-radius:50%;border:none;background:rgba(255,255,255,0.1);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:all 0.15s;font-size:12px;line-height:1;" onmouseenter="this.style.background='rgba(248,113,113,0.25)';this.style.color='#f87171';" onmouseleave="this.style.background='rgba(255,255,255,0.1)';this.style.color='var(--text3)';">✕</button>` : ''}
  </div>`;
}
function caToggle(id) {
  const w = document.getElementById('ca-' + id); if (!w) return;
  const a = w.querySelector('audio'), btn = w.querySelector('.ca-play');
  if (a.paused) { a.play(); btn.innerHTML = '<svg width="10" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>'; }
  else { a.pause(); btn.innerHTML = '<svg width="10" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>'; }
}
function caLoaded(id) {
  const w = document.getElementById('ca-' + id); if (!w) return;
  const a = w.querySelector('audio'), t = document.getElementById('ca-time-' + id);
  const d = a.duration; if (isFinite(d) && t) t.textContent = '0:00 / ' + _caFmt(d);
}
function caUpdate(id) {
  const w = document.getElementById('ca-' + id); if (!w) return;
  const a = w.querySelector('audio'), bar = w.querySelector('.ca-progress'), t = document.getElementById('ca-time-' + id);
  if (a.duration) { bar.style.width = (a.currentTime / a.duration * 100) + '%'; if (t) t.textContent = _caFmt(a.currentTime) + ' / ' + _caFmt(a.duration); }
}
function caEnded(id) {
  const w = document.getElementById('ca-' + id); if (!w) return;
  const a = w.querySelector('audio'), btn = w.querySelector('.ca-play'), bar = w.querySelector('.ca-progress'), t = document.getElementById('ca-time-' + id);
  btn.innerHTML = '<svg width="10" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
  bar.style.width = '0%'; if (isFinite(a.duration) && t) t.textContent = '0:00 / ' + _caFmt(a.duration);
}
function caSeek(e, id) {
  const w = document.getElementById('ca-' + id); if (!w) return;
  const a = w.querySelector('audio'), track = w.querySelector('.ca-track');
  const r = track.getBoundingClientRect(); const pct = (e.clientX - r.left) / r.width;
  if (a.duration) a.currentTime = pct * a.duration;
}
function _caFmt(s) { const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return m + ':' + (sec < 10 ? '0' : '') + sec; }

function getFrameworkForAngle(angleName) {
  return ANGLE_FRAMEWORKS[angleName] || ANGLE_FRAMEWORKS['Us vs Them'];
}

function buildFrameworkPromptSection(framework) {
  return framework.map(s => {
    const lineLabel = s.lineType === 'Host Line + Example Line'
      ? 'Write both "Host Line:" entries (what the host says) and "Example Line:" entries (target interviewee responses)'
      : s.lineType === 'Host Action'
        ? 'Write "Host Action:" entries (physical directions) and optional "Example Line:" entries (target interviewee responses)'
        : `Write "${s.lineType}:" entries`;
    return `### ${s.name}\n${s.desc}.\n${lineLabel}.`;
  }).join('\n\n');
}

async function callClaudeForScript(angle, selectedHooks, prod, brandName, cta, guidelines, callTranscript, onboardingForm) {
  const knowledgeDoc = getKnowledgeDoc(angle.name);
  const hookList = selectedHooks.length > 0
    ? selectedHooks.map(h => `- ${h.name}${h.description ? ': ' + h.description : ''}`).join('\n')
    : 'No specific hooks selected — use your best judgment based on the angle.';

  let systemPrompt, userPrompt;

  if (knowledgeDoc) {
    // ─── KNOWLEDGE DOC MODE ──────────────────────────────────────────
    // The knowledge doc IS the prompt — it defines the role, structure, quality checks, everything.
    // We just inject the actual inputs.
    systemPrompt = knowledgeDoc;
    userPrompt = `Generate the Angle Framework section AND a Guidelines section for a "${angle.name}" street interview brief for the following brand and product. Follow every instruction in your system prompt exactly — but ONLY output the angle title heading, the Angle Framework section, and then a Guidelines section. Do NOT include Interaction Overview, Props, Key Mentions, or any other sections.

${onboardingForm || '(No onboarding form provided)'}

## Input 2: Strategy Call Transcript
${callTranscript || '(No call transcript provided)'}

## Input 3: Additional Creative Guidelines
${guidelines || '(No additional guidelines)'}

${cta || '(No specific CTA provided — use the brand website from the onboarding form)'}

## Additional Context
- Brand: ${brandName}
- Product: ${prod}
- Selected Hooks for this angle: ${hookList}

IMPORTANT ABOUT HOOKS: The "Selected Hooks" above are just the hook STYLES/FORMATS that will be filmed separately. Do NOT write numbered hook variations (like "Hook 0", "Hook 1", etc.) into the HOOK section of the Angle Framework. Instead, write ONE single hook script — the main conversational opener the host will use to begin the interaction.

IMPORTANT: Your output should start with the angle title (e.g. "# Us vs. Them — Brand: Product Title"), then immediately a "## Summary:" section, then the "## Angle Framework:" section with all its subsections (HOOK, FOLLOW-UP QUESTION, INITIAL RESPONSES, DEMONSTRATION, PRODUCT INTRODUCTION, REACTIONS, VALUE PROPS, CTA).

## Summary:
Write 1-2 sentences (max 300 characters) that describe what happens in this angle — its core concept and what the viewer should expect. This is a quick orientation for anyone reading the brief. Keep it punchy and conversational. Do NOT exceed 300 characters.

Then output the "## Angle Framework:" section, followed by a "## Guidelines:" section with these three subsections:

### Do's and Don'ts
Write exactly 3-4 Do's and 3-4 Don'ts for the host when filming this angle. Each bullet must start with "Do:" or "Don't:" followed by one concise sentence. Be specific to the brand and angle.

### Host Demographics
Write 1-2 short sentences describing the ideal host profile — gender, age range, energy, appearance style. Keep it brief and punchy like: "Female host. Clean, minimal, 'credible wellness' look. Neutral tone."

### Interview Demographics
Write 1-2 short sentences describing the ideal interviewee — age, interests, where to find them. Keep it brief and punchy like: "Women 25-40 in major cities. Health-conscious. Already takes supplements."

Do NOT output anything else. Output in markdown format.`;
  } else {
    // ─── FALLBACK: FRAMEWORK TEMPLATE MODE ───────────────────────────
    // No knowledge doc — use the built-in framework templates
    const framework = getFrameworkForAngle(angle.name);
    const frameworkInstructions = buildFrameworkPromptSection(framework);

    systemPrompt = 'You are a senior creative strategist at StreetTalk, a UGC street interview agency. You write production-ready street interview briefs that hosts can execute on camera with real people.';
    userPrompt = `Write the angle title, Angle Framework section, and a Guidelines section of a "${angle.name}" street interview brief. Do NOT include Interaction Overview, Props, Key Mentions, or any other sections.

## Brand & Product
- Brand: ${brandName}
- Product: ${prod}

## Selected Hooks
${hookList}

NOTE: The hooks listed above are just the hook STYLES/FORMATS that will be filmed separately. Do NOT write numbered hook variations (like "Hook 0", "Hook 1") into the HOOK section. Write ONE single hook — the main conversational opener.

## Call to Action
${cta || 'Link in bio to shop now!'}
${guidelines ? `\n## Creative Guidelines\n${guidelines}` : ''}

## Onboarding Context
Use the information below to make the brief specific and authentic — pull real product details, pain points, and customer language directly from this context.

### Onboarding Call Transcript
${callTranscript || '(none)'}

### Onboarding Form Responses
${onboardingForm || '(none)'}

---

## OUTPUT FORMAT

Start with the angle title heading (e.g. "# Us vs. Them — Brand: Product Title"), then output a "## Summary:" section (1-2 sentences, max 300 characters, describing what happens in this angle — its core concept and what the viewer should expect, punchy and conversational), then the Angle Framework section in markdown. Use this structure:

## Summary:
(1-2 sentence overview of the angle, max 300 characters)

## Angle Framework:

For each section below, write a block with:
- A bold header: **SECTION NAME - description**
- Lines labeled "Host Line:", "Example Line:", or "Host Action:" with sub-bullets containing the dialogue/directions in quotes

${frameworkInstructions}

Then, after the Angle Framework, output a "## Guidelines:" section with these three subsections:

### Do's and Don'ts
Write exactly 3-4 Do's and 3-4 Don'ts for the host when filming this angle. Each bullet must start with "Do:" or "Don't:" followed by one concise sentence. Be specific to the brand and angle.

### Host Demographics
Write 1-2 short sentences describing the ideal host profile — gender, age range, energy, appearance style. Keep it brief and punchy like: "Female host. Clean, minimal, 'credible wellness' look. Neutral tone."

### Interview Demographics
Write 1-2 short sentences describing the ideal interviewee — age, interests, where to find them. Keep it brief and punchy like: "Women 25-40 in major cities. Health-conscious. Already takes supplements."

Write naturally and conversationally. Every line should sound like real street conversation, not ad copy. Use specific details from the onboarding context. Output ONLY the angle title, Angle Framework section, and Guidelines section — nothing else.`;
  }

  const maxRetries = 3;
  for (let attempt = 0; attempt < maxRetries; attempt++) {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getAnthropicApiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4096,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }],
      }),
    });

    if (response.status === 429 && attempt < maxRetries - 1) {
      const waitSec = (attempt + 1) * 30;
      console.warn(`Rate limited (429). Retrying in ${waitSec}s... (attempt ${attempt + 1}/${maxRetries})`);
      await new Promise(r => setTimeout(r, waitSec * 1000));
      continue;
    }

    if (!response.ok) {
      const errText = await response.text();
      if (response.status === 429) {
        throw new Error('Rate limit exceeded — your API plan allows 10,000 input tokens/min. Wait 60 seconds and try again, or upgrade your plan at console.anthropic.com.');
      }
      throw new Error(`API ${response.status}: ${errText}`);
    }

    const data = await response.json();
    return data.content[0].text.trim();
  }
}

const _generatingProjects = new Set();

async function generateBrief(projectId, _confirmed) {
  // Check for API key before generating
  if (!getAnthropicApiKey()) {
    const key = promptForApiKey();
    if (!key) { showToast('⚠️ API key required to generate briefs.', 'warning'); return; }
  }
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  if (_generatingProjects.has(projectId)) { showToast('Generation already in progress for this project.'); return; }
  if (!brief.callTranscript || !brief.callTranscript.trim() || !brief.onboardingForm || !brief.onboardingForm.trim()) {
    showToast('⚠️ Add the onboarding transcript and form before generating.', 'warning');
    return;
  }

  // Confirm before overwriting existing scripts
  if (!_confirmed && brief.generatedScripts && brief.generatedScripts.length > 0) {
    const m = document.createElement('div');
    m.className = 'modal-overlay';
    m.innerHTML = `
      <div class="modal" style="max-width:420px;">
        <div class="modal-title">Re-generate angles?</div>
        <div class="modal-sub" style="margin-bottom:8px;">This will replace the existing ${brief.generatedScripts.length} angle${brief.generatedScripts.length !== 1 ? 's' : ''} with new AI-generated versions. Any manual edits will be lost.</div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="closeModal();generateBrief('${projectId}',true)">Re-generate</button>
        </div>
      </div>
    `;
    document.body.appendChild(m);
    return;
  }

  const project = S.projects.find(p => p.id === projectId);
  const brand   = project ? S.brands.find(b => b.id === project.brandId) : null;
  const prod      = project?.productName || 'the product';
  const brandName = brand?.name || 'the brand';
  const cta        = brief.cta || 'Link in bio to shop now!';
  const guidelines = brief.guidelines || '';
  const total      = brief.selectedAngles.length;

  // Mark as generating
  _generatingProjects.add(projectId);
  brief.status = 'generating';
  saveState();

  // Show loading UI if containers are visible
  _showGenLoader(projectId);

  try {
    // ── Generate About section (brand summary) in parallel with scripts ──
    const aboutPromise = (async () => {
      let summary = '';
      try {
        const aboutBody = {
          model: 'claude-sonnet-4-6', max_tokens: 256,
          messages: [{ role: 'user', content: 'Write a 1-2 sentence brand summary for ' + brandName + ' (product: ' + prod + '). Be concise, factual, and focus on what makes the brand unique and what they sell. Use ALL of the following sources: Onboarding Form: ' + (brief.onboardingForm || '(none)') + ' Call Transcript: ' + (brief.callTranscript || '(none)') + ' Brand Website: ' + (brand?.domain || '(none)') + ' Guidelines: ' + (guidelines || '(none)') + ' CTA: ' + (cta || '(none)') + ' Respond with ONLY the summary sentences, nothing else.' }]
        };
        console.log('[About] Sending request...');
        const aboutResp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': getAnthropicApiKey(), 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify(aboutBody)
        });
        console.log('[About] Response status:', aboutResp.status);
        const aboutData = await aboutResp.json();
        console.log('[About] Response data:', JSON.stringify(aboutData).substring(0, 500));
        if (!aboutResp.ok) { console.error('[About] API error:', aboutResp.status, aboutData); }
        summary = aboutData.content?.[0]?.text?.trim() || '';
        console.log('[About] Summary result:', summary);
      } catch (e) { console.error('[About] Generation failed:', e); }
      return {
        summary,
        audioUrl: brief.aboutSection?.audioUrl || '',
        audioUrl2: brief.aboutSection?.audioUrl2 || '',
        audioLabel2: brief.aboutSection?.audioLabel2 || '',
        productUrl: brief.aboutSection?.productUrl || (brand?.domain ? 'https://' + brand.domain : ''),
        deliverables: (() => { const a = brief.selectedAngles.length; const v = a * 5; const si = a * 4; const mu = a; return `${a} Angle${a !== 1 ? 's' : ''}\n${v} Videos\n${si} Single Interview${si !== 1 ? 's' : ''}, ${mu} Mash-Up${mu !== 1 ? 's' : ''}`; })(),
        location: brief.aboutSection?.location || '',
        props: brief.aboutSection?.props || ''
      };
    })();

    const results = await Promise.all(
      brief.selectedAngles.map(async sa => {
        const angle = S.angles.find(a => a.id === sa.angleId);
        if (!angle) return null;

        const assignment    = (brief.hookAssignments || []).find(ha => ha.angleId === sa.angleId);
        const selectedHooks = assignment
          ? (assignment.hooks || []).map(hk => S.hooks.find(h => h.id === hk.hookId)).filter(Boolean)
          : [];

        const script = await callClaudeForScript(
          angle, selectedHooks, prod, brandName, cta, guidelines,
          brief.callTranscript, brief.onboardingForm
        );
        // Extract ## Summary: section from script, store separately
        let summary = '';
        const summaryMatch = script.match(/^## Summary:\s*\n([\s\S]*?)(?=\n## )/m);
        if (summaryMatch) summary = summaryMatch[1].trim().replace(/^-{2,}\s*/gm, '').replace(/-{2,}\s*$/gm, '').trim().slice(0, 300);
        // Strip the summary section from the script so it doesn't show in the framework
        const cleanScript = script.replace(/^## Summary:\s*\n[\s\S]*?(?=\n## )/m, '').trim();
        return { angleId: angle.id, angleName: angle.name, script: cleanScript, summary };
      })
    );

    brief.aboutSection = await aboutPromise;
    brief.generatedScripts = results.filter(Boolean);
    brief.status = 'ready';
    brief.updatedAt = new Date().toISOString();
    _generatingProjects.delete(projectId);
    saveState();
    showToast('✨ Brief generated successfully!');

    // Update UI if the user is still on (or returned to) the brief-generation page
    _clearGenLoader(projectId);
    renderContextBar();
    const bgContent = document.getElementById('bg-project-content');
    if (bgContent) onBGProjectChange(projectId);
  } catch (err) {
    _generatingProjects.delete(projectId);
    brief.status = 'draft';
    saveState();
    console.error('Script generation failed:', err);
    showToast('⚠️ Generation failed: ' + err.message, 'warning');

    // Update UI if containers are still visible
    _clearGenLoader(projectId);
    const container = document.getElementById(`bg-scripts-${projectId}`);
    if (container) {
      const isRateLimit = err.message.includes('Rate limit') || err.message.includes('429');
      container.innerHTML = `<div style="color:#f87171;padding:16px;background:rgba(248,113,113,0.08);border-radius:8px;border:1px solid rgba(248,113,113,0.25);">
        ⚠️ Generation failed: ${_esc(err.message)}
        ${isRateLimit
          ? `<br><small style="color:var(--text2);margin-top:6px;display:block;">Your API rate limit was exceeded. Wait a minute and try again, or check your limits at <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent);">console.anthropic.com</a>.</small>`
          : `<br><small style="color:var(--text2);margin-top:6px;display:block;">Check the API key or try again.</small>`}
      </div>`;
    }
    const genBtn = document.querySelector(`[data-gen-btn="${projectId}"]`);
    if (genBtn) { genBtn.disabled = false; genBtn.style.opacity = ''; genBtn.style.cursor = ''; }
  }
}

// ── Loading UI helpers (safe to call even if user navigated away) ──
let _genLoaderIntervals = {};

function _showGenLoader(projectId) {
  const container = document.getElementById(`bg-scripts-${projectId}`);
  const aboutContainer = document.getElementById(`bg-about-${projectId}`);
  if (aboutContainer) aboutContainer.style.display = 'none';

  const _loadMsgs = ['Building your creative frameworks...', 'Size up your space suit!', 'Ready to take these concepts to the moon?'];
  let _loadIdx = 0;
  if (container) {
    container.innerHTML = `<div class="gen-loader"><div class="gen-spinner"></div><div id="gen-load-msg" style="color:var(--text2);">${_loadMsgs[0]}</div></div>`;
  }

  // Clear any previous interval for this project
  if (_genLoaderIntervals[projectId]) clearInterval(_genLoaderIntervals[projectId]);
  _genLoaderIntervals[projectId] = setInterval(() => {
    _loadIdx = (_loadIdx + 1) % _loadMsgs.length;
    const el = document.getElementById('gen-load-msg');
    if (el) { el.style.opacity = '0'; setTimeout(() => { el.textContent = _loadMsgs[_loadIdx]; el.style.opacity = '1'; }, 300); }
  }, 3000);

  const genBtn = document.querySelector(`[data-gen-btn="${projectId}"]`);
  if (genBtn) { genBtn.disabled = true; genBtn.style.opacity = '0.45'; genBtn.style.cursor = 'not-allowed'; }
}

function _clearGenLoader(projectId) {
  if (_genLoaderIntervals[projectId]) { clearInterval(_genLoaderIntervals[projectId]); delete _genLoaderIntervals[projectId]; }
}

function publishBrief(projectId) {
  const brief = S.briefs.find(b => b.projectId === projectId);
  if (!brief) return;
  const isRepublish = brief.status === 'published';
  if (!brief.presentationToken) brief.presentationToken = uid();
  brief.status = 'published';
  brief.updatedAt = new Date().toISOString();
  saveState();

  // Build & save a frozen snapshot of all data the presentation needs
  const project = S.projects.find(p => p.id === projectId);
  const brand = project ? S.brands.find(b => b.id === project.brandId) : null;
  const snapshot = buildSnapshot(brief, project, brand);
  saveSnapshot(brief.presentationToken, snapshot);

  const fakeUrl = `https://brief.streettalk.co/view/${brief.presentationToken}`;
  navigator.clipboard.writeText(fakeUrl).catch(() => {});
  showToast(isRepublish ? 'Brief republished! Snapshot updated & link copied.' : 'Presentation published! Link copied.');
  onBGProjectChange(projectId);
}

// ─── PRESENTATION ────────────────────────────────────────────────────────────
let _currentPresentationToken = null;

// Global reference to the active snapshot (used by presentation rendering)
let _activeSnapshot = null;

function openPresentation(token) {
  const badge = document.getElementById('pres-snapshot-badge');

  // Try to load from snapshot first (frozen at publish time)
  const snapshot = getSnapshot(token);
  if (snapshot) {
    _currentPresentationToken = token;
    _activeSnapshot = snapshot;
    const body = document.getElementById('pres-body');
    body.innerHTML = renderPresentationBody(snapshot.brief, snapshot.project, snapshot.brand, snapshot);
    // Show snapshot timestamp
    if (badge) {
      badge.style.display = 'inline';
      badge.textContent = 'Published ' + new Date(snapshot.publishedAt).toLocaleDateString();
    }
    document.getElementById('presentation-overlay').style.display = 'block';
    history.pushState({}, '', `#presentation/${token}`);
    return;
  }
  // Fallback: no snapshot (legacy briefs published before this feature)
  const brief = S.briefs.find(b => b.presentationToken === token);
  if (!brief) { alert('Presentation not found.'); return; }

  _currentPresentationToken = token;
  _activeSnapshot = null;
  const project = S.projects.find(p => p.id === brief.projectId);
  const brand = project ? S.brands.find(b => b.id === project.brandId) : null;

  const body = document.getElementById('pres-body');
  body.innerHTML = renderPresentationBody(brief, project, brand, null);

  if (badge) { badge.style.display = 'none'; }
  document.getElementById('presentation-overlay').style.display = 'block';
  history.pushState({}, '', `#presentation/${token}`);
}

function toggleApproval(briefId, angleId, btn) {
  const brief = S.briefs.find(b => b.id === briefId);
  if (!brief) return;
  if (!brief.approvals) brief.approvals = {};
  const cur = brief.approvals[angleId];
  let next;
  if (cur === true) { brief.approvals[angleId] = false; next = false; }
  else if (cur === false) { delete brief.approvals[angleId]; next = null; }
  else { brief.approvals[angleId] = true; next = true; }
  saveState();
  // Also sync approval to snapshot
  if (_activeSnapshot && _currentPresentationToken) {
    if (!_activeSnapshot.brief.approvals) _activeSnapshot.brief.approvals = {};
    if (next === null) { delete _activeSnapshot.brief.approvals[angleId]; }
    else { _activeSnapshot.brief.approvals[angleId] = next; }
    saveSnapshot(_currentPresentationToken, _activeSnapshot);
  }
  // Update button style in-place (works for both old and new presentation UI)
  if (btn && btn.classList.contains('pres-approve-btn')) {
    const bg    = next === true ? '#22C55E' : next === false ? '#EF4444' : '#FACC15';
    const color = next === true ? '#fff' : next === false ? '#fff' : '#1a1a1a';
    const label = next === true ? 'Approved' : next === false ? 'Needs Revisions' : 'Approve Angle';
    const icon  = next === false
      ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
      : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    btn.style.background = bg; btn.style.color = color;
    btn.innerHTML = `${icon} ${label}`;
  } else if (btn) {
    // Legacy fallback
    if (next === true) { btn.className = 'approval-btn approved'; btn.textContent = '✓ Approved'; }
    else if (next === false) { btn.className = 'approval-btn rejected'; btn.textContent = '✗ Needs Revisions'; }
    else { btn.className = 'approval-btn'; btn.textContent = 'Approve Angle'; }
  }
}

function presTabSwitch(angleId, tab) {
  const tabs = ['full-script','guidelines','shots','hooks','creators','comment'];
  tabs.forEach(t => {
    const panel = document.getElementById(`ptabpanel-${angleId}-${t}`);
    const btn   = document.getElementById(`ptab-${angleId}-${t}`);
    if (panel) { panel.style.display = 'none'; panel.style.opacity = '0'; }
    if (btn)   btn.classList.remove('active');
  });
  const activePanel = document.getElementById(`ptabpanel-${angleId}-${tab}`);
  const activeBtn   = document.getElementById(`ptab-${angleId}-${tab}`);
  if (activePanel) {
    activePanel.style.display = 'block';
    activePanel.style.transition = 'opacity 0.2s ease';
    // Force reflow then fade in
    void activePanel.offsetWidth;
    activePanel.style.opacity = '1';
  }
  if (activeBtn) activeBtn.classList.add('active');
}

function togglePresHookPreview(previewId) {
  const panel   = document.getElementById(previewId);
  const chevron = document.getElementById(`${previewId}-chevron`);
  const label   = document.getElementById(`${previewId}-label`);
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  if (chevron) chevron.textContent = isOpen ? '▼' : '▲';

}

function toggleAngleCollapse(angleId) {
  const content = document.getElementById(`pres-content-${angleId}`);
  const icon    = document.getElementById(`pres-chevron-${angleId}`);
  const btn     = document.getElementById(`pres-collapse-btn-${angleId}`);
  if (!content) return;
  const isHidden = content.style.display === 'none';
  content.style.display = isHidden ? 'flex' : 'none';
  const label = document.getElementById(`pres-collapse-label-${angleId}`);
  if (icon)  icon.innerHTML  = isHidden ? '&#9650;' : '&#9660;';
  if (label) label.textContent = isHidden ? 'Collapse' : 'Expand';
  if (btn) {
    if (isHidden) {
      btn.style.background = 'var(--surface3)';
      btn.style.borderColor = 'var(--border)';
      btn.style.color = 'var(--text)';
    } else {
      btn.style.background = 'var(--accent)';
      btn.style.borderColor = 'var(--accent)';
      btn.style.color = '#fff';
    }
  }
}

function addComment(briefId, angleId) {
  const input = document.getElementById(`comment-input-${angleId}`);
  if (!input || !input.value.trim()) return;
  const comment = { id: uid(), angleId, text: input.value.trim(), author: 'Reviewer', createdAt: new Date().toISOString() };

  // Update live state
  const brief = S.briefs.find(b => b.id === briefId);
  if (!brief) return;
  if (!brief.comments) brief.comments = [];
  brief.comments.push(comment);
  saveState();
  input.value = '';

  // Also update the snapshot so comments persist in the published view
  if (_activeSnapshot && _currentPresentationToken) {
    if (!_activeSnapshot.brief.comments) _activeSnapshot.brief.comments = [];
    _activeSnapshot.brief.comments.push(comment);
    saveSnapshot(_currentPresentationToken, _activeSnapshot);
  }

  // Re-render
  if (_activeSnapshot) {
    document.getElementById('pres-body').innerHTML = renderPresentationBody(_activeSnapshot.brief, _activeSnapshot.project, _activeSnapshot.brand, _activeSnapshot);
  } else {
    const project = S.projects.find(p => p.id === brief.projectId);
    const brand = project ? S.brands.find(b => b.id === project.brandId) : null;
    document.getElementById('pres-body').innerHTML = renderPresentationBody(brief, project, brand, null);
  }
}

function exportBriefPDF() {
  // Expand all collapsed angle sections before printing
  const brief = _activeSnapshot ? _activeSnapshot.brief : S.briefs.find(b => b.presentationToken === _currentPresentationToken);
  if (!brief) return;
  const angleIds = brief.selectedAngles.map(sa => sa.angleId);
  const collapsed = [];
  angleIds.forEach(id => {
    const panel = document.getElementById(`pres-content-${id}`);
    if (panel && panel.style.display === 'none') {
      panel.style.display = 'flex';
      collapsed.push(id);
    }
  });
  // Brief delay to let DOM settle, then print
  setTimeout(() => {
    window.print();
    // Restore collapsed state after print dialog closes
    setTimeout(() => {
      collapsed.forEach(id => {
        const panel = document.getElementById(`pres-content-${id}`);
        if (panel) panel.style.display = 'none';
      });
    }, 500);
  }, 200);
}

function editAngleKnowledgeDoc(id) {
  const angle = S.angles.find(a => a.id === id);
  if (!angle) return;
  const existing = getKnowledgeDoc(angle.name);
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = `
    <div class="modal" style="max-width:720px;">
      <div class="modal-title" style="display:flex;align-items:center;gap:10px;">
        ${existing ? '<span style="color:var(--green);font-size:10px;">●</span>' : '<span style="color:var(--text3);font-size:10px;">○</span>'}
        Knowledge Doc — ${angle.name}
      </div>
      <div class="modal-sub" style="margin-bottom:12px;">Drop a markdown file or paste the knowledge document. This will be used as the AI prompt when generating briefs.</div>

      <!-- Drop zone / file upload -->
      <div id="kd-dropzone" style="border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;margin-bottom:12px;cursor:pointer;transition:border-color 0.2s,background 0.2s;"
        onclick="document.getElementById('kd-file-input').click()">
        <input type="file" id="kd-file-input" accept=".md,.txt,.markdown" style="display:none;">
        <div style="font-size:24px;margin-bottom:6px;">📄</div>
        <div style="font-size:13px;font-weight:600;color:var(--text2);">Drop .md file here or click to browse</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;">Accepts .md, .txt, .markdown</div>
      </div>

      ${existing ? `<details open style="margin-bottom:8px;">
        <summary style="font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;user-select:none;margin-bottom:8px;">View / edit loaded document</summary>` : `<details style="margin-bottom:8px;">
        <summary style="font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;user-select:none;margin-bottom:8px;">Or paste manually</summary>`}
        <textarea id="knowledge-doc-editor" class="form-input" style="min-height:280px;font-family:monospace;font-size:12px;line-height:1.6;white-space:pre-wrap;resize:vertical;">${existing.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
      </details>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <span style="font-size:11px;color:var(--text3);" id="kd-char-count">${existing ? existing.length.toLocaleString() + ' chars loaded' : 'No document loaded'}</span>
        <div class="modal-actions" style="margin-top:0;">
          ${existing ? `<button class="btn btn-secondary" onclick="if(confirm('Remove knowledge doc for ${angle.name}?')){saveKnowledgeDoc('${angle.name}','');closeModal();nav('angles-db');}">Remove</button>` : ''}
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveAngleKnowledgeDoc('${angle.name}')">Save</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(m);

  const dropzone = document.getElementById('kd-dropzone');
  const fileInput = document.getElementById('kd-file-input');
  const editor = document.getElementById('knowledge-doc-editor');
  const charCount = document.getElementById('kd-char-count');

  function loadFileContent(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const text = e.target.result;
      editor.value = text;
      charCount.textContent = text.length.toLocaleString() + ' chars loaded';
      charCount.style.color = 'var(--green)';
      // Open the details if closed
      const details = editor.closest('details');
      if (details) details.open = true;
      // Flash the dropzone green
      dropzone.style.borderColor = 'var(--green)';
      dropzone.style.background = 'rgba(34,197,94,0.05)';
      dropzone.querySelector('div:nth-child(2)').textContent = file.name + ' loaded';
      setTimeout(() => { dropzone.style.borderColor = ''; dropzone.style.background = ''; }, 2000);
      showToast(file.name + ' loaded!');
    };
    reader.readAsText(file);
  }

  // File input change
  fileInput.addEventListener('change', function() {
    if (this.files[0]) loadFileContent(this.files[0]);
  });

  // Drag & drop
  dropzone.addEventListener('dragover', function(e) {
    e.preventDefault();
    this.style.borderColor = 'var(--accent)';
    this.style.background = 'rgba(66,66,215,0.05)';
  });
  dropzone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    this.style.borderColor = '';
    this.style.background = '';
  });
  dropzone.addEventListener('drop', function(e) {
    e.preventDefault();
    this.style.borderColor = '';
    this.style.background = '';
    const file = e.dataTransfer.files[0];
    if (file && (file.name.endsWith('.md') || file.name.endsWith('.txt') || file.name.endsWith('.markdown'))) {
      loadFileContent(file);
    } else {
      showToast('Please drop a .md, .txt, or .markdown file', 'warning');
    }
  });

  // Live char count on manual edit
  editor.addEventListener('input', function() {
    charCount.textContent = this.value.length.toLocaleString() + ' chars';
    charCount.style.color = '';
  });
}

function getHookEmbed(url) {
  if (!url) return '';
  // Vimeo embed
  const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
  if (vimeoMatch) {
    return `<div class="video-embed" style="margin-top:12px;"><iframe src="https://player.vimeo.com/video/${vimeoMatch[1]}" frameborder="0" allowfullscreen></iframe></div>`;
  }
  // Streamable embed
  const streamMatch = url.match(/streamable\.com\/([a-z0-9]+)/i);
  if (streamMatch) {
    return `<div class="video-embed" style="margin-top:12px;"><iframe src="https://streamable.com/e/${streamMatch[1]}" frameborder="0" allowfullscreen scrolling="no"></iframe></div>`;
  }
  // Frame.io — show as link (requires auth, can't embed)
  if (url.includes('frame.io')) {
    return `<div style="margin-top:8px;"><a href="${url}" target="_blank" style="font-size:12px;color:var(--accent);text-decoration:none;">↗ View on Frame.io</a></div>`;
  }
  // Generic link
  return `<div style="margin-top:8px;"><a href="${url}" target="_blank" style="font-size:12px;color:var(--accent);text-decoration:none;">↗ View example</a></div>`;
}

let _toastTimer = null;
function showToast(msg, type) {
  const t = document.getElementById('copy-toast');
  clearTimeout(_toastTimer);
  // Auto-detect type from message content if not provided
  if (!type) {
    if (msg.startsWith('⚠')) type = 'warning';
    else if (msg.toLowerCase().includes('fail') || msg.toLowerCase().includes('error')) type = 'error';
    else type = 'success';
  }
  const icons = { success: '✓', warning: '⚠', error: '✕' };
  t.className = 'copy-toast toast-' + type;
  t.textContent = (icons[type] || '✓') + ' ' + msg.replace(/^[⚠️✓✕]\s*/, '');
  // Force reflow for re-trigger animation
  void t.offsetWidth;
  t.classList.add('show');
  const duration = type === 'error' ? 4000 : type === 'warning' ? 3500 : 2500;
  _toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

// ─── AUTH / MULTI-USER ────────────────────────────────────────────────────
const CRED_SHEET_GID = '0'; // credentials tab — update if different
let _currentUser = null; // { email }

function getStoredUser() {
  try { return JSON.parse(localStorage.getItem('bb_user')); } catch(e) { return null; }
}
function setStoredUser(user) {
  localStorage.setItem('bb_user', JSON.stringify(user));
}
function clearStoredUser() {
  localStorage.removeItem('bb_user');
}

function fetchCredentials() {
  return new Promise((resolve, reject) => {
    // Use JSONP via Google Visualization API to avoid CORS issues on file://
    const cbName = '_credCb' + Date.now();
    const script = document.createElement('script');
    script.src = `https://docs.google.com/spreadsheets/d/${BRAND_SHEET_ID}/gviz/tq?tqx=responseHandler:${cbName}&sheet=credentials`;
    window[cbName] = function(response) {
      delete window[cbName];
      script.remove();
      try {
        const rows = response.table.rows;
        const creds = rows.map(r => ({
          email: (r.c[0] && r.c[0].v ? r.c[0].v : '').trim().toLowerCase(),
          password: (r.c[1] && r.c[1].v ? String(r.c[1].v) : '').trim()
        })).filter(r => r.email);
        resolve(creds);
      } catch(e) { reject(e); }
    };
    script.onerror = () => { delete window[cbName]; script.remove(); reject(new Error('Sheet fetch failed')); };
    document.head.appendChild(script);
  });
}

async function handleLogin() {
  const emailInput = document.getElementById('login-email');
  const passInput = document.getElementById('login-password');
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  const email = emailInput.value.trim().toLowerCase();
  const password = passInput.value;

  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const creds = await fetchCredentials();
    const match = creds.find(c => c.email === email && c.password === password);
    if (!match) {
      errEl.textContent = 'Invalid email or password.';
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    _currentUser = { email: match.email };
    setStoredUser(_currentUser);
    showApp();
  } catch(e) {
    console.error('Login error:', e);
    errEl.textContent = 'Could not connect. Try again.';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function handleLogout() {
  _currentUser = null;
  clearStoredUser();
  showLogin();
}

function showLogin() {
  document.getElementById('login-overlay').style.display = '';
  document.querySelector('.main-container').style.display = 'none';
  document.getElementById('hamburger-btn').style.display = 'none';
  document.getElementById('user-bar').style.display = 'none';
}

function showApp() {
  document.getElementById('login-overlay').style.display = 'none';
  document.querySelector('.main-container').style.display = '';
  document.getElementById('hamburger-btn').style.display = '';
  // Show user bar
  const userBar = document.getElementById('user-bar');
  const userEmail = document.getElementById('user-email-display');
  if (_currentUser && userBar) {
    userEmail.textContent = _currentUser.email;
    userBar.style.display = '';
  }
  // Diagnostic: log knowledge docs status
  const kDocs = loadKnowledgeDocs();
  const kDocNames = Object.keys(kDocs).filter(k => kDocs[k]);
  console.log('[KDocs] Loaded knowledge docs:', kDocNames.length, '—', kDocNames.join(', ') || '(none)');
  // Initialize app
  updateBadges();
  checkHash();
  if (!window.location.hash) nav('home');
  startBrandSync();
}

// ─── INIT ─────────────────────────────────────────────────────────────────
// Reset any briefs stuck in 'generating' status (from a page refresh mid-generation)
S.briefs.forEach(b => { if (b.status === 'generating') b.status = 'draft'; });
saveState();

// Check if user is already logged in
_currentUser = getStoredUser();
if (_currentUser && _currentUser.email) {
  showApp();
} else {
  showLogin();
}
